---
# Infrastructure Playbook — Two-Phase Provisioning
#
# Phase 1: Bootstrap core services (DNS, AdGuard, OpenObserve, PBS)
#   Each VM gets its primary role only — no monitoring clients yet.
#   Order matters: DNS → AdGuard → OpenObserve → proxmox-backup
#
# Phase 2: Monitoring clients (rsyslog + telegraf) on all infrastructure VMs
#   Runs after OpenObserve is up and ready to receive logs/metrics.

# --- Pre-flight: Provision monitoring users ---
- name: Provision monitoring users for infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: &load_local_overrides
    - name: Check for local override vars file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/local/all.yml"
      register: local_override_vars_file
      delegate_to: localhost
      become: false
      run_once: true

    - name: Load local override vars when present
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/local/all.yml"
      when: local_override_vars_file.stat.exists
      run_once: true

    - name: Check for secrets vars file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
      register: secrets_vars_file
      delegate_to: localhost
      become: false
      run_once: true

    - name: Load secrets vars when present
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
      when: secrets_vars_file.stat.exists
      run_once: true

    - name: Load canonical VLAN definitions
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../network-data/vlans.yaml"
        name: network_data
      run_once: true

    - name: Set management subnet fact
      ansible.builtin.set_fact:
        management_subnet: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans[network_data.management_vlan].id }}.0/24"
      run_once: true

    - name: Compute VLAN prefixes for IP translation
      ansible.builtin.set_fact:
        mgmt_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans[network_data.management_vlan].id }}."
        services_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.services.id }}."
        storage_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.storage.id }}."
        core_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.core.id }}."
        ipv4_prefix_reversed: "{{ network_data.ipv4_prefix.split('.') | reverse | join('.') }}"
        internal_network_cidr: "{{ network_data.ipv4_prefix }}.0.0/12"
      run_once: true

    - name: Build dns_zones from canonical VLAN data
      ansible.builtin.set_fact:
        dns_zones: >-
          {{ dns_zones | default({}) | combine({
            'vlan' ~ network_data.vlans[item].id: {
              'zone': network_data.vlans[item].domain_prefix ~ '.' ~ network_data.domain_suffix,
              'vlan_id': network_data.vlans[item].id,
              'dns_ip': network_data.dns_server.dns_ipv4,
              'dns_ipv6': network_data.dns_server.dns_ipv6,
              'bind_ip': network_data.dns_server.bind_ipv4
            }
          }) }}
      loop: "{{ network_data.dns_server.zone_vlans }}"
      run_once: true

    - name: Require dns_zones
      ansible.builtin.assert:
        that:
          - dns_zones is mapping
          - dns_zones | length > 0
        fail_msg: "Failed to build dns_zones from network-data/vlans.yaml"
      run_once: true

    - name: Check for rendered policy artifact when enabled
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../network-data/generated/policy_render.public.json"
      register: rendered_policy_artifact_file
      delegate_to: localhost
      become: false
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Require rendered policy artifact when enabled
      ansible.builtin.assert:
        that:
          - rendered_policy_artifact_file.stat.exists
        fail_msg: "Rendered policy artifact missing. Run: make pr6-render"
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Load rendered policy artifact when enabled
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../network-data/generated/policy_render.public.json"
        name: rendered_policy
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Show rendered policy artifact summary when enabled
      ansible.builtin.debug:
        msg: >-
          Rendered policy enabled: zones={{ rendered_policy.summary.zone_count }},
          rules={{ rendered_policy.summary.rule_count }}
      run_once: true
      when: use_rendered_policy | default(false)
  roles:
    - role: monitoring_users
      tags:
        - monitoring-users
        - users

# ============================================================
# Phase 1: Bootstrap core services (no monitoring clients)
# ============================================================

- name: "Phase 1: Configure dns VM (BIND9)"
  hosts: dns
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - bind9
  tags:
    - phase1
    - dns

- name: "Phase 1: Configure AdGuard VM"
  hosts: adguard
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - adguard
  tags:
    - phase1
    - adguard

- name: "Phase 1: Configure OpenObserve Monitoring VM"
  hosts: openobserve
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - monitoring
  tags:
    - phase1
    - openobserve

- name: "Phase 1: Configure proxmox-backup VM"
  hosts: proxmox-backup
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - proxmox_backup
  tags:
    - phase1
    - proxmox-backup

# ============================================================
# Phase 2: Monitoring clients (OpenObserve is now running)
# ============================================================

- name: "Phase 2: Configure monitoring clients on all infrastructure VMs"
  hosts: dns,adguard,openobserve,proxmox-backup
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - rsyslog_client
    - telegraf
  tags:
    - phase2
    - monitoring
