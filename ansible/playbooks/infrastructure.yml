---
# Infrastructure Playbook — Three-Phase Provisioning
#
# Pre-flight: Load secrets, VLAN data, and local overrides
#
# Phase 1: Bootstrap core services (DNS, AdGuard, OpenObserve, PBS, UniFi)
#   Each VM gets its primary role only — no monitoring clients yet.
#   Order matters: DNS → AdGuard → OpenObserve → proxmox-backup → UniFi
#
# Phase 2: Monitoring clients (rsyslog + telegraf) on all infrastructure VMs
#   Runs after OpenObserve is up and ready to receive logs/metrics.
#
# Phase 3: Provision monitoring users (Proxmox, UniFi, Synology)
#   Runs last — all target services must be running first.

# --- Pre-flight: Load secrets, VLAN data, and overrides ---
- name: Pre-flight setup
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Load all configuration and secrets
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/full_pre_tasks.yml"

    - name: Check for rendered policy artifact when enabled
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../network-data/generated/policy_render.public.json"
      register: rendered_policy_artifact_file
      delegate_to: localhost
      become: false
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Require rendered policy artifact when enabled
      ansible.builtin.assert:
        that:
          - rendered_policy_artifact_file.stat.exists
        fail_msg: "Rendered policy artifact missing. Run: make pr6-render"
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Load rendered policy artifact when enabled
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../network-data/generated/policy_render.public.json"
        name: rendered_policy
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Show rendered policy artifact summary when enabled
      ansible.builtin.debug:
        msg: >-
          Rendered policy enabled: zones={{ rendered_policy.summary.zone_count }},
          rules={{ rendered_policy.summary.rule_count }}
      run_once: true
      when: use_rendered_policy | default(false)
  roles: []

# ============================================================
# Phase 1: Bootstrap core services (no monitoring clients)
# ============================================================

- name: "Phase 1: Configure dns VM (BIND9)"
  hosts: dns
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: &load_all_config
    - name: Load all configuration and secrets
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/full_pre_tasks.yml"
      tags: [always]
  roles:
    - bind9
  tags:
    - phase1
    - dns

- name: "Phase 1: Configure AdGuard VM"
  hosts: adguard
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  roles:
    - adguard
  tags:
    - phase1
    - adguard

- name: "Phase 1: Infisical secrets management"
  hosts: infisical
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  roles:
    - dns_config
    - geerlingguy.docker
    - infisical
    - pbs_client
    - hardening
  tags:
    - phase1
    - infisical

- name: "Phase 1: Configure OpenObserve Monitoring VM"
  hosts: openobserve
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  vars:
    infisical_secret_paths: ["/shared", "/monitoring"]
    infisical_agent_templates:
      - name: monitoring
        dest_path: /etc/infisical/secrets/monitoring.env
        template_src: secrets/monitoring.env.tpl.j2
      - name: openobserve-password
        dest_path: /etc/infisical/secrets/openobserve_password
        template_src: secrets/openobserve-password.tpl.j2
      - name: openobserve
        dest_path: /etc/infisical/secrets/openobserve.env
        template_src: secrets/openobserve.env.tpl.j2
      - name: monitoring-grafana
        dest_path: /etc/infisical/secrets/monitoring-grafana.env
        template_src: secrets/monitoring-grafana.env.tpl.j2
      - name: monitoring-proxmox-exporter
        dest_path: /etc/infisical/secrets/monitoring-proxmox-exporter.env
        template_src: secrets/monitoring-proxmox-exporter.env.tpl.j2
      - name: monitoring-unifi-poller
        dest_path: /etc/infisical/secrets/monitoring-unifi-poller.env
        template_src: secrets/monitoring-unifi-poller.env.tpl.j2
      - name: monitoring-pbs-exporter
        dest_path: /etc/infisical/secrets/monitoring-pbs-exporter.env
        template_src: secrets/monitoring-pbs-exporter.env.tpl.j2
  roles:
    - infisical_client
    - dns_config
    - monitoring
  tags:
    - phase1
    - openobserve

- name: "Phase 1: Configure proxmox-backup VM"
  hosts: proxmox-backup
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  roles:
    - dns_config
    - proxmox_backup
  tags:
    - phase1
    - proxmox-backup

- name: "Phase 1: Configure UniFi Network Controller"
  hosts: unifi
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  roles:
    - dns_config
    - unifi
  tags:
    - phase1
    - unifi

# ============================================================
# Phase 2: Monitoring clients (OpenObserve is now running)
# ============================================================

- name: "Phase 2: Configure monitoring clients on all infrastructure VMs"
  hosts: dns,adguard,infisical,openobserve,proxmox-backup,unifi
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  roles:
    - rsyslog_client
    - telegraf
  tags:
    - phase2
    - monitoring

# ============================================================
# Phase 3: Provision monitoring users (services are now running)
# ============================================================

- name: "Phase 3: Provision monitoring users"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  roles:
    - role: monitoring_users
      tags:
        - monitoring-users
        - users
  tags:
    - phase3
    - monitoring-users
