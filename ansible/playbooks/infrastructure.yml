---
# Infrastructure Playbook — Three-Phase Provisioning
#
# Pre-flight: Load secrets, VLAN data, and local overrides
#
# Phase 1: Bootstrap core services (DNS, AdGuard, OpenObserve, PBS, UniFi)
#   Each VM gets its primary role only — no monitoring clients yet.
#   Order matters: DNS → AdGuard → OpenObserve → proxmox-backup → UniFi
#
# Phase 2: Monitoring clients (rsyslog + telegraf) on all infrastructure VMs
#   Runs after OpenObserve is up and ready to receive logs/metrics.
#
# Phase 3: Provision monitoring users (Proxmox, UniFi, Synology)
#   Runs last — all target services must be running first.

# --- Pre-flight: Load secrets, VLAN data, and overrides ---
- name: Pre-flight setup
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: &load_local_overrides
    - name: Check for local override vars file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/local/all.yml"
      register: local_override_vars_file
      delegate_to: localhost
      become: false
      run_once: true

    - name: Load local override vars when present
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/local/all.yml"
      when: local_override_vars_file.stat.exists
      run_once: true

    - name: Check for bootstrap credentials file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/bootstrap.sops.yml"
      register: bootstrap_vars_file
      delegate_to: localhost
      become: false
      run_once: true

    - name: Load bootstrap credentials (SOPS Tier 1)
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../group_vars/bootstrap.sops.yml"
        expressions: evaluate-on-load
      when: bootstrap_vars_file.stat.exists
      run_once: true

    - name: Check if Infisical is reachable
      ansible.builtin.uri:
        url: "{{ bootstrap_config.infisical_url }}/api/status"
        method: GET
        status_code: 200
        timeout: 5
      register: infisical_health
      ignore_errors: true
      delegate_to: localhost
      become: false
      run_once: true
      when:
        - bootstrap_config is defined
        - bootstrap_config.infisical_url | default('REPLACE_ME') != 'REPLACE_ME'

    - name: Load secrets from Infisical (Tier 2)
      block:
        - name: Attempt Infisical login and read secrets
          ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_login.yml"
      rescue:
        - name: Record Infisical login failure
          ansible.builtin.set_fact:
            infisical_login_failed: true

        - name: Warn about Infisical login failure
          ansible.builtin.debug:
            msg: "WARNING: Infisical login failed — will fall back to SOPS secrets."
      when:
        - infisical_health is defined
        - infisical_health is not skipped
        - infisical_health is succeeded
      run_once: true

    - name: Fallback to SOPS secrets when Infisical unavailable
      block:
        - name: Check for legacy SOPS secrets file
          ansible.builtin.stat:
            path: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
          register: secrets_vars_file
          delegate_to: localhost
          become: false

        - name: Load SOPS secrets as fallback
          community.sops.load_vars:
            file: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
            expressions: evaluate-on-load
          when: secrets_vars_file.stat.exists

        - name: Warn about SOPS fallback
          ansible.builtin.debug:
            msg: "WARNING: Infisical unreachable or login failed — using SOPS fallback. Secrets may be stale."
      when: >-
        infisical_health is not defined
        or infisical_health is skipped
        or infisical_health is failed
        or infisical_login_failed | default(false)
        or secrets is not defined
      run_once: true

    - name: Load canonical VLAN definitions
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../network-data/vlans.yaml"
        name: network_data
      run_once: true

    - name: Set management subnet fact
      ansible.builtin.set_fact:
        management_subnet: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans[network_data.management_vlan].id }}.0/24"
      run_once: true

    - name: Compute VLAN prefixes for IP translation
      ansible.builtin.set_fact:
        mgmt_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans[network_data.management_vlan].id }}."
        services_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.services.id }}."
        storage_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.storage.id }}."
        core_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.core.id }}."
        ipv4_prefix_reversed: "{{ network_data.ipv4_prefix.split('.') | reverse | join('.') }}"
        internal_network_cidr: "{{ network_data.ipv4_prefix }}.0.0/12"
      run_once: true

    - name: Build dns_zones from canonical VLAN data
      ansible.builtin.set_fact:
        dns_zones: >-
          {{ dns_zones | default({}) | combine({
            'vlan' ~ network_data.vlans[item].id: {
              'zone': network_data.vlans[item].domain_prefix ~ '.' ~ network_data.domain_suffix,
              'vlan_id': network_data.vlans[item].id,
              'dns_ip': network_data.dns_server.dns_ipv4,
              'dns_ipv6': network_data.dns_server.dns_ipv6,
              'bind_ip': network_data.dns_server.bind_ipv4
            }
          }) }}
      loop: "{{ network_data.dns_server.zone_vlans }}"
      run_once: true

    - name: Require dns_zones
      ansible.builtin.assert:
        that:
          - dns_zones is mapping
          - dns_zones | length > 0
        fail_msg: "Failed to build dns_zones from network-data/vlans.yaml"
      run_once: true

    - name: Check for rendered policy artifact when enabled
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../../network-data/generated/policy_render.public.json"
      register: rendered_policy_artifact_file
      delegate_to: localhost
      become: false
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Require rendered policy artifact when enabled
      ansible.builtin.assert:
        that:
          - rendered_policy_artifact_file.stat.exists
        fail_msg: "Rendered policy artifact missing. Run: make pr6-render"
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Load rendered policy artifact when enabled
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../network-data/generated/policy_render.public.json"
        name: rendered_policy
      run_once: true
      when: use_rendered_policy | default(false)

    - name: Show rendered policy artifact summary when enabled
      ansible.builtin.debug:
        msg: >-
          Rendered policy enabled: zones={{ rendered_policy.summary.zone_count }},
          rules={{ rendered_policy.summary.rule_count }}
      run_once: true
      when: use_rendered_policy | default(false)
  roles: []

# ============================================================
# Phase 1: Bootstrap core services (no monitoring clients)
# ============================================================

- name: "Phase 1: Configure dns VM (BIND9)"
  hosts: dns
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - bind9
  tags:
    - phase1
    - dns

- name: "Phase 1: Configure AdGuard VM"
  hosts: adguard
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - adguard
  tags:
    - phase1
    - adguard

- name: "Phase 1: Infisical secrets management"
  hosts: infisical
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - geerlingguy.docker
    - infisical
    - hardening
  tags:
    - phase1
    - infisical

- name: "Phase 1: Configure OpenObserve Monitoring VM"
  hosts: openobserve
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  vars:
    infisical_secret_paths: ["/shared", "/monitoring"]
    infisical_agent_templates:
      - name: monitoring
        dest_path: /etc/infisical/secrets/monitoring.env
        template_src: secrets/monitoring.env.tpl.j2
      - name: openobserve-password
        dest_path: /etc/infisical/secrets/openobserve_password
        template_src: secrets/openobserve-password.tpl.j2
      - name: openobserve
        dest_path: /etc/infisical/secrets/openobserve.env
        template_src: secrets/openobserve.env.tpl.j2
  roles:
    - infisical_client
    - dns_config
    - monitoring
  tags:
    - phase1
    - openobserve

- name: "Phase 1: Configure proxmox-backup VM"
  hosts: proxmox-backup
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - proxmox_backup
  tags:
    - phase1
    - proxmox-backup

- name: "Phase 1: Configure UniFi Network Controller"
  hosts: unifi
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - unifi
  tags:
    - phase1
    - unifi

# ============================================================
# Phase 2: Monitoring clients (OpenObserve is now running)
# ============================================================

- name: "Phase 2: Configure monitoring clients on all infrastructure VMs"
  hosts: dns,adguard,infisical,openobserve,proxmox-backup,unifi
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - rsyslog_client
    - telegraf
  tags:
    - phase2
    - monitoring

# ============================================================
# Phase 3: Provision monitoring users (services are now running)
# ============================================================

- name: "Phase 3: Provision monitoring users"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - role: monitoring_users
      tags:
        - monitoring-users
        - users
  tags:
    - phase3
    - monitoring-users
