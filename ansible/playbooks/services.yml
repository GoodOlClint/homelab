---
- name: Configure nvidia-licensing VM
  hosts: nvidia-licensing
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: &load_local_overrides
    - name: Check for local override vars file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/local/all.yml"
      register: local_override_vars_file
      delegate_to: localhost
      become: false
      run_once: true

    - name: Load local override vars when present
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/local/all.yml"
      when: local_override_vars_file.stat.exists
      run_once: true

    - name: Check for bootstrap credentials file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/bootstrap.sops.yml"
      register: bootstrap_vars_file
      delegate_to: localhost
      become: false
      run_once: true

    - name: Load bootstrap credentials (SOPS Tier 1)
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../group_vars/bootstrap.sops.yml"
        expressions: evaluate-on-load
      when: bootstrap_vars_file.stat.exists
      run_once: true

    - name: Check if Infisical is reachable
      ansible.builtin.uri:
        url: "{{ bootstrap_config.infisical_url }}/api/status"
        method: GET
        status_code: 200
        timeout: 5
      register: infisical_health
      ignore_errors: true
      delegate_to: localhost
      become: false
      run_once: true
      when:
        - bootstrap_config is defined
        - bootstrap_config.infisical_url | default('REPLACE_ME') != 'REPLACE_ME'

    - name: Load secrets from Infisical (Tier 2)
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_login.yml"
      when:
        - infisical_health is defined
        - infisical_health is not skipped
        - infisical_health is succeeded

    - name: Fallback to SOPS secrets when Infisical unavailable
      block:
        - name: Check for legacy SOPS secrets file
          ansible.builtin.stat:
            path: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
          register: secrets_vars_file
          delegate_to: localhost
          become: false

        - name: Load SOPS secrets as fallback
          community.sops.load_vars:
            file: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
            expressions: evaluate-on-load
          when: secrets_vars_file.stat.exists

        - name: Warn about SOPS fallback
          ansible.builtin.debug:
            msg: "WARNING: Infisical unreachable — using SOPS fallback. Secrets may be stale."
      when: >-
        infisical_health is not defined
        or infisical_health is failed
        or infisical_health is skipped
      run_once: true

    - name: Load canonical VLAN definitions
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../network-data/vlans.yaml"
        name: network_data
      run_once: true

    - name: Set management subnet fact
      ansible.builtin.set_fact:
        management_subnet: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans[network_data.management_vlan].id }}.0/24"
      run_once: true

    - name: Compute VLAN prefixes for IP translation
      ansible.builtin.set_fact:
        mgmt_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans[network_data.management_vlan].id }}."
        services_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.services.id }}."
        storage_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.storage.id }}."
        core_vlan_prefix: "{{ network_data.ipv4_prefix }}.{{ network_data.vlans.core.id }}."
        ipv4_prefix_reversed: "{{ network_data.ipv4_prefix.split('.') | reverse | join('.') }}"
        internal_network_cidr: "{{ network_data.ipv4_prefix }}.0.0/12"
      run_once: true

    - name: Build dns_zones from canonical VLAN data
      ansible.builtin.set_fact:
        dns_zones: >-
          {{ dns_zones | default({}) | combine({
            'vlan' ~ network_data.vlans[item].id: {
              'zone': network_data.vlans[item].domain_prefix ~ '.' ~ network_data.domain_suffix,
              'vlan_id': network_data.vlans[item].id,
              'dns_ip': network_data.dns_server.dns_ipv4,
              'dns_ipv6': network_data.dns_server.dns_ipv6,
              'bind_ip': network_data.dns_server.bind_ipv4
            }
          }) }}
      loop: "{{ network_data.dns_server.zone_vlans }}"
      run_once: true
  roles:
    - dns_config
    - nvidia_licensing
    - rsyslog_client
    - telegraf

- name: Configure homebridge VM
  hosts: homebridge
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - homebridge
    - rsyslog_client
    - telegraf

- name: Configure docker VM
  hosts: docker
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - pbs_client
    - docker
    - rsyslog_client
    - telegraf

- name: Configure plex VM
  hosts: plex
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - pbs_client
    - plex
    - plex_certificate
    - rsyslog_client
