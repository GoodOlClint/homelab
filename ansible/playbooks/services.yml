- name: Configure plex-services VM
  hosts: plex-services
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_local_overrides
  roles:
    - dns_config
    - pbs_client
    - plex_services
    - rsyslog_client
    - telegraf
