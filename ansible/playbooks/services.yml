- name: Configure plex-services VM
  hosts: plex-services
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  vars:
    infisical_secret_paths: ["/shared", "/plex-services"]
    infisical_agent_templates:
      - name: pbs
        dest_path: /etc/infisical/secrets/pbs.env
        template_src: secrets/pbs.env.tpl.j2
      - name: plex-services
        dest_path: /etc/infisical/secrets/plex-services.env
        template_src: secrets/plex-services.env.tpl.j2
      - name: plex-services-postgres
        dest_path: /etc/infisical/secrets/plex-services-postgres.env
        template_src: secrets/plex-services-postgres.env.tpl.j2
        post_command: "docker compose -f /opt/plex-services/docker-compose.yml up -d --force-recreate postgres"
      - name: plex-services-bazarr
        dest_path: /etc/infisical/secrets/plex-services-bazarr.env
        template_src: secrets/plex-services-bazarr.env.tpl.j2
        post_command: "docker compose -f /opt/plex-services/docker-compose.yml up -d --force-recreate bazarr"
      - name: plex-services-seerr
        dest_path: /etc/infisical/secrets/plex-services-seerr.env
        template_src: secrets/plex-services-seerr.env.tpl.j2
        post_command: "docker compose -f /opt/plex-services/docker-compose.yml up -d --force-recreate seerr"
      - name: cloudflared
        dest_path: /etc/infisical/secrets/cloudflared.env
        template_src: secrets/cloudflared.env.tpl.j2
        post_command: "docker compose -f /opt/plex-services/docker-compose.yml up -d --force-recreate cloudflared"
      - name: plex-services-recyclarr-secrets
        dest_path: /opt/plex-services/recyclarr/secrets.yml
        template_src: secrets/plex-services-recyclarr-secrets.tpl.j2
  roles:
    - infisical_client
    - dns_config
    - pbs_client
    - plex_services
    - portainer_agent
    - rsyslog_client
    - telegraf
  tags:
    - plex-services

