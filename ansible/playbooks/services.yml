---
- name: Configure nvidia-licensing VM
  hosts: nvidia-licensing
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: &load_all_config
    - name: Load all configuration and secrets
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/full_pre_tasks.yml"
  roles:
    - dns_config
    - nvidia_licensing
    - rsyslog_client
    - telegraf

- name: Configure homebridge VM
  hosts: homebridge
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  roles:
    - dns_config
    - homebridge
    - rsyslog_client
    - telegraf

- name: Configure docker VM
  hosts: docker
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  vars:
    infisical_secret_paths: ["/shared", "/docker"]
    infisical_agent_templates:
      - name: pbs
        dest_path: /etc/infisical/secrets/pbs.env
        template_src: secrets/pbs.env.tpl.j2
      - name: docker
        dest_path: /etc/infisical/secrets/docker.env
        template_src: secrets/docker.env.tpl.j2
  roles:
    - infisical_client
    - dns_config
    - pbs_client
    - docker
    - rsyslog_client
    - telegraf

- name: Configure plex VM
  hosts: plex
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  vars:
    infisical_secret_paths: ["/shared", "/plex"]
    infisical_agent_templates:
      - name: pbs
        dest_path: /etc/infisical/secrets/pbs.env
        template_src: secrets/pbs.env.tpl.j2
      - name: plex
        dest_path: /etc/infisical/secrets/plex.env
        template_src: secrets/plex.env.tpl.j2
  roles:
    - infisical_client
    - dns_config
    - pbs_client
    - plex
    - plex_certificate
    - rsyslog_client
    - telegraf

- name: Configure plex-services VM
  hosts: plex-services
  become: true

  vars_files:
    - ../group_vars/all.yml
  pre_tasks: *load_all_config
  vars:
    infisical_secret_paths: ["/shared", "/plex-services"]
    infisical_agent_templates:
      - name: pbs
        dest_path: /etc/infisical/secrets/pbs.env
        template_src: secrets/pbs.env.tpl.j2
      - name: plex-services
        dest_path: /etc/infisical/secrets/plex-services.env
        template_src: secrets/plex-services.env.tpl.j2
      - name: cloudflared
        dest_path: /etc/infisical/secrets/cloudflared.env
        template_src: secrets/cloudflared.env.tpl.j2
  roles:
    - infisical_client
    - dns_config
    - pbs_client
    - plex_services
    - rsyslog_client
    - telegraf
