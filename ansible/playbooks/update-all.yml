---

- name: Update all VMs and Proxmox server
  hosts: all
  become: true
  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true

        upgrade: dist
        autoremove: true

        autoclean: true

      register: upgrade_result

- name: Update all Docker containers (pull latest and recreate)
  hosts: docker,plex-services,openobserve,homepage,infisical,lancache
  become: true
  tasks:
    - name: Pull latest images for docker services
      community.docker.docker_compose_v2:
        project_src: /opt
        files:
          - docker-compose.yml
        pull: always
      register: docker_pull_result
      when: inventory_hostname == 'docker'
      changed_when: "'Recreate' in docker_pull_result.stderr"

    - name: Pull latest images for plex services
      community.docker.docker_compose_v2:
        project_src: /opt/plex-services
        pull: always
      register: plex_pull_result
      when: inventory_hostname == 'plex-services'
      changed_when: "'Recreate' in plex_pull_result.stderr"

    - name: Pull latest images for monitoring
      community.docker.docker_compose_v2:
        project_src: /opt/monitoring
        pull: always
      register: monitoring_pull_result
      when: inventory_hostname == 'openobserve'
      changed_when: "'Recreate' in monitoring_pull_result.stderr"

    - name: Pull latest images for homepage
      community.docker.docker_compose_v2:
        project_src: /opt/homepage
        pull: always
      register: homepage_pull_result
      when: inventory_hostname == 'homepage'
      changed_when: "'Recreate' in homepage_pull_result.stderr"

    - name: Pull latest images for infisical
      community.docker.docker_compose_v2:
        project_src: /opt/infisical
        pull: always
      register: infisical_pull_result
      when: inventory_hostname == 'infisical'
      changed_when: "'Recreate' in infisical_pull_result.stderr"

    - name: Pull latest images for lancache
      community.docker.docker_compose_v2:
        project_src: /opt/lancache
        pull: always
      register: lancache_pull_result
      when: inventory_hostname == 'lancache'
      changed_when: "'Recreate' in lancache_pull_result.stderr"

    - name: Restart docker services with latest images
      community.docker.docker_compose_v2:
        project_src: /opt
        files:
          - docker-compose.yml
        state: present
      when:
        - inventory_hostname == 'docker'
        - docker_pull_result.changed | default(false)

    - name: Restart plex services with latest images
      community.docker.docker_compose_v2:
        project_src: /opt/plex-services
        state: present
      when:
        - inventory_hostname == 'plex-services'
        - plex_pull_result.changed | default(false)

    - name: Restart monitoring with latest images
      community.docker.docker_compose_v2:
        project_src: /opt/monitoring
        state: present
      when:
        - inventory_hostname == 'openobserve'
        - monitoring_pull_result.changed | default(false)

    - name: Restart homepage with latest images
      community.docker.docker_compose_v2:
        project_src: /opt/homepage
        state: present
      when:
        - inventory_hostname == 'homepage'
        - homepage_pull_result.changed | default(false)

    - name: Restart infisical with latest images
      community.docker.docker_compose_v2:
        project_src: /opt/infisical
        state: present
      when:
        - inventory_hostname == 'infisical'
        - infisical_pull_result.changed | default(false)

    - name: Restart lancache with latest images
      community.docker.docker_compose_v2:
        project_src: /opt/lancache
        state: present
      when:
        - inventory_hostname == 'lancache'
        - lancache_pull_result.changed | default(false)

    - name: Prune unused Docker images
      ansible.builtin.shell: docker image prune -af
      changed_when: false

- name: Final Reboot
  hosts: all
  become: true
  gather_facts: false
  tasks:

  - name: Check if reboot is required
    ansible.builtin.stat:
      path: /var/run/reboot-required
    register: reboot_required_file

  - name: Reboot server if required
    ansible.builtin.reboot:
      reboot_timeout: 300
      connect_timeout: 20
      test_command: uptime
      msg: "Rebooting due to system updates"
    when: reboot_required_file.stat.exists
