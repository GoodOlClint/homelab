---

- name: Update all VMs and Proxmox server
  hosts: all
  become: true
  tasks:
    - name: Update apt cache and upgrade all packages
      ansible.builtin.apt:
        update_cache: true
        upgrade: dist
        autoremove: true
        autoclean: true
      register: upgrade_result

- name: Update all Docker containers (pull latest and recreate)
  hosts: docker,plex-services,openobserve,homepage,infisical,lancache,minio
  become: true
  vars:
    _compose_dirs:
      docker: /opt/docker
      plex-services: /opt/plex-services
      openobserve: /opt/monitoring
      homepage: /opt/homepage
      infisical: /opt/infisical
      lancache: /opt/lancache
      minio: /opt/minio
  tasks:
    - name: Pull latest images
      community.docker.docker_compose_v2:
        project_src: "{{ _compose_dirs[inventory_hostname] }}"
        pull: always
      register: pull_result

    - name: Recreate containers with latest images
      community.docker.docker_compose_v2:
        project_src: "{{ _compose_dirs[inventory_hostname] }}"
        state: present
      when: pull_result is changed

    - name: Prune unused Docker images
      ansible.builtin.shell: docker image prune -af
      changed_when: false

- name: Final Reboot
  hosts: all
  become: true
  gather_facts: false
  tasks:

  - name: Check if reboot is required
    ansible.builtin.stat:
      path: /var/run/reboot-required
    register: reboot_required_file

  - name: Reboot server if required
    ansible.builtin.reboot:
      reboot_timeout: 300
      connect_timeout: 20
      test_command: uptime
      msg: "Rebooting due to system updates"
    when: reboot_required_file.stat.exists
