---
# Bootstrap Playbook — First-time deployment
#
# Use: make bootstrap
#
# Deploys the minimum infrastructure to break the chicken-and-egg problem:
# AdGuard + Infisical. No Infisical or secrets.sops.yml dependency.
# BIND9 (authoritative DNS) is NOT included — it needs runtime secrets
# and is configured later via `make apply`.
#
# Fully automated — after this completes, run: make apply

# === Phase 0: Bootstrap facts (no Infisical, no secrets.sops.yml) ===
- name: "Bootstrap: Load facts"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Load bootstrap facts
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/bootstrap_pre_tasks.yml"
  tasks: []

# === Phase 1: AdGuard ===
- name: "Bootstrap Phase 1: Configure AdGuard"
  hosts: adguard
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Load bootstrap facts
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/bootstrap_pre_tasks.yml"
  roles:
    - adguard
  tags:
    - bootstrap
    - adguard

# === Phase 2: Infisical ===
- name: "Bootstrap Phase 2: Deploy Infisical"
  hosts: infisical
  become: true
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Load bootstrap facts
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/bootstrap_pre_tasks.yml"
  roles:
    - dns_config
    - geerlingguy.docker
    - infisical
    - hardening
  tags:
    - bootstrap
    - infisical

# === Phase 3: Configure Infisical (automated) ===
- name: "Bootstrap Phase 3: Configure Infisical"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Load bootstrap facts
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/bootstrap_pre_tasks.yml"
  tasks:
    - name: Run automated Infisical setup
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/bootstrap_infisical_setup.yml"
  tags:
    - bootstrap
    - infisical-setup

# === Phase 4: Summary ===
- name: "Bootstrap: Complete"
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
  pre_tasks:
    - name: Load bootstrap facts
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/bootstrap_pre_tasks.yml"
  tasks:
    - name: Display bootstrap summary
      ansible.builtin.debug:
        msg: |
          ============================================================
          BOOTSTRAP COMPLETE
          ============================================================
          AdGuard:    running
          Infisical:  running + configured
          Project:    homelab (prod environment)
          Identity:   ansible-admin (Universal Auth)
          Credentials saved to bootstrap.sops.yml

          Next step:  make apply
          ============================================================
