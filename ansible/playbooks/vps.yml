---
# VPS WireGuard Relay — Full Provisioning
# Configures: WireGuard tunnel, nftables forwarding, SSH hardening,
# fail2ban, AIDE, Telegraf metrics, rsyslog log shipping

- name: Configure VPS WireGuard Relay
  hosts: vps
  become: true
  vars_files:
    - ../group_vars/all.yml
  gather_facts: false
  pre_tasks:
    - name: Wait for VPS SSH to become available
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 300
      tags:
        - always

    - name: Gather facts after connection is ready
      ansible.builtin.setup:
      tags:
        - always

    - name: Check for local override vars file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/local/all.yml"
      register: local_override_vars_file
      delegate_to: localhost
      become: false
      run_once: true

    - name: Load local override vars when present
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/local/all.yml"
      when: local_override_vars_file.stat.exists
      run_once: true

    - name: Check for bootstrap credentials file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/bootstrap.sops.yml"
      register: bootstrap_vars_file
      delegate_to: localhost
      become: false
      run_once: true

    - name: Load bootstrap credentials (SOPS Tier 1)
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/bootstrap.sops.yml"
      when: bootstrap_vars_file.stat.exists
      run_once: true

    - name: Check if Infisical is reachable
      ansible.builtin.uri:
        url: "{{ bootstrap.infisical_url }}/api/status"
        method: GET
        status_code: 200
        timeout: 5
      register: infisical_health
      ignore_errors: true
      delegate_to: localhost
      become: false
      run_once: true
      when:
        - bootstrap is defined
        - bootstrap.infisical_url | default('REPLACE_ME') != 'REPLACE_ME'

    - name: Load secrets from Infisical (Tier 2)
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_login.yml"
      when:
        - infisical_health is defined
        - infisical_health is not skipped
        - infisical_health is succeeded

    - name: Fallback to SOPS secrets when Infisical unavailable
      block:
        - name: Check for legacy SOPS secrets file
          ansible.builtin.stat:
            path: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
          register: secrets_vars_file
          delegate_to: localhost
          become: false

        - name: Load SOPS secrets as fallback
          ansible.builtin.include_vars:
            file: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
          when: secrets_vars_file.stat.exists

        - name: Warn about SOPS fallback
          ansible.builtin.debug:
            msg: "WARNING: Infisical unreachable — using SOPS fallback. Secrets may be stale."
      when: >-
        infisical_health is not defined
        or infisical_health is failed
        or infisical_health is skipped
      run_once: true

    - name: Load canonical VLAN definitions
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../network-data/vlans.yaml"
        name: network_data
      run_once: true

  roles:
    - vps_wireguard
    - vps_nftables
    - vps_hardening
    - rsyslog_client
    - telegraf

  post_tasks:
    - name: Verify WireGuard interface is up
      ansible.builtin.command: wg show wg0
      register: wg_status
      changed_when: false
      failed_when: wg_status.rc != 0

    - name: Verify nftables rules are loaded
      ansible.builtin.command: nft list ruleset
      register: nft_rules
      changed_when: false
      failed_when: "'chain forward' not in nft_rules.stdout | lower"

    - name: Verify IPv6 DNAT rules are loaded
      ansible.builtin.command: nft list table ip6 nat
      register: nft_v6_rules
      changed_when: false
      failed_when: "'dnat' not in nft_v6_rules.stdout | lower"
      when: nft_tunnel_peer_ip_v6 | default('') | length > 0

    - name: Verify VPS has IPv6 connectivity
      ansible.builtin.command: ping6 -c 1 -W 5 2001:4860:4860::8888
      register: ipv6_ping
      changed_when: false
      failed_when: false
      when: nft_tunnel_peer_ip_v6 | default('') | length > 0

    - name: Display IPv6 connectivity status
      ansible.builtin.debug:
        msg: "{{ 'IPv6 connectivity: OK' if ipv6_ping.rc == 0 else 'IPv6 connectivity: FAILED (may need to wait for SLAAC)' }}"
      when: nft_tunnel_peer_ip_v6 | default('') | length > 0

    - name: Wait for WireGuard handshake (up to 60s, rebuild only)
      ansible.builtin.shell: |
        wg show wg0 latest-handshakes | awk '{print $2}'
      register: wg_handshake
      changed_when: false
      until: wg_handshake.stdout | int > 0
      retries: 12
      delay: 5
      when: wg_key_from_sops | default(false)

    - name: Check listening ports
      ansible.builtin.command: ss -tlnup
      register: ss_output
      changed_when: false

    - name: Display listening services
      ansible.builtin.debug:
        msg: "{{ ss_output.stdout_lines }}"
