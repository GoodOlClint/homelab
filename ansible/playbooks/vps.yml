---
# VPS WireGuard Relay — Full Provisioning
# Configures: WireGuard tunnel, nftables forwarding, SSH hardening,
# fail2ban, AIDE, Telegraf metrics, rsyslog log shipping

- name: Configure VPS WireGuard Relay
  hosts: vps
  become: true
  vars_files:
    - ../group_vars/all.yml
  gather_facts: false
  pre_tasks:
    - name: Wait for VPS SSH port to be open
      ansible.builtin.wait_for:
        host: "{{ ansible_host }}"
        port: 22
        delay: 10
        timeout: 300
      delegate_to: localhost
      become: false
      tags:
        - always

    - name: Wait for SSH to accept key-based authentication
      ansible.builtin.raw: /bin/true
      register: ssh_ready
      until: ssh_ready is succeeded
      retries: 30
      delay: 10
      ignore_unreachable: true
      tags:
        - always

    - name: Fail if SSH never became reachable
      ansible.builtin.fail:
        msg: >
          SSH to {{ ansible_host }} failed after 30 retries.
          Check: (1) Vultr firewall has SSH rule (vps_provisioning=true),
          (2) SSH key matches (~/.ssh/id_ed25519.pub),
          (3) Instance startup completed (check Vultr console).
      when: ssh_ready is not succeeded
      tags:
        - always

    - name: Wait for startup script to install Python3
      ansible.builtin.raw: test -f /tmp/.bootstrap_complete
      register: bootstrap_check
      until: bootstrap_check is succeeded
      retries: 30
      delay: 10
      tags:
        - always

    - name: Gather facts
      ansible.builtin.setup:
      register: gather_result
      until: gather_result is succeeded
      retries: 6
      delay: 10
      tags:
        - always

    - name: Load all configuration and secrets
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/full_pre_tasks.yml"
      vars:
        skip_vlan_computation: true

  roles:
    - vps_wireguard
    - vps_nftables
    - vps_hardening
    - rsyslog_client
    - telegraf

  post_tasks:
    - name: Verify WireGuard interface is up
      ansible.builtin.command: wg show wg0
      register: wg_status
      changed_when: false
      failed_when: wg_status.rc != 0

    - name: Verify nftables rules are loaded
      ansible.builtin.command: nft list ruleset
      register: nft_rules
      changed_when: false
      failed_when: "'chain forward' not in nft_rules.stdout | lower"

    - name: Verify IPv6 DNAT rules are loaded
      ansible.builtin.command: nft list table ip6 nat
      register: nft_v6_rules
      changed_when: false
      failed_when: "'dnat' not in nft_v6_rules.stdout | lower"
      when: nft_tunnel_peer_ip_v6 | default('') | length > 0

    - name: Verify VPS has IPv6 connectivity
      ansible.builtin.command: ping6 -c 1 -W 5 2001:4860:4860::8888
      register: ipv6_ping
      changed_when: false
      failed_when: false
      when: nft_tunnel_peer_ip_v6 | default('') | length > 0

    - name: Display IPv6 connectivity status
      ansible.builtin.debug:
        msg: "{{ 'IPv6 connectivity: OK' if ipv6_ping.rc == 0 else 'IPv6 connectivity: FAILED (may need to wait for SLAAC)' }}"
      when: nft_tunnel_peer_ip_v6 | default('') | length > 0

    - name: Wait for WireGuard handshake (up to 60s, rebuild only)
      ansible.builtin.shell: |
        wg show wg0 latest-handshakes | awk '{print $2}'
      register: wg_handshake
      changed_when: false
      until: wg_handshake.stdout | int > 0
      retries: 12
      delay: 5
      when: wg_key_from_sops | default(false)
