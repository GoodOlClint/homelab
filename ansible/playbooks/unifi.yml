---
# UniFi OS Server Deployment Playbook

- name: Deploy UniFi OS Server
  hosts: unifi
  become: true
  vars_files:
    - ../group_vars/all.yml

  pre_tasks:
    - name: Load local variable overrides
      include_vars:
        file: "../group_vars/local/overrides.yml"
      failed_when: false
      tags: always

  roles:
    - unifi
    - rsyslog_client
    - telegraf

  post_tasks:
    - name: Wait for UniFi OS Server web interface
      ansible.builtin.wait_for:
        port: 11443
        host: "{{ ansible_facts['default_ipv4']['address'] }}"
        timeout: 180
        delay: 10

    - name: Display UniFi OS Server access information
      ansible.builtin.debug:
        msg:
          - "UniFi OS Server deployment complete!"
          - ""
          - "Access URL: https://{{ ansible_facts['hostname'] }}.{{ domain_suffix | default('lab.internal') }}:11443"
          - "Alternative: https://{{ ansible_facts['default_ipv4']['address'] }}:11443"
          - ""
          - "Service management:"
          - "  Status:  uosserver status"
          - "  Restart: sudo systemctl restart uosserver"
          - "  Shell:   uosserver shell"
          - "  Logs:    sudo journalctl -u uosserver -f"
