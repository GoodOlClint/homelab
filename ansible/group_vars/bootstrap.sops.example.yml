# Bootstrap secrets — required BEFORE Infisical VM exists
# These are the only secrets stored locally. Everything else lives in Infisical.
#
# Copy to bootstrap.sops.yml and encrypt:
#   sops --encrypt --in-place ansible/group_vars/bootstrap.sops.yml
#
# BEFORE running `make bootstrap`:
#   1. Fill in provider credentials (proxmox, vultr, cloudflare)
#   2. Set infisical_admin_email
#   3. Set infisical_url (http://<services_vlan_ip>:8080)
#   4. Run: make bootstrap
#
# After bootstrap completes, run: make apply
# All Infisical config (project, identity, credentials) is auto-populated.

# Non-sensitive Infisical connection config (NOT encrypted by SOPS)
bootstrap_config:
  infisical_url: "REPLACE_ME"              # http://<services_ip>:8080
  infisical_project_id: "REPLACE_ME"       # Auto-populated by bootstrap
  infisical_org_id: "REPLACE_ME"           # Auto-populated by bootstrap
  infisical_admin_email: "REPLACE_ME"      # Your email address (required)
  infisical_org_name: "homelab"            # Organization name

# Sensitive credentials (encrypted by SOPS via encrypted_regex)
bootstrap:
  # Terraform provider credentials
  # Proxmox uses root@pam + password auth (required for PCI mapping, GPU passthrough, etc.)
  proxmox_password: "REPLACE_ME"       # root@pam password
  vultr_api_key: "REPLACE_ME"          # Vultr API key
  cloudflare_api_token: "REPLACE_ME"   # Cloudflare API token (zone:read + DNS:edit)

  # Infisical deployment secrets (auto-generated on first bootstrap if REPLACE_ME)
  # IMPORTANT: Cannot be changed after first Infisical deploy
  infisical_postgres_password: "REPLACE_ME"  # openssl rand -hex 24
  infisical_encryption_key: "REPLACE_ME"     # openssl rand -hex 16
  infisical_auth_secret: "REPLACE_ME"        # openssl rand -base64 32

  # Infisical admin password (auto-generated on first bootstrap if REPLACE_ME)
  infisical_admin_password: "REPLACE_ME"     # openssl rand -base64 32

  # Infisical Machine Identity credentials (auto-populated by bootstrap)
  infisical_client_id: "REPLACE_ME"
  infisical_client_secret: "REPLACE_ME"

  # Plex.tv account credentials (for automatic token retrieval)
  # Token is stored in Infisical at /plex/plex_token after first deploy
  plex_username: "REPLACE_ME"       # plex.tv account email
  plex_password: "REPLACE_ME"       # plex.tv account password

# External secrets — fill these in before running `make apply`
# Values left as REPLACE_ME are skipped during Infisical seeding.
# Each key maps to an Infisical folder path.
external_secrets:
  # /infrastructure — Ansible-time infrastructure credentials
  infrastructure:
    unifi_admin_password: "REPLACE_ME"
    synology_admin_password: "REPLACE_ME"

  # /monitoring — Monitoring stack external credentials
  monitoring:
    uptimerobot_heartbeat_url: "REPLACE_ME"

  # /plex — Plex VM external credentials
  plex:
    cloudflare_dns_api_token: "REPLACE_ME"

  # /plex-services — Plex-services external credentials
  plex_services:
    cloudflared_tunnel_token: "REPLACE_ME"
    usenet_newshosting_username: "REPLACE_ME"
    usenet_newshosting_password: "REPLACE_ME"
    usenet_express_username: "REPLACE_ME"
    usenet_express_password: "REPLACE_ME"
    nzbgeek_api_key: "REPLACE_ME"
    nzbplanet_api_key: "REPLACE_ME"
    opensubtitlescom_username: "REPLACE_ME"
    opensubtitlescom_password: "REPLACE_ME"

  # /docker — Docker VM external credentials
  docker:
    cloudflared_tunnel_token: "REPLACE_ME"

  # /pfsense — pfSense reference credentials
  pfsense:
    cloudflare_dns_api_token: "REPLACE_ME"

  # /vps — Only TRUE SECRETS (IPs/public keys moved to all.yml)
  vps:
    maxmind_license_key: "REPLACE_ME"

  # /homepage — Homepage dashboard user-provided widget credentials ONLY
  # API keys and infrastructure secrets are read from source folders
  # (/plex-services, /plex, /monitoring) by the homepage agent template.
  homepage:
    adguard_username: "REPLACE_ME"
    adguard_password: "REPLACE_ME"
    unifi_username: "REPLACE_ME"
    unifi_password: "REPLACE_ME"
    authentik_token: "REPLACE_ME"          # Long-lived API token
    portainer_api_key: "REPLACE_ME"        # Generated in Portainer UI
