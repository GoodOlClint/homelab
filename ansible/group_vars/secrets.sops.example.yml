# Example structure for sops-encrypted secrets file.
# Copy to ansible/group_vars/secrets.sops.yml then encrypt:
#   sops --encrypt --in-place ansible/group_vars/secrets.sops.yml

secrets:
  unifi_admin_user: "REPLACE_ME"
  unifi_admin_password: "REPLACE_ME"
  unifi_monitoring_user: "REPLACE_ME"
  unifi_monitoring_password: "REPLACE_ME"

  proxmox_api_user: "REPLACE_ME"
  proxmox_api_token: "REPLACE_ME"

  pbs_admin_password: "REPLACE_ME"
  pbs_backup_token: "REPLACE_ME"

  cloudflared_tunnel_token: "REPLACE_ME"
