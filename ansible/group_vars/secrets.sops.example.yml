# Example structure for sops-encrypted secrets file.
# Copy to ansible/group_vars/secrets.sops.yml then encrypt:
#   sops --encrypt --in-place ansible/group_vars/secrets.sops.yml

secrets:
  openobserve_root_user_pass: "REPLACE_ME"
  grafana_admin_password: "REPLACE_ME"

  unifi_admin_user: "REPLACE_ME"
  unifi_admin_password: "REPLACE_ME"
  unifi_password: "REPLACE_ME"
  unifi_monitoring_user: "REPLACE_ME"
  unifi_monitoring_password: "REPLACE_ME"

  proxmox_api_user: "REPLACE_ME"
  proxmox_api_token: "REPLACE_ME"
  proxmox_token_value: "REPLACE_ME"

  synology_admin_password: "REPLACE_ME"

  pbs_admin_password: "REPLACE_ME"
  pbs_backup_user_password: "REPLACE_ME"
  pbs_backup_token: "REPLACE_ME"
  pbs_api_token: "REPLACE_ME"
  pbs_monitoring_token: "REPLACE_ME"

  cloudflared_tunnel_token: "REPLACE_ME"

  # BIND9 TSIG key for pfSense DHCP dynamic DNS updates (RFC 2136)
  # Generate with: tsig-keygen -a hmac-sha256 dhcp-update-key | grep secret | awk '{print $2}' | tr -d '";'
  bind_tsig_key_secret: "REPLACE_ME"

  postgres_password: "REPLACE_ME"
  plex_smb_pass: "REPLACE_ME"

  # VPS WireGuard Relay
  # pfsense_wg_public_key: get from pfSense VPN > WireGuard > Tunnels (VPS tunnel public key)
  pfsense_wg_public_key: "REPLACE_ME"
  # vps_wg_private_key: auto-generated on first deploy. Save the displayed key here for rebuilds.
  # Leave as REPLACE_ME for first deploy — a new keypair will be generated automatically.
  vps_wg_private_key: "REPLACE_ME"

  # GeoIP filtering (MaxMind GeoLite2 — free license key from maxmind.com)
  maxmind_license_key: "REPLACE_ME"

  # Let's Encrypt certificate for Plex (DNS-01 via Cloudflare)
  # Create a scoped API token at https://dash.cloudflare.com/profile/api-tokens
  # Permissions: Zone:DNS:Edit for clintflix.tv only
  cloudflare_dns_api_token: "REPLACE_ME"
  # Password for PKCS#12 certificate file (any strong random string)
  plex_cert_pfx_password: "REPLACE_ME"

  # Valheim dedicated server password (minimum 5 characters)
  valheim_server_password: "REPLACE_ME"

  # Authentik SSO
  # Generate secret key with: openssl rand -base64 60
  authentik_secret_key: "REPLACE_ME"
  authentik_postgres_password: "REPLACE_ME"

  # UptimeRobot heartbeat URL (get from UptimeRobot dashboard after creating heartbeat monitor)
  uptimerobot_heartbeat_url: "REPLACE_ME"
