---
- name: Verify required pre_tasks facts
  ansible.builtin.assert:
    that:
      - dns_zones is defined
    fail_msg: "Required facts not available. This role must run from a playbook that includes full_pre_tasks.yml."
    quiet: true

- name: Install Telegraf (Debian/Ubuntu)
  ansible.builtin.include_tasks: install-debian.yml
  when: ansible_facts['os_family'] == "Debian"

- name: Install Telegraf (Alpine)
  ansible.builtin.include_tasks: install-alpine.yml
  when: ansible_facts['os_family'] == "Alpine"

- name: Install libcap for setcap/getcap (Alpine)
  community.general.apk:
    name: libcap
    state: present
  when: inventory_hostname == 'vps' and ansible_facts['os_family'] == 'Alpine'
  tags:
    - telegraf
    - config

- name: Grant Telegraf NET_ADMIN capability for WireGuard metrics
  community.general.capabilities:
    path: /usr/bin/telegraf
    capability: cap_net_admin+epi
    state: present
  when: inventory_hostname == 'vps'
  notify: Restart Telegraf
  tags:
    - telegraf
    - config

- name: Check if docker group exists
  ansible.builtin.getent:
    database: group
    key: docker
    fail_key: false
  tags:
    - telegraf
    - config

- name: Add telegraf user to docker group for container monitoring
  ansible.builtin.user:
    name: telegraf
    groups: docker
    append: true
  when: getent_group.docker is not none
  notify: Restart Telegraf
  tags:
    - telegraf
    - config

- name: Configure Telegraf to send metrics to OpenObserve
  ansible.builtin.template:
    src: telegraf-openobserve.conf.j2
    dest: /etc/telegraf/telegraf.d/openobserve.conf
    mode: '0644'
  notify: Restart Telegraf
  tags:
    - telegraf
    - config

- name: Validate Telegraf configuration syntax
  ansible.builtin.command: telegraf --config /etc/telegraf/telegraf.conf --config-directory /etc/telegraf/telegraf.d config
  register: telegraf_test
  changed_when: false
  failed_when: telegraf_test.rc != 0
  tags:
    - telegraf
    - config
    - validate

- name: Ensure Telegraf is started and enabled
  ansible.builtin.service:
    name: telegraf
    state: started
    enabled: true

  tags:
    - telegraf
    - service
