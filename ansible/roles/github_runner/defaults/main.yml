---
# github_runner role defaults

# Base installation directory (each instance gets a numbered subdirectory)
github_runner_base_dir: /opt/actions-runner

# System user to run the runner service
github_runner_user: runner

# Repository to register runner with
github_runner_repo: "goodolclint/PSProxmoxVE"

# Runner name prefix (instances are named <prefix>-1, <prefix>-2, etc.)
github_runner_name_prefix: "{{ inventory_hostname }}"

# Runner labels
github_runner_labels: "self-hosted,proxmox,integration"

# Number of parallel runner instances
github_runner_count: 2
