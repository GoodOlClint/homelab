---
# GitHub Actions self-hosted runner
#
# Installs multiple GitHub Actions runner instances as systemd services with
# Docker for container-based CI workflows. Runner count is configurable via
# github_runner_count (default: 2).
#
# Authentication uses a GitHub App (no expiring PATs). The App's private key
# and ID are stored in Infisical /github-runner. At registration time, we
# generate a short-lived JWT, exchange it for an installation token, then
# use that to get a runner registration token.

- name: Verify required pre_tasks facts
  ansible.builtin.assert:
    that:
      - mgmt_vlan_prefix is defined
      - secrets is defined
    fail_msg: "Required facts not available. This role must run from a playbook that includes full_pre_tasks.yml."
    quiet: true

- name: Verify GitHub App credentials are available
  ansible.builtin.assert:
    that:
      - (secrets.github_runner | default({})).github_app_id | default('REPLACE_ME') != 'REPLACE_ME'
      - (secrets.github_runner | default({})).github_app_id | default('') | length > 0
      - (secrets.github_runner | default({})).github_app_private_key | default('REPLACE_ME') != 'REPLACE_ME'
      - (secrets.github_runner | default({})).github_app_private_key | default('') | length > 0
      - (secrets.github_runner | default({})).github_app_installation_id | default('REPLACE_ME') != 'REPLACE_ME'
      - (secrets.github_runner | default({})).github_app_installation_id | default('') | length > 0
    fail_msg: >-
      GitHub App credentials not found in Infisical /github-runner folder.
      Create a GitHub App with Administration read+write permission on
      {{ github_runner_repo }}, then store github_app_id, github_app_private_key,
      and github_app_installation_id in Infisical before running this role.
    quiet: true

# --- Prerequisite packages ---

- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - curl
      - jq
    state: present
    update_cache: true
  tags: [github-runner, packages]

- name: Load NFS kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present
  loop:
    - nfs
    - nfsd
  tags: [github-runner, packages]

# --- Users ---

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user | default(lookup('env', 'USER')) }}"
    groups: docker
    append: true
  tags: [github-runner, user]

- name: Create runner system user
  ansible.builtin.user:
    name: "{{ github_runner_user }}"
    home: "{{ github_runner_base_dir }}"
    shell: /bin/bash
    system: true
    create_home: true
    groups: docker
    append: true
  tags: [github-runner, user]

# --- Build runner instance list ---

- name: Set runner instance facts
  ansible.builtin.set_fact:
    _runner_instances: >-
      {{ range(1, github_runner_count + 1) | map('regex_replace', '^(.*)$', '\1') | list }}
  tags: [github-runner]

# --- GitHub Actions runner installation (per instance) ---

- name: Create runner instance directories
  ansible.builtin.file:
    path: "{{ github_runner_base_dir }}/{{ item }}"
    state: directory
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
    mode: '0755'
  loop: "{{ _runner_instances }}"
  loop_control:
    label: "runner-{{ item }}"
  tags: [github-runner, install]

- name: Check if runners are already installed
  ansible.builtin.stat:
    path: "{{ github_runner_base_dir }}/{{ item }}/config.sh"
  loop: "{{ _runner_instances }}"
  loop_control:
    label: "runner-{{ item }}"
  register: _runners_installed
  tags: [github-runner, install]

- name: Get latest runner release version
  ansible.builtin.uri:
    url: https://api.github.com/repos/actions/runner/releases/latest
    return_content: true
    headers:
      Accept: application/vnd.github+json
  register: _runner_release
  delegate_to: localhost
  become: false
  when: _runners_installed.results | selectattr('stat.exists', 'equalto', false) | list | length > 0
  tags: [github-runner, install]

- name: Download and extract runner to each instance directory
  ansible.builtin.unarchive:
    src: "https://github.com/actions/runner/releases/download/{{ _runner_release.json.tag_name }}/actions-runner-linux-x64-{{ _runner_release.json.tag_name | regex_replace('^v', '') }}.tar.gz"
    dest: "{{ github_runner_base_dir }}/{{ item.item }}"
    remote_src: true
    owner: "{{ github_runner_user }}"
    group: "{{ github_runner_user }}"
  loop: "{{ _runners_installed.results }}"
  loop_control:
    label: "runner-{{ item.item }}"
  when: not item.stat.exists
  tags: [github-runner, install]

- name: Install runner dependencies
  ansible.builtin.command:
    cmd: "{{ github_runner_base_dir }}/{{ item.item }}/bin/installdependencies.sh"
  loop: "{{ _runners_installed.results }}"
  loop_control:
    label: "runner-{{ item.item }}"
  when: not item.stat.exists
  changed_when: true
  tags: [github-runner, install]

# --- Runner registration via GitHub App ---

- name: Check if runners are already configured
  ansible.builtin.stat:
    path: "{{ github_runner_base_dir }}/{{ item }}/.runner"
  loop: "{{ _runner_instances }}"
  loop_control:
    label: "runner-{{ item }}"
  register: _runners_configured
  tags: [github-runner, config]

- name: Set unconfigured runner list
  ansible.builtin.set_fact:
    _unconfigured_runners: "{{ _runners_configured.results | selectattr('stat.exists', 'equalto', false) | list }}"
  tags: [github-runner, config]

- name: Write GitHub App private key to temp file
  ansible.builtin.copy:
    content: "{{ secrets.github_runner.github_app_private_key }}"
    dest: /tmp/.github_app_key.pem
    mode: '0600'
  delegate_to: localhost
  become: false
  no_log: true
  when: _unconfigured_runners | length > 0
  tags: [github-runner, config]

- name: Generate GitHub App JWT
  ansible.builtin.shell:
    cmd: |
      set -euo pipefail
      app_id='{{ secrets.github_runner.github_app_id }}'
      now=$(date +%s)
      iat=$((now - 60))
      exp=$((now + 600))
      b64url() { openssl base64 -e -A | tr '+/' '-_' | tr -d '='; }
      header=$(printf '{"alg":"RS256","typ":"JWT"}' | b64url)
      payload=$(printf '{"iss":"%s","iat":%d,"exp":%d}' "$app_id" "$iat" "$exp" | b64url)
      signature=$(printf '%s.%s' "$header" "$payload" | \
        openssl dgst -sha256 -sign /tmp/.github_app_key.pem -binary | b64url)
      printf '%s.%s.%s' "$header" "$payload" "$signature"
    executable: /bin/bash
  register: _github_app_jwt
  delegate_to: localhost
  become: false
  changed_when: false
  no_log: true
  when: _unconfigured_runners | length > 0
  tags: [github-runner, config]

- name: Remove temp private key file
  ansible.builtin.file:
    path: /tmp/.github_app_key.pem
    state: absent
  delegate_to: localhost
  become: false
  when: _unconfigured_runners | length > 0
  tags: [github-runner, config]

- name: Get GitHub App installation token
  ansible.builtin.uri:
    url: "https://api.github.com/app/installations/{{ secrets.github_runner.github_app_installation_id }}/access_tokens"
    method: POST
    headers:
      Accept: application/vnd.github+json
      Authorization: "Bearer {{ _github_app_jwt.stdout }}"
    return_content: true
    status_code: 201
  register: _github_installation_token
  delegate_to: localhost
  become: false
  no_log: true
  when:
    - _unconfigured_runners | length > 0
    - _github_app_jwt is not skipped
  tags: [github-runner, config]

- name: Get runner registration tokens
  ansible.builtin.uri:
    url: "https://api.github.com/repos/{{ github_runner_repo }}/actions/runners/registration-token"
    method: POST
    headers:
      Accept: application/vnd.github+json
      Authorization: "Bearer {{ _github_installation_token.json.token }}"
    return_content: true
    status_code: 201
  register: _runner_reg_tokens
  delegate_to: localhost
  become: false
  no_log: true
  loop: "{{ _unconfigured_runners }}"
  loop_control:
    label: "runner-{{ item.item }}"
  when:
    - _github_installation_token is not skipped
  tags: [github-runner, config]

- name: Configure runner instances
  ansible.builtin.command:
    cmd: >-
      su -s /bin/bash {{ github_runner_user }} -c '
      {{ github_runner_base_dir }}/{{ item.0.item }}/config.sh
      --url https://github.com/{{ github_runner_repo }}
      --token {{ item.1.json.token }}
      --name {{ github_runner_name_prefix }}-{{ item.0.item }}
      --labels {{ github_runner_labels }}
      --work {{ github_runner_base_dir }}/{{ item.0.item }}/_work
      --unattended
      --replace'
    chdir: "{{ github_runner_base_dir }}/{{ item.0.item }}"
  loop: "{{ _unconfigured_runners | zip(_runner_reg_tokens.results) | list }}"
  loop_control:
    label: "runner-{{ item.0.item }}"
  when:
    - _runner_reg_tokens is not skipped
  no_log: true
  changed_when: true
  tags: [github-runner, config]

# --- Systemd services ---

- name: Install runner systemd services
  ansible.builtin.command:
    cmd: "{{ github_runner_base_dir }}/{{ item }}/svc.sh install {{ github_runner_user }}"
    creates: "/etc/systemd/system/actions.runner.{{ github_runner_repo | replace('/', '-') }}.{{ github_runner_name_prefix }}-{{ item }}.service"
    chdir: "{{ github_runner_base_dir }}/{{ item }}"
  loop: "{{ _runner_instances }}"
  loop_control:
    label: "runner-{{ item }}"
  tags: [github-runner, service]

- name: Enable and start runner services
  ansible.builtin.systemd:
    name: "actions.runner.{{ github_runner_repo | replace('/', '-') }}.{{ github_runner_name_prefix }}-{{ item }}.service"
    enabled: true
    state: started
    daemon_reload: true
  loop: "{{ _runner_instances }}"
  loop_control:
    label: "runner-{{ item }}"
  tags: [github-runner, service]
