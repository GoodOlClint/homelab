---
# VPS nftables — default-deny, port forwarding, GeoIP, rate limiting

- name: Validate required nftables variables
  ansible.builtin.assert:
    that:
      - nft_tunnel_peer_ip | default('') | length > 0
    fail_msg: >-
      Missing required nftables config. Set nft_tunnel_peer_ip in
      secrets.sops.yml (pfSense tunnel IP — DNAT target for forwarded traffic)
  tags:
    - vps_nftables
    - validate

- name: Install nftables
  ansible.builtin.apk:
    name: nftables
    state: present
    update_cache: yes
  tags:
    - vps_nftables
    - packages

- name: Deploy nftables configuration
  ansible.builtin.template:
    src: nftables.conf.j2
    dest: /etc/nftables.nft
    owner: root
    group: root
    mode: '0600'
  notify: Reload nftables
  tags:
    - vps_nftables
    - config

- name: Enable nftables on boot
  ansible.builtin.command: rc-update add nftables default
  args:
    creates: /etc/runlevels/default/nftables
  tags:
    - vps_nftables
    - service

- name: Start nftables
  ansible.builtin.service:
    name: nftables
    state: started
  tags:
    - vps_nftables
    - service

# GeoIP filtering (optional)
- name: Install GeoIP dependencies
  ansible.builtin.apk:
    name:
      - wget
      - unzip
    state: present
  when: nft_geoip_enabled
  tags:
    - vps_nftables
    - geoip

- name: Create GeoIP database directory
  ansible.builtin.file:
    path: "{{ nft_maxmind_db_path }}"
    state: directory
    mode: '0755'
  when: nft_geoip_enabled
  tags:
    - vps_nftables
    - geoip

- name: Deploy GeoIP update script
  ansible.builtin.template:
    src: geoip-update.sh.j2
    dest: /usr/local/bin/geoip-update.sh
    owner: root
    group: root
    mode: '0755'
  when: nft_geoip_enabled
  tags:
    - vps_nftables
    - geoip

- name: Run initial GeoIP database download
  ansible.builtin.command: /usr/local/bin/geoip-update.sh
  args:
    creates: "{{ nft_maxmind_db_path }}/allowed-countries-v4.nft"
  when: nft_geoip_enabled and nft_maxmind_license_key | length > 0
  tags:
    - vps_nftables
    - geoip

- name: Schedule weekly GeoIP updates
  ansible.builtin.cron:
    name: "GeoIP database update"
    job: "/usr/local/bin/geoip-update.sh"
    weekday: "0"
    hour: "3"
    minute: "0"
  when: nft_geoip_enabled
  tags:
    - vps_nftables
    - geoip

# Flush handlers so config reload happens before validation
- name: Flush handlers before validation
  ansible.builtin.meta: flush_handlers

# Validation
- name: Verify nftables rules are loaded
  ansible.builtin.command: nft list ruleset
  register: nft_rules
  changed_when: false
  tags:
    - vps_nftables
    - validate

- name: Debug nftables loaded ruleset
  ansible.builtin.debug:
    msg: "{{ nft_rules.stdout_lines }}"
  tags:
    - vps_nftables
    - validate

- name: Assert nftables has forward chain
  ansible.builtin.assert:
    that:
      - "nft_rules.stdout | lower is search('chain forward')"
    fail_msg: "nftables forward chain not found in loaded ruleset"
  tags:
    - vps_nftables
    - validate

- name: Assert DNAT rules exist
  ansible.builtin.assert:
    that:
      - "nft_rules.stdout is search('dnat (ip )?to ' ~ nft_tunnel_peer_ip)"
    fail_msg: "DNAT rule for {{ nft_tunnel_peer_ip }} not found in nftables ruleset"
  tags:
    - vps_nftables
    - validate

- name: Assert IPv6 DNAT rules exist
  ansible.builtin.assert:
    that:
      - "nft_rules.stdout is search('dnat (ip6 )?to ' ~ nft_tunnel_peer_ip_v6)"
    fail_msg: "IPv6 DNAT rule for {{ nft_tunnel_peer_ip_v6 }} not found in nftables ruleset"
  when: nft_tunnel_peer_ip_v6 | default('') | length > 0
  tags:
    - vps_nftables
    - validate
