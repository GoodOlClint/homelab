---
- name: Ensure rsyslog is installed
  ansible.builtin.package:
    name: rsyslog
    state: present
  tags:
    - rsyslog_client
    - logging
    - packages

- name: Ensure rsyslog.d directory exists
  ansible.builtin.file:
    path: /etc/rsyslog.d
    state: directory
    mode: '0755'
  tags:
    - rsyslog_client
    - logging
    - config

- name: Ensure no conflicting rsyslog forwarding configs
  ansible.builtin.shell: "ls /etc/rsyslog.d/*forward* /etc/rsyslog.d/*remote* 2>/dev/null || true"
  register: stale_rsyslog_configs
  changed_when: false
  tags:
    - rsyslog_client
    - logging

- name: Warn about conflicting rsyslog configs
  ansible.builtin.debug:
    msg: "WARNING: Found potential conflicting rsyslog configs: {{ stale_rsyslog_configs.stdout_lines }}"
  when: stale_rsyslog_configs.stdout | length > 0
  tags:
    - rsyslog_client
    - logging

- name: Configure rsyslog to forward logs to monitoring VM
  ansible.builtin.template:
    src: 99-openobserve.conf.j2
    dest: /etc/rsyslog.d/99-openobserve.conf
    mode: '0644'
    owner: root
    group: root
  notify: restart rsyslog
  tags:
    - rsyslog_client
    - logging
    - config
