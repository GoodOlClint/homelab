---
# Ansible Role: Hardening
# Harden Linux VMs for security best practices

- name: Ensure UFW is installed
  apt:
    name: ufw
    state: present
  become: true
  tags:
    - hardening
    - firewall
    - packages

- name: Reset UFW rules before applying managed firewall policy
  ufw:
    state: reset
  when:
    - (hardening_ufw_default_policies | default([]) | length) > 0 or (hardening_ufw_rules | default([]) | length) > 0
  become: true
  tags:
    - hardening
    - firewall

- name: Apply managed UFW default policies
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop: "{{ hardening_ufw_default_policies | default([]) }}"
  when: (hardening_ufw_default_policies | default([]) | length) > 0
  become: true
  tags:
    - hardening
    - firewall

- name: Apply managed UFW explicit rules
  ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port | default(omit) }}"
    proto: "{{ item.proto | default(omit) }}"
    from_ip: "{{ item.from_ip | default(omit) }}"
    to_ip: "{{ item.to_ip | default(omit) }}"
    direction: "{{ item.direction | default(omit) }}"
    interface: "{{ item.interface | default(omit) }}"
    route: "{{ item.route | default(omit) }}"
  loop: "{{ hardening_ufw_rules | default([]) }}"
  when: (hardening_ufw_rules | default([]) | length) > 0
  become: true
  tags:
    - hardening
    - firewall

- name: Enable UFW when managed policy is supplied
  ufw:
    state: enabled
  when:
    - (hardening_ufw_default_policies | default([]) | length) > 0 or (hardening_ufw_rules | default([]) | length) > 0
  become: true
  tags:
    - hardening
    - firewall

- name: Restrict SSH to management interface only
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?ListenAddress '
    line: 'ListenAddress {{ ansible_host }}'
    state: present
  notify: Restart SSH
  become: true
  tags:
    - hardening
    - ssh
    - security

- name: Disable SSH password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  notify: Restart SSH
  become: true
  tags:
    - hardening
    - ssh
    - security

- name: Install unattended-upgrades
  apt:
    name: unattended-upgrades
    state: present
  become: true
  tags:
    - hardening
    - packages
    - updates

- name: Enable automatic security updates
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  become: true
  tags:
    - hardening
    - config
    - updates

- name: Disable and stop unused services
  service:
    name: "{{ item }}"
    state: stopped
    enabled: false
  loop: "{{ hardening_disable_services | default([]) }}"
  when: hardening_disable_services is defined
  become: true
  tags:
    - hardening
    - services

- name: Install auditd for auditing
  apt:
    name: auditd
    state: present
  become: true
  tags:
    - hardening
    - packages
    - audit

- name: Ensure auditd is running
  service:
    name: auditd
    state: started
    enabled: true
  become: true
  tags:
    - hardening
    - audit
    - services

- name: Harden sysctl settings
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop: "{{ hardening_sysctl_settings | default([]) }}"
  when: hardening_sysctl_settings is defined
  become: true
  tags:
    - hardening
    - sysctl
    - security

- name: Set permissions on sensitive files
  file:
    path: "{{ item.path }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { path: '/etc/shadow', mode: '0600' }
    - { path: '/etc/ssh/sshd_config', mode: '0600' }
  become: true
  tags:
    - hardening
    - permissions
    - security
