
---
- name: Install bind9
  ansible.builtin.apt:
    name:
      - bind9
      - bind9utils
      - dnsutils
    state: present
    update_cache: true

  tags:
    - bind9
    - dns
    - packages

# --- Auto-generate BIND TSIG key if not already set ---
- name: Auto-generate bind_tsig_key_secret
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "bind_tsig_key_secret"
    secret_gen_cmd: >-
      tsig-keygen -a hmac-sha256 dhcp-update-key
      | grep secret
      | awk '{print $2}'
      | tr -d '";'
    secret_comment: "BIND9 TSIG key for pfSense DHCP dynamic DNS updates (hmac-sha256) — auto-generated"
    secret_run_on: "{{ inventory_hostname }}"
  tags: [bind9, dns, secrets]

- name: Configure named.conf.options
  ansible.builtin.template:
    src: named.conf.options.j2
    dest: /etc/bind/named.conf.options
    mode: '0644'
  notify: Restart bind9
  tags:
    - bind9
    - dns
    - config

- name: Configure named.conf.local for zones
  ansible.builtin.template:
    src: named.conf.local.j2
    dest: /etc/bind/named.conf.local
    mode: '0644'
  notify: Restart bind9
  tags:
    - bind9
    - dns
    - config
    - zones

# --- Forward zone files ---

- name: Check if forward zone files exist
  ansible.builtin.stat:
    path: "/etc/bind/db.{{ item.value.zone }}"
  loop: "{{ dns_zones | dict2items }}"
  register: forward_zone_files_stat
  tags:
    - bind9
    - dns
    - zones

- name: Create forward zone files (only if they don't exist)
  ansible.builtin.template:
    src: db.zone.j2
    dest: "/etc/bind/db.{{ item.item.value.zone }}"
    mode: '0644'
  vars:
    zone_name: "{{ item.item.value.zone }}"
    zone_dns_ip: "{{ item.item.value.dns_ip }}"
  loop: "{{ forward_zone_files_stat.results }}"
  when: not item.stat.exists
  notify: Restart bind9
  tags:
    - bind9
    - dns
    - zones
    - config

- name: Set ownership of forward zone files
  ansible.builtin.file:
    path: "/etc/bind/db.{{ item.value.zone }}"
    owner: bind
    group: bind
    mode: '0644'
  loop: "{{ dns_zones | dict2items }}"
  tags:
    - bind9
    - dns
    - zones

# --- Reverse zone files ---

- name: Check if reverse zone files exist
  ansible.builtin.stat:
    path: "/etc/bind/db.{{ item.value.vlan_id }}.16.172.in-addr.arpa"
  loop: "{{ dns_zones | dict2items }}"
  register: reverse_zone_files_stat
  tags:
    - bind9
    - dns
    - zones

- name: Create reverse zone files (only if they don't exist)
  ansible.builtin.template:
    src: db.reverse-zone.j2
    dest: "/etc/bind/db.{{ item.item.value.vlan_id }}.16.172.in-addr.arpa"
    mode: '0644'
  vars:
    forward_zone: "{{ item.item.value.zone }}"
    zone_dns_ip: "{{ item.item.value.dns_ip }}"
  loop: "{{ reverse_zone_files_stat.results }}"
  when: not item.stat.exists
  notify: Restart bind9
  tags:
    - bind9
    - dns
    - zones
    - config

- name: Set ownership of reverse zone files
  ansible.builtin.file:
    path: "/etc/bind/db.{{ item.value.vlan_id }}.16.172.in-addr.arpa"
    owner: bind
    group: bind
    mode: '0644'
  loop: "{{ dns_zones | dict2items }}"
  tags:
    - bind9
    - dns
    - zones

# --- Directory and permissions ---

- name: Ensure /etc/bind directory is writable by bind user
  ansible.builtin.file:
    path: /etc/bind
    owner: bind
    group: bind
    mode: '0755'
    state: directory
  tags:
    - bind9
    - dns
    - config

# --- Journal file validation ---

- name: Check for corrupted journal files
  ansible.builtin.shell: |
    for zone in /etc/bind/db.*.jnl; do
      if [ -f "$zone" ]; then
        named-journalprint "$zone" > /dev/null 2>&1 || echo "$zone"
      fi
    done
  register: corrupt_journals
  changed_when: false
  failed_when: false
  tags:
    - bind9
    - dns
    - validate

- name: Remove corrupted journal files if found
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ corrupt_journals.stdout_lines }}"
  when: corrupt_journals.stdout_lines | length > 0
  notify: Restart bind9
  tags:
    - bind9
    - dns
    - validate

# --- Service health checks ---

- name: Flush handlers to ensure bind9 is restarted if needed
  ansible.builtin.meta: flush_handlers
  tags:
    - bind9
    - dns

- name: Wait for DNS server to be responsive
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 53
    timeout: 30
  tags:
    - bind9
    - dns
    - validate

- name: Wait a few seconds for DNS to fully initialize
  ansible.builtin.pause:
    seconds: 3
  tags:
    - bind9
    - dns
    - validate

- name: Check if forward zones are loaded in BIND
  ansible.builtin.shell: |
    loaded=0
    failed=0
    for zone in {{ dns_zones.values() | map(attribute='zone') | join(' ') }}; do
      if rndc zonestatus "$zone" > /dev/null 2>&1; then
        loaded=$((loaded + 1))
      else
        failed=$((failed + 1))
      fi
    done
    echo "loaded=$loaded failed=$failed"
  register: zone_status_check
  changed_when: false
  failed_when: false
  tags:
    - bind9
    - dns
    - zones
    - validate

- name: Remove all journal files if zones failed to load
  block:
    - name: Stop BIND service
      ansible.builtin.systemd:
        name: named
        state: stopped

    - name: Remove all journal files
      ansible.builtin.shell: rm -f /etc/bind/*.jnl

    - name: Start BIND service
      ansible.builtin.systemd:
        name: named
        state: started

    - name: Wait for DNS to restart
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 53
        timeout: 30

    - name: Pause for DNS initialization
      ansible.builtin.pause:
        seconds: 3
  when: "'failed=0' not in zone_status_check.stdout"
  tags:
    - bind9
    - dns
    - zones
    - service

- name: Verify BIND is responding for local zones
  ansible.builtin.command: dig +short +time=2 +tries=3 @127.0.0.1 {{ (dns_zones.values() | first).zone }} SOA
  register: dns_test
  retries: 5
  delay: 2
  until: dns_test.rc == 0 and dns_test.stdout != ""
  changed_when: false
  tags:
    - bind9
    - dns
    - validate
