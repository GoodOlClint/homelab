# ACL Configuration
- name: Read current ACL list
  ansible.builtin.command: proxmox-backup-manager acl list --output-format json
  register: _pbs_acl_list
  changed_when: false
  tags:
    - proxmox_backup
    - pbs
    - backup
    - acl

- name: Parse current ACLs
  ansible.builtin.set_fact:
    _pbs_acls: "{{ ((_pbs_acl_list.stdout | default('', true)) or '[]') | from_json }}"
  tags:
    - proxmox_backup
    - pbs
    - backup
    - acl

- name: Grant backup user DatastoreAdmin permissions (needed for namespace creation)
  ansible.builtin.shell: |
    proxmox-backup-manager acl update /datastore/{{ item.name }} DatastoreAdmin \
      --auth-id backup@pbs
  loop: "{{ pbs_datastores }}"
  when: _pbs_acls | selectattr('path', 'eq', '/datastore/' ~ item.name)
        | selectattr('roleid', 'eq', 'DatastoreAdmin')
        | selectattr('ugid', 'eq', 'backup@pbs') | list | length == 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - acl

# API Token Generation (must happen before ACL grants that reference tokens)
- name: Check if API token exists for backup user
  ansible.builtin.shell: proxmox-backup-manager user list-tokens backup@pbs --output-format json
  register: pbs_token_list
  changed_when: false
  failed_when: false

- name: Generate API token for backup user
  ansible.builtin.shell: |
    proxmox-backup-manager user generate-token backup@pbs backup-token
  register: pbs_token_output
  when: ((pbs_token_list.stdout | default('', true)) or '[]') | from_json | length == 0

- name: Store PBS backup token in Infisical
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_write_secret.yml"
  vars:
    secret_name: "PBS_BACKUP_TOKEN"
    secret_value: "{{ pbs_token_output.stdout | regex_search('\"value\": \"([^\"]+)\"', '\\1') | first }}"
    secret_path: "/shared"
    secret_comment: "PBS backup@pbs backup-token — auto-generated"
  when:
    - pbs_token_output is changed
    - pbs_token_output.stdout is defined
    - infisical_login is defined

- name: Display PBS backup token (when Infisical unavailable)
  ansible.builtin.debug:
    msg: "PBS backup token generated. Save to secrets.sops.yml: {{ pbs_token_output.stdout | regex_search('\"value\": \"([^\"]+)\"', '\\1') | first }}"
    verbosity: 1
  when:
    - pbs_token_output is changed
    - pbs_token_output.stdout is defined
    - infisical_login is not defined
  no_log: "{{ not (ansible_verbosity >= 1) }}"

# API Token Generation - Monitoring User
- name: Check if API token exists for monitoring user
  ansible.builtin.shell: proxmox-backup-manager user list-tokens monitoring@pbs --output-format json
  register: pbs_monitoring_token_list
  changed_when: false
  failed_when: false

- name: Generate API token for monitoring user
  ansible.builtin.shell: |
    proxmox-backup-manager user generate-token monitoring@pbs monitoring-token
  register: pbs_monitoring_token_output
  when: ((pbs_monitoring_token_list.stdout | default('', true)) or '[]') | from_json | length == 0

- name: Store PBS monitoring token in Infisical
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_write_secret.yml"
  vars:
    secret_name: "PBS_MONITORING_TOKEN"
    secret_value: "{{ pbs_monitoring_token_output.stdout | regex_search('\"value\": \"([^\"]+)\"', '\\1') | first }}"
    secret_path: "/monitoring"
    secret_comment: "PBS monitoring@pbs monitoring-token — auto-generated"
  when:
    - pbs_monitoring_token_output is changed
    - pbs_monitoring_token_output.stdout is defined
    - infisical_login is defined

- name: Display PBS monitoring token (when Infisical unavailable)
  ansible.builtin.debug:
    msg: "PBS monitoring token generated. Save to secrets.sops.yml: {{ pbs_monitoring_token_output.stdout | regex_search('\"value\": \"([^\"]+)\"', '\\1') | first }}"
    verbosity: 1
  when:
    - pbs_monitoring_token_output is changed
    - pbs_monitoring_token_output.stdout is defined
    - infisical_login is not defined
  no_log: "{{ not (ansible_verbosity >= 1) }}"

# ACL Grants — tokens now exist, safe to reference them
- name: Grant API token DatastoreAdmin permissions (needed for namespace creation)
  ansible.builtin.shell: |
    proxmox-backup-manager acl update /datastore/{{ item.name }} DatastoreAdmin \
      --auth-id 'backup@pbs!backup-token'
  loop: "{{ pbs_datastores }}"
  when: _pbs_acls | selectattr('path', 'eq', '/datastore/' ~ item.name)
        | selectattr('roleid', 'eq', 'DatastoreAdmin')
        | selectattr('ugid', 'eq', 'backup@pbs!backup-token') | list | length == 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - acl

# Grant monitoring user Audit (read-only) permissions
- name: Grant monitoring user Audit permissions on datastores
  ansible.builtin.shell: |
    proxmox-backup-manager acl update /datastore/{{ item.name }} Audit \
      --auth-id monitoring@pbs
  loop: "{{ pbs_datastores }}"
  when: _pbs_acls | selectattr('path', 'eq', '/datastore/' ~ item.name)
        | selectattr('roleid', 'eq', 'Audit')
        | selectattr('ugid', 'eq', 'monitoring@pbs') | list | length == 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - acl

- name: Grant monitoring token Audit permissions on datastores
  ansible.builtin.shell: |
    proxmox-backup-manager acl update /datastore/{{ item.name }} Audit \
      --auth-id 'monitoring@pbs!monitoring-token'
  loop: "{{ pbs_datastores }}"
  when: _pbs_acls | selectattr('path', 'eq', '/datastore/' ~ item.name)
        | selectattr('roleid', 'eq', 'Audit')
        | selectattr('ugid', 'eq', 'monitoring@pbs!monitoring-token') | list | length == 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - acl

- name: Grant monitoring user Audit permissions on system
  ansible.builtin.shell: |
    proxmox-backup-manager acl update / Audit \
      --auth-id monitoring@pbs
  when: _pbs_acls | selectattr('path', 'eq', '/')
        | selectattr('roleid', 'eq', 'Audit')
        | selectattr('ugid', 'eq', 'monitoring@pbs') | list | length == 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - acl

- name: Grant monitoring token Audit permissions on system
  ansible.builtin.shell: |
    proxmox-backup-manager acl update / Audit \
      --auth-id 'monitoring@pbs!monitoring-token'
  when: _pbs_acls | selectattr('path', 'eq', '/')
        | selectattr('roleid', 'eq', 'Audit')
        | selectattr('ugid', 'eq', 'monitoring@pbs!monitoring-token') | list | length == 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - acl

# Verification jobs
- name: Configure verification jobs
  ansible.builtin.shell: |
    proxmox-backup-manager verify-job create verify-{{ item.name }} \
      --store {{ item.name }} \
      --schedule "{{ pbs_verify_schedule | default('weekly') }}"
  loop: "{{ pbs_datastores }}"
  register: verify_job_created
  failed_when: false
  changed_when: "'created' in verify_job_created.stdout or verify_job_created.rc == 0"

# GC jobs
- name: Configure garbage collection jobs
  ansible.builtin.shell: |
    proxmox-backup-manager gc-job create gc-{{ item.name }} \
      --store {{ item.name }} \
      --schedule "{{ item.gc_schedule | default('daily') }}"
  loop: "{{ pbs_datastores }}"
  register: gc_job_created
  failed_when: false
  changed_when: "'created' in gc_job_created.stdout or gc_job_created.rc == 0"

# Prune jobs
- name: Configure prune jobs
  ansible.builtin.shell: |
    proxmox-backup-manager prune-job create prune-{{ item.name }} \
      --store {{ item.name }} \
      --schedule "{{ item.prune_schedule | default('daily') }}" \
      --keep-last {{ item.keep_last | default(7) }} \
      --keep-daily {{ item.keep_daily | default(14) }} \
      --keep-weekly {{ item.keep_weekly | default(8) }} \
      --keep-monthly {{ item.keep_monthly | default(12) }} \
      --keep-yearly {{ item.keep_yearly | default(3) }}
  loop: "{{ pbs_datastores }}"
  register: prune_job_created
  failed_when: false
  changed_when: "'created' in prune_job_created.stdout or prune_job_created.rc == 0"

- name: Display PBS configuration summary
  ansible.builtin.debug:
    msg: |
      ============================================
      Proxmox Backup Server Configuration Complete
      ============================================
      Web Interface: https://{{ ansible_host }}:8007

      Datastores configured:
      {% for ds in pbs_datastores %}
      - {{ ds.name }}: {{ ds.path }}
      {% endfor %}

      Namespaces configured:
      {% for ns in pbs_namespaces %}
      - {{ ns.datastore }}:{{ ns.namespace }}
      {% endfor %}

      Users configured:
      {% for user in pbs_users %}
      - {{ user.username }}@{{ user.realm }}
      {% endfor %}

      Logs forwarded to: OpenObserve

      Next steps:
      1. Access web UI at https://{{ ansible_host }}:8007
      2. Login with root@pam
      3. Configure backup clients using API token
      ============================================
