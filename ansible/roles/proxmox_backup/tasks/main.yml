---
# --- Auto-generate PBS passwords if not already set ---
- name: Auto-generate pbs_admin_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "pbs_admin_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "PBS root@pam admin password — auto-generated by Ansible"
    secret_infisical_path: "/pbs"
    secret_dict_path: "pbs"
  tags: [proxmox_backup, pbs, secrets]

- name: Auto-generate pbs_backup_user_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "pbs_backup_user_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "PBS backup@pbs user password — auto-generated by Ansible"
    secret_infisical_path: "/pbs"
    secret_dict_path: "pbs"
  tags: [proxmox_backup, pbs, secrets]

- name: Refresh PBS bare variable aliases from secrets
  ansible.builtin.set_fact:
    pbs_admin_password: "{{ secrets.pbs.pbs_admin_password }}"
    pbs_backup_user_password: "{{ secrets.pbs.pbs_backup_user_password }}"
  tags: [proxmox_backup, pbs, secrets]

- name: Remove Proxmox enterprise repo if present
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pbs-enterprise.list
    state: absent
  register: proxmox_enterprise_repo_removed
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Remove Proxmox enterprise repo from /etc/apt/sources.list if present
  ansible.builtin.lineinfile:
    path: /etc/apt/sources.list
    regexp: '^deb .*enterprise.proxmox.com/debian/pbs'
    state: absent
  register: proxmox_enterprise_repo_line_removed
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Check if Proxmox Backup Server GPG key exists
  ansible.builtin.stat:
    path: /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
  register: proxmox_gpg_key
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Download Proxmox Backup Server repository key
  ansible.builtin.get_url:
    url: https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg
    dest: /etc/apt/keyrings/proxmox-release-bookworm.gpg
    mode: '0644'
  when: not proxmox_gpg_key.stat.exists
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Check if Proxmox Backup Server repo is present
  ansible.builtin.shell: grep -q '^deb .*/pbs' /etc/apt/sources.list /etc/apt/sources.list.d/* 2>/dev/null
  register: proxmox_backup_repo_present
  changed_when: false
  failed_when: false
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Add Proxmox Backup Server repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/proxmox-release-bookworm.gpg] http://download.proxmox.com/debian/pbs bookworm pbs-no-subscription"
    state: present
    filename: proxmox-backup
  when: proxmox_backup_repo_present.rc != 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Check if Proxmox Backup Server is installed
  ansible.builtin.shell: dpkg -l | grep -qw proxmox-backup-server
  register: proxmox_backup_installed
  changed_when: false
  failed_when: false
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Install Proxmox Backup Server
  ansible.builtin.apt:
    name: proxmox-backup-server
    state: present
    update_cache: true

  when: proxmox_backup_installed.rc != 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - packages

- name: Ensure Proxmox Backup Server is started and enabled
  ansible.builtin.systemd:
    name: proxmox-backup
    state: started
    enabled: true

  tags:
    - proxmox_backup
    - pbs
    - backup
    - service

# Retrieve PBS server certificate fingerprint
- name: Get PBS server certificate fingerprint
  ansible.builtin.shell: >
    proxmox-backup-manager cert info 2>/dev/null |
    grep -i fingerprint | sed 's/.*: //'
  register: pbs_cert_fingerprint
  changed_when: false
  tags:
    - proxmox_backup
    - pbs
    - backup
    - config

- name: Validate PBS fingerprint format
  ansible.builtin.assert:
    that:
      - pbs_cert_fingerprint.stdout | length > 20
      - "':' in pbs_cert_fingerprint.stdout"
    fail_msg: "PBS fingerprint extraction failed: '{{ pbs_cert_fingerprint.stdout }}'"
    quiet: true
  tags:
    - proxmox_backup
    - pbs
    - backup
    - config

- name: Set pbs_fingerprint fact from server certificate
  ansible.builtin.set_fact:
    pbs_fingerprint: "{{ pbs_cert_fingerprint.stdout }}"
  tags:
    - proxmox_backup
    - pbs
    - backup
    - config

- name: Store PBS fingerprint in Infisical
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_write_secret.yml"
  vars:
    secret_name: "PBS_FINGERPRINT"
    secret_value: "{{ pbs_fingerprint }}"
    secret_path: "/shared"
    secret_comment: "PBS server TLS certificate fingerprint — auto-retrieved"
  when:
    - pbs_fingerprint is defined
    - pbs_fingerprint | length > 0
    - infisical_login is defined
  tags:
    - proxmox_backup
    - pbs
    - backup
    - config

# Storage Configuration - iSCSI
- name: Install iSCSI initiator packages
  ansible.builtin.package:
    name:
      - open-iscsi
      - multipath-tools
    state: present
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi
    - packages

- name: Ensure iSCSI initiator is started and enabled
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true

  loop:
    - open-iscsi
    - iscsid
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi
    - service

- name: Discover iSCSI targets
  ansible.builtin.shell: |
    iscsiadm --mode discovery --type sendtargets --portal {{ pbs_iscsi_portal }}
  register: iscsi_discovery
  changed_when: false
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Show iSCSI discovery results
  ansible.builtin.debug:
    var: iscsi_discovery.stdout_lines
  when:
    - pbs_storage_backend == 'iscsi'
    - iscsi_discovery is not skipped
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Login to iSCSI target
  ansible.builtin.shell: |
    iscsiadm --mode node --targetname {{ pbs_iscsi_target }} --portal {{ pbs_iscsi_portal }} --login
  register: iscsi_login
  failed_when:
    - iscsi_login.rc != 0
    - "'already present' not in (iscsi_login.stderr | default(''))"
  changed_when: "'successful' in (iscsi_login.stdout | default(''))"
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Enable automatic iSCSI login on boot
  ansible.builtin.shell: |
    iscsiadm --mode node --targetname {{ pbs_iscsi_target }} --portal {{ pbs_iscsi_portal }} --op update --name node.startup --value automatic
  changed_when: false
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Wait for iSCSI device to appear
  ansible.builtin.wait_for:
    path: /dev/disk/by-path/ip-{{ pbs_iscsi_portal.split(':')[0] }}:{{ pbs_iscsi_portal.split(':')[1] }}-iscsi-{{ pbs_iscsi_target }}-lun-1
    state: present
    timeout: 30
  when: pbs_storage_backend == 'iscsi'
  register: iscsi_device
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Get iSCSI device name
  ansible.builtin.shell: |
    readlink -f /dev/disk/by-path/ip-{{ pbs_iscsi_portal.split(':')[0] }}:{{ pbs_iscsi_portal.split(':')[1] }}-iscsi-{{ pbs_iscsi_target }}-lun-1
  register: iscsi_device_path
  changed_when: false
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Check if iSCSI device is formatted
  ansible.builtin.shell: |
    blkid {{ iscsi_device_path.stdout }}
  register: iscsi_formatted
  failed_when: false
  changed_when: false
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Format iSCSI LUN with {{ pbs_iscsi_filesystem }}
  community.general.filesystem:
    fstype: "{{ pbs_iscsi_filesystem }}"
    dev: "{{ iscsi_device_path.stdout }}"
    opts: -L pbs-datastore
  when:
    - pbs_storage_backend == 'iscsi'
    - iscsi_formatted.rc != 0
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Ensure iSCSI mount point exists
  ansible.builtin.file:
    path: "{{ pbs_iscsi_mount_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

- name: Mount iSCSI LUN
  ansible.posix.mount:
    path: "{{ pbs_iscsi_mount_path }}"
    src: "{{ iscsi_device_path.stdout }}"
    fstype: "{{ pbs_iscsi_filesystem }}"
    opts: _netdev,defaults
    state: mounted
  when: pbs_storage_backend == 'iscsi'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - iscsi

# Storage Configuration - NFS (legacy)
- name: Ensure /mnt/backups exists
  ansible.builtin.file:
    path: /mnt/backups
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: pbs_storage_backend == 'nfs'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - nfs

- name: Ensure NFS packages
  ansible.builtin.package:
    name:
      - nfs-common
    state: present
  when: pbs_storage_backend == 'nfs'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - nfs
    - packages

- name: Ensure NFS fstab entry and mount
  ansible.posix.mount:
    backup: true

    boot: "yes"
    path: "/mnt/backups"
    src: "{{ proxmox_backup_nfs_src }}"
    fstype: nfs
    opts: "defaults"
    state: "mounted"
  when: pbs_storage_backend == 'nfs'
  tags:
    - proxmox_backup
    - pbs
    - backup
    - storage
    - nfs


# Datastore Configuration
- name: Ensure datastore directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: backup
    group: backup
    mode: '0750'
  loop: "{{ pbs_datastores }}"
  tags:
    - proxmox_backup
    - pbs
    - backup
    - datastore
    - config

- name: Check if datastores are already configured
  ansible.builtin.shell: proxmox-backup-manager datastore list --output-format json
  register: pbs_datastore_list
  changed_when: false
  failed_when: false
  tags:
    - proxmox_backup
    - pbs
    - backup
    - datastore

- name: Create datastores via CLI
  ansible.builtin.shell: |
    proxmox-backup-manager datastore create {{ item.name }} {{ item.path }}{% if item.comment is defined %} --comment "{{ item.comment }}"{% endif %}{% if item.gc_schedule is defined %} --gc-schedule "{{ item.gc_schedule }}"{% endif %}{% if item.prune_schedule is defined %} --prune-schedule "{{ item.prune_schedule }}"{% endif %}{% if item.keep_last is defined %} --keep-last {{ item.keep_last }}{% endif %}{% if item.keep_hourly is defined and item.keep_hourly > 0 %} --keep-hourly {{ item.keep_hourly }}{% endif %}{% if item.keep_daily is defined %} --keep-daily {{ item.keep_daily }}{% endif %}{% if item.keep_weekly is defined %} --keep-weekly {{ item.keep_weekly }}{% endif %}{% if item.keep_monthly is defined %} --keep-monthly {{ item.keep_monthly }}{% endif %}{% if item.keep_yearly is defined %} --keep-yearly {{ item.keep_yearly }}{% endif %}
  loop: "{{ pbs_datastores }}"
  when:
    - pbs_datastore_list.stdout is defined
    - ((pbs_datastore_list.stdout | default('', true)) or '[]') | from_json | selectattr('name', 'equalto', item.name) | list | length == 0
  register: datastore_created
  failed_when: false
  tags:
    - proxmox_backup
    - pbs
    - backup
    - datastore
    - config

# If CLI fails with "path not empty", register existing datastore via config file
# Note: PBS config parser does not tolerate comment markers, so use copy instead of blockinfile
- name: Register existing datastores via config (path not empty)
  ansible.builtin.copy:
    dest: /etc/proxmox-backup/datastore.cfg
    content: |
      {% for item in datastore_created.results | default([]) if item.rc is defined and item.rc != 0 %}
      datastore: {{ item.item.name }}
      	path {{ item.item.path }}
      	comment {{ item.item.comment | default('Managed by Ansible') }}

      {% endfor %}
    owner: root
    group: backup
    mode: '0640'
  when: datastore_created.results | default([]) | selectattr('rc', 'defined') | selectattr('rc', 'ne', 0) | list | length > 0
  notify: Restart proxmox-backup-proxy
  tags:
    - proxmox_backup
    - pbs
    - backup
    - datastore
    - config

# User Management
- name: Check if backup user exists
  ansible.builtin.shell: proxmox-backup-manager user list --output-format json
  register: pbs_user_list
  changed_when: false
  failed_when: false
  tags:
    - proxmox_backup
    - pbs
    - backup
    - users

- name: Create PBS users
  ansible.builtin.shell: |
    proxmox-backup-manager user create {{ item.username }}@{{ item.realm }} \
      {% if item.comment is defined %}--comment "{{ item.comment }}"{% endif %} \
      {% if secrets.pbs.pbs_backup_user_password is defined %}--password "{{ secrets.pbs.pbs_backup_user_password }}"{% endif %}
  loop: "{{ pbs_users }}"
  when: ((pbs_user_list.stdout | default('', true)) or '[]') | from_json | selectattr('userid', 'equalto', item.username + '@' + item.realm) | list | length == 0
  no_log: true
  tags:
    - proxmox_backup
    - pbs
    - backup
    - users

