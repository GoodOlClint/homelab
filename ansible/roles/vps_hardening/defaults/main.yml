---
# VPS Hardening Configuration (Alpine Linux)

# SSH — standard port, tunnel-only access
vps_ssh_port: 22
vps_ssh_listen_address: "{{ secrets.vps_ssh_listen_address | default('') }}"
vps_ssh_listen_address_v6: "{{ secrets.vps_ssh_listen_address_v6 | default('') }}"
vps_ssh_authorized_key: "{{ lookup('file', lookup('env', 'HOME') + '/.ssh/id_ed25519.pub') }}"

# Service account (replaces root login after hardening)
vps_service_user: "goodolclint"
vps_service_user_shell: "/bin/ash"

# fail2ban
vps_fail2ban_maxretry: 3
vps_fail2ban_bantime: 3600
vps_fail2ban_findtime: 600

# AIDE file integrity monitoring (from Alpine edge/testing repo)
vps_aide_enabled: true
vps_aide_cron_hour: "4"
vps_aide_cron_minute: "30"

# LBU (Alpine Local Backup — only for diskless/RAM installs, not persistent-disk VPS)
vps_lbu_enabled: false

# Sysctl hardening
vps_sysctl_settings:
  # Loose RPF (2) required for WireGuard — strict (1) drops return-path packets
  # on wg0 because Linux takes max(all, per-iface). WireGuard's cryptokey
  # routing provides its own source validation.
  net.ipv4.conf.all.rp_filter: 2
  net.ipv4.conf.default.rp_filter: 2
  net.ipv4.conf.all.accept_source_route: 0
  net.ipv4.conf.default.accept_source_route: 0
  net.ipv4.conf.all.accept_redirects: 0
  net.ipv4.conf.default.accept_redirects: 0
  net.ipv4.conf.all.send_redirects: 0
  net.ipv4.conf.default.send_redirects: 0
  net.ipv4.icmp_echo_ignore_broadcasts: 1
  net.ipv4.conf.all.log_martians: 1
  kernel.sysrq: 0
  # IPv6 hardening
  net.ipv6.conf.all.accept_source_route: 0
  net.ipv6.conf.default.accept_source_route: 0
  net.ipv6.conf.all.accept_redirects: 0
  net.ipv6.conf.default.accept_redirects: 0
  net.ipv6.conf.all.accept_ra: 2
  net.ipv6.conf.default.accept_ra: 2
  # Conntrack tuning for WireGuard relay — default UDP unreplied timeout (30s)
  # is tight against WireGuard's 25s keepalive; explicit max for 1GB VPS
  net.netfilter.nf_conntrack_udp_timeout: 120
  net.netfilter.nf_conntrack_udp_timeout_stream: 180
  net.netfilter.nf_conntrack_max: 65536
