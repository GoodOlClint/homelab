---
# fail2ban — monitor SSH auth logs

- name: Install fail2ban
  ansible.builtin.apk:
    name: fail2ban
    state: present
  tags:
    - fail2ban

- name: Deploy fail2ban jail configuration
  ansible.builtin.template:
    src: fail2ban-jail-local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
  notify: Restart fail2ban
  tags:
    - fail2ban

- name: Enable fail2ban on boot
  ansible.builtin.command: rc-update add fail2ban default
  args:
    creates: /etc/runlevels/default/fail2ban
  tags:
    - fail2ban

- name: Start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
  tags:
    - fail2ban
