---
# Proxmox monitoring user provisioning tasks

- name: Check if Proxmox monitoring user exists
  ansible.builtin.command:
    cmd: "/usr/sbin/pveum user list --output-format json"
  register: proxmox_users_raw
  changed_when: false
  delegate_to: "{{ proxmox_host }}"
  vars:
    ansible_connection: ssh
    ansible_user: root

- name: Parse Proxmox users JSON
  ansible.builtin.set_fact:
    proxmox_users: "{{ proxmox_users_raw.stdout | from_json }}"

- name: Check if monitoring user exists in user list
  ansible.builtin.set_fact:
    monitoring_user_exists: "{{ proxmox_users | selectattr('userid', 'equalto', proxmox_monitoring_user) | list | length > 0 }}"

- name: Create Proxmox monitoring user
  ansible.builtin.command:
    cmd: "/usr/sbin/pveum user add {{ proxmox_monitoring_user }} --comment '{{ proxmox_monitoring_comment }}'"
  when: not monitoring_user_exists
  delegate_to: "{{ proxmox_host }}"
  register: user_created
  vars:
    ansible_connection: ssh
    ansible_user: root

- name: Set Proxmox monitoring user password
  ansible.builtin.command:
    cmd: "/usr/sbin/pveum passwd {{ proxmox_monitoring_user }}"
    stdin: "{{ bootstrap.proxmox_password }}\n{{ bootstrap.proxmox_password }}\n"
  when: user_created.changed or monitoring_user_exists
  delegate_to: "{{ proxmox_host }}"
  no_log: true
  changed_when: true
  vars:
    ansible_connection: ssh
    ansible_user: root

- name: Check current ACL for monitoring user
  ansible.builtin.command:
    cmd: "/usr/sbin/pveum acl list"
  register: current_acl
  changed_when: false
  delegate_to: "{{ proxmox_host }}"
  vars:
    ansible_connection: ssh
    ansible_user: root

- name: Grant PVEAuditor role to monitoring user
  ansible.builtin.command:
    cmd: "/usr/sbin/pveum aclmod / -user {{ proxmox_monitoring_user }} -role {{ proxmox_monitoring_role }}"
  delegate_to: "{{ proxmox_host }}"
  when: proxmox_monitoring_user not in current_acl.stdout or proxmox_monitoring_role not in current_acl.stdout
  changed_when: true
  vars:
    ansible_connection: ssh
    ansible_user: root

- name: Verify monitoring user has PVEAuditor role
  ansible.builtin.assert:
    that:
      - proxmox_monitoring_role in current_acl.stdout
      - proxmox_monitoring_user in current_acl.stdout
    fail_msg: "{{ proxmox_monitoring_user }} does not have {{ proxmox_monitoring_role }} role assigned"
    success_msg: "{{ proxmox_monitoring_user }} has {{ proxmox_monitoring_role }} role"

# --- Auto-generate Proxmox monitoring API token ---

- name: List existing tokens for monitoring user
  ansible.builtin.command:
    cmd: "/usr/sbin/pveum user token list {{ proxmox_monitoring_user }} --output-format json"
  register: _pve_tokens_raw
  changed_when: false
  delegate_to: "{{ proxmox_host }}"
  vars:
    ansible_connection: ssh
    ansible_user: root

- name: Check if monitoring token exists
  ansible.builtin.set_fact:
    _pve_monitoring_token_exists: >-
      {{ (_pve_tokens_raw.stdout | from_json) | selectattr('tokenid', 'equalto', 'monitoring') | list | length > 0 }}

- name: Create Proxmox monitoring API token
  ansible.builtin.command:
    cmd: "/usr/sbin/pveum user token add {{ proxmox_monitoring_user }} monitoring --privsep 0 --output-format json"
  register: _pve_token_create
  delegate_to: "{{ proxmox_host }}"
  when: not _pve_monitoring_token_exists | bool
  no_log: true
  vars:
    ansible_connection: ssh
    ansible_user: root

- name: Store Proxmox token in Infisical
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_write_secret.yml"
  vars:
    secret_name: "proxmox_token_value"
    secret_value: "{{ (_pve_token_create.stdout | from_json).value }}"
    secret_path: "/monitoring"
    secret_comment: "Proxmox VE monitoring API token (monitoring@pve!monitoring)"
  when: _pve_token_create is not skipped and _pve_token_create is changed

- name: Update secrets fact with new token
  ansible.builtin.set_fact:
    secrets: "{{ secrets | combine({'monitoring': (secrets.monitoring | default({})) | combine({'proxmox_token_value': (_pve_token_create.stdout | from_json).value})}) }}"
  when: _pve_token_create is not skipped and _pve_token_create is changed
  no_log: true
