---
# Main tasks for monitoring-users role
# This role provisions monitoring users for Proxmox, UniFi, and Synology

- name: Verify required pre_tasks facts
  ansible.builtin.assert:
    that:
      - secrets is defined
      - secrets is mapping
      - bootstrap is defined
    fail_msg: "Required facts not available. This role must run from a playbook that includes full_pre_tasks.yml."
    quiet: true

- name: Include Proxmox user tasks
  ansible.builtin.include_tasks: proxmox.yml
  tags:
    - monitoring-users
    - proxmox-user

# --- Auto-generate UniFi monitoring password if not already set ---
- name: Auto-generate unifi_monitoring_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "unifi_monitoring_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "UniFi monitoring user password — auto-generated by Ansible"
    secret_infisical_path: "/monitoring"
    secret_dict_path: "monitoring"
  tags: [monitoring-users, unifi-user, secrets]

- name: Refresh UniFi monitoring bare variable alias from secrets
  ansible.builtin.set_fact:
    unifi_monitoring_password: "{{ secrets.monitoring.unifi_monitoring_password }}"
  tags: [monitoring-users, unifi-user, secrets]

- name: Include UniFi user tasks
  ansible.builtin.include_tasks: unifi.yml
  tags:
    - monitoring-users
    - unifi-user

