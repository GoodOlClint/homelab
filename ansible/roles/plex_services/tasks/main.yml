---

# Plex Services Role Tasks
# This role uses global variables from group_vars/all.yml

# --- Auto-generate postgres password if not already set ---
- name: Auto-generate postgres_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "postgres_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Plex Services PostgreSQL superuser password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
  tags: [plex_services, secrets]

- name: Auto-generate sonarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "sonarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Sonarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
  tags: [plex_services, secrets]

- name: Auto-generate radarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "radarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Radarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
  tags: [plex_services, secrets]

- name: Auto-generate prowlarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "prowlarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Prowlarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
  tags: [plex_services, secrets]

- name: Auto-generate bazarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "bazarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Bazarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
  tags: [plex_services, secrets]

- name: Auto-generate jellyseerr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "jellyseerr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Jellyseerr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
  tags: [plex_services, secrets]

- name: Auto-generate lidarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "lidarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Lidarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
  tags: [plex_services, secrets]

- name: Install NFS client packages
  ansible.builtin.apt:
    name:
      - nfs-common
      - nfs-kernel-server
    state: present
    update_cache: true

  when: nfs_enabled | default(true)
  tags:
    - plex_services
    - packages
    - nfs

- name: Install Docker using geerlingguy.docker
  ansible.builtin.import_role:
    name: geerlingguy.docker
  tags:
    - plex_services
    - docker
    - packages

- name: Configure Docker syslog logging
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/configure_docker_logging.yml"
  tags: [plex_services, docker, logging, config]

- name: Create plex-services system group
  ansible.builtin.group:
    name: "{{ plex_services_group }}"
    gid: "{{ plex_services_pgid }}"
    state: present
  tags:
    - plex_services
    - users

- name: Create individual system users for each service
  ansible.builtin.user:
    name: "{{ item.key }}"
    uid: "{{ item.value.PUID }}"
    group: "{{ plex_services_group }}"
    shell: /usr/sbin/nologin
    home: /opt/plex-services/{{ item.key }}
    create_home: false
    system: true
    state: present
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }} (UID: {{ item.value.PUID }})"
  tags:
    - plex_services
    - users

- name: Create plex services directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /opt/plex-services
  tags:
    - plex_services
    - config

- name: Create empty config folders for each service
  ansible.builtin.file:
    path: "/opt/plex-services/{{ item.key }}"
    state: directory
    owner: "{{ item.key }}"
    group: "{{ plex_services_group }}"
    mode: '0750'
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }} config"
  when: item.key is defined
  tags:
    - plex_services
    - config

- name: Install PostgreSQL client packages
  ansible.builtin.apt:
    name:
      - postgresql-client-common
      - postgresql-client
      - python3-psycopg2
      - smbclient
    state: present
    update_cache: true

  tags:
    - plex_services
    - packages
    - postgres

- name: Copy PostgreSQL PBS backup script
  ansible.builtin.template:
    src: postgres_pbs_backup.sh.j2
    dest: /usr/local/bin/postgres_pbs_backup.sh
    owner: root
    group: root
    mode: '0755'
  when: pbs_backup_enabled | default(true)
  tags:
    - plex_services
    - backup
    - pbs
    - postgres

- name: Copy PostgreSQL legacy backup script (SMB)
  ansible.builtin.template:
    src: postgres_backup.sh.j2
    dest: /usr/local/bin/postgres_backup.sh
    owner: root
    group: root
    mode: '0755'
  when: not (pbs_backup_enabled | default(true))
  tags:
    - plex_services
    - backup
    - smb
    - postgres

- name: Copy PostgreSQL restore script
  ansible.builtin.template:
    src: postgres_restore.sh.j2
    dest: /usr/local/bin/postgres_restore.sh
    owner: root
    group: root
    mode: '0755'
  tags:
    - plex_services
    - restore
    - postgres

- name: Create PostgreSQL PBS backup cron job
  ansible.builtin.cron:
    name: "PostgreSQL PBS backup"
    cron_file: postgres_pbs_backup
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/postgres_pbs_backup.sh >> /var/log/postgres_pbs_backup.log 2>&1"
    user: root
  when: pbs_backup_enabled | default(true)
  tags:
    - plex_services
    - backup
    - pbs
    - postgres
    - cron

- name: Create PostgreSQL legacy backup cron job (SMB)
  ansible.builtin.cron:
    name: "PostgreSQL backup"
    cron_file: postgres_backup
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/postgres_backup.sh >> /var/log/postgres_backup.log 2>&1"
    user: root
  when: not (pbs_backup_enabled | default(true))
  tags:
    - plex_services
    - backup
    - smb
    - postgres
    - cron

- name: Create plex services docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/plex-services/docker-compose.yml
    owner: root
    group: root
    mode: '0600'
  notify:
    - restart plex services docker compose
  tags:
    - plex_services
    - config
    - compose

- name: Ensure docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

  tags:
    - plex_services
    - docker
    - service

- name: Check if PostgreSQL container already exists
  community.docker.docker_container_info:
    name: postgres
  register: postgres_container_info
  ignore_errors: true
  tags:
    - plex_services
    - postgres
    - validate

- name: Start PostgreSQL container only (first)
  community.docker.docker_compose_v2:
    project_src: /opt/plex-services
    services:
      - postgres
    wait: true
    wait_timeout: 120
  tags:
    - plex_services
    - postgres
    - compose
    - deploy

- name: Wait for PostgreSQL to be ready
  ansible.builtin.wait_for:
    port: 5432
    host: localhost
    timeout: 300
    delay: 10
  tags:
    - plex_services
    - postgres
    - validate

- name: Create PostgreSQL users for each service
  community.postgresql.postgresql_user:
    login_host: localhost
    login_user: "{{ postgres_user }}"
    login_password: "{{ secrets.postgres_password }}"
    login_db: "{{ postgres_default_db }}"
    name: "{{ item.value.db_user }}"
    password: "{{ secrets[item.key ~ '_db_password'] }}"
    encrypted: true
    state: present
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }} DB user"
  when: item.value.db_user is defined
  no_log: true
  tags:
    - plex_services
    - postgres
    - database

- name: Initialize plex_service_db_pairs
  ansible.builtin.set_fact:
    plex_service_db_pairs: []
  tags:
    - plex_services
    - postgres
    - database

- name: Add service/db pairs to plex_service_db_pairs
  ansible.builtin.set_fact:
    plex_service_db_pairs: "{{ plex_service_db_pairs + [{'service': item.0.key, 'db_user': item.0.value.db_user, 'db_name': item.1}] }}"
  with_subelements:
    - "{{ plex_services | dict2items }}"
    - value.dbs
  loop_control:
    label: "{{ item.0.key }}: {{ item.1 }}"
  when: item.0.value.db_user is defined and item.1 is defined
  vars:
    ansible_subelements_skip_missing: true
  tags:
    - plex_services
    - postgres
    - database

- name: Create databases for each plex service and db
  community.postgresql.postgresql_db:
    login_host: localhost
    login_user: "{{ postgres_user }}"
    login_password: "{{ secrets.postgres_password }}"
    name: "{{ item.db_name }}"
    owner: "{{ item.db_user }}"
    state: present
  loop: "{{ plex_service_db_pairs }}"
  loop_control:
    label: "{{ item.service }}: {{ item.db_name }}"
  when: item.db_user is defined
  no_log: true
  tags:
    - plex_services
    - postgres
    - database

- name: Grant database privileges to service users
  community.postgresql.postgresql_privs:
    login_host: localhost
    login_user: "{{ postgres_user }}"
    login_password: "{{ secrets.postgres_password }}"
    login_db: "{{ item.db_name }}"
    role: "{{ item.db_user }}"
    privs: ALL
    type: database
    obj: "{{ item.db_name }}"
  loop: "{{ plex_service_db_pairs }}"
  no_log: true

- name: Grant schema privileges to service users
  community.postgresql.postgresql_privs:
    login_host: localhost
    login_user: "{{ postgres_user }}"
    login_password: "{{ secrets.postgres_password }}"
    login_db: "{{ item.db_name }}"
    role: "{{ item.db_user }}"
    objs: public
    privs: ALL
    type: schema
    state: present
  loop: "{{ plex_service_db_pairs }}"
  loop_control:
    label: "{{ item.service }}: {{ item.db_name }} schema privileges"
  when: item.db_user is defined
  no_log: true
  tags:
    - plex_services
    - postgres
    - database

- name: Attempt to restore databases from remote backup on first deployment
  ansible.builtin.shell: |
    # Check if remote backups exist and restore the latest ones
    if /usr/local/bin/postgres_restore.sh --list-remote | grep -q "\.sql\.gz$"; then
      echo "Remote backups found, attempting to restore..."

      # Get list of databases from remote backups
      databases=$(/usr/local/bin/postgres_restore.sh --list-remote | grep -o '^[^_]*' | sort -u)

      for db in $databases; do
        echo "Restoring database: $db"
        /usr/local/bin/postgres_restore.sh -d "$db" -r -l || echo "Failed to restore $db, continuing..."
      done

      echo "Database restore completed"
      # Mark as initialized since we restored existing data
      touch /opt/plex-services/.postgres_initialized
      exit 0
    else
      echo "No remote backups found, will proceed with database initialization"
      exit 1
    fi
  when:
    #- not postgres_init_file.stat.exists
    - postgres_backup_enabled | default(true)
  register: postgres_restore_result
  failed_when: false
  tags:
    - plex_services
    - postgres
    - restore

- name: Ensure lxml is installed for XML config management
  ansible.builtin.apt:
    name: python3-lxml
    state: present
    update_cache: true

  become: true
  tags:
    - plex_services
    - packages

- name: Start all plex services to generate initial config files
  community.docker.docker_compose_v2:
    project_src: /opt/plex-services
    state: present
  tags:
    - plex_services
    - compose
    - deploy

- name: Wait for *arr services to create initial config files
  ansible.builtin.wait_for:
    path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
    timeout: 120
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.value.config is defined
    - item.value.db_user is defined
    - item.value.config | regex_search('\.xml$') is not none
  tags:
    - plex_services
    - config

- name: Wait for *arr service APIs to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ item.port }}/{{ item.path }}"
    method: GET
    headers: "{{ item.headers | default({}) }}"
    status_code: [200, 401]
  register: api_health
  until: api_health is succeeded
  retries: 30
  delay: 5
  loop:
    - { name: sonarr, port: 8989, path: "api/v3/system/status", headers: {} }
    - { name: radarr, port: 7878, path: "api/v3/system/status", headers: {} }
    - { name: lidarr, port: 8686, path: "api/v1/system/status", headers: {} }
    - { name: prowlarr, port: 9696, path: "api/v1/system/status", headers: {} }
    - { name: sabnzbd, port: 8080, path: "api?mode=version&output=json", headers: {} }
  loop_control:
    label: "{{ item.name }} (:{{ item.port }})"
  tags:
    - plex_services
    - validate

- name: Update config files for all containers with a database
  block:
    - name: Update XML config files with Postgres settings
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: /Config/PostgresUser
        value: "{{ item.value.db_user }}"
        state: present
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}: PostgresUser"
      when:
        - item.value.config is defined
        - item.value.db_user is defined
        - item.value.config | regex_search('\.xml$') is not none
      notify: restart plex services docker compose

    - name: Update XML config files with PostgresPassword
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: /Config/PostgresPassword
        value: "{{ secrets[item.key ~ '_db_password'] }}"
        state: present
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}: PostgresPassword"
      when:
        - item.value.config is defined
        - item.value.db_user is defined
        - item.value.config | regex_search('\.xml$') is not none
      no_log: true
      notify: restart plex services docker compose

    - name: Update XML config files with PostgresHost
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: /Config/PostgresHost
        value: "postgres"
        state: present
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}: PostgresHost"
      when:
        - item.value.config is defined
        - item.value.config | regex_search('\.xml$') is not none
        - item.value.db_user is defined
      notify: restart plex services docker compose

    - name: Update XML config files with PostgresPort
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: /Config/PostgresPort
        value: "5432"
        state: present
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}: PostgresPort"
      when:
        - item.value.config is defined
        - item.value.config | regex_search('\.xml$') is not none
        - item.value.db_user is defined
      notify: restart plex services docker compose
  tags:
    - plex_services
    - config
    - postgres

- name: Read ApiKey from each *arr config.xml
  block:
    - name: Read config XML and register output
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: "/Config/ApiKey"
        content: text
      register: xml_result
      when:
        - item.value.config is defined
        - item.value.config | regex_search('\.xml$') is not none
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Set api_key fact for each service
      ansible.builtin.set_fact:
        arr_api_keys: >-
          {{
            arr_api_keys | default({}) |
            combine({ item.item.key: item.matches[0].ApiKey | default('') })
          }}
      loop: "{{ xml_result.results }}"
      when:
        - item is mapping
        - "'matches' in item"
        - item.matches | length > 0
        - item.matches[0] is mapping
        - "'ApiKey' in item.matches[0]"
  tags:
    - plex_services
    - config

- name: Read SABnzbd API key from config
  block:
    - name: Read SABnzbd INI file
      ansible.builtin.slurp:
        src: /opt/plex-services/sabnzbd/sabnzbd.ini
      register: sabnzbd_ini_raw

    - name: Extract SABnzbd API key
      ansible.builtin.set_fact:
        arr_api_keys: >-
          {{
            arr_api_keys | default({}) |
            combine({ 'sabnzbd': (sabnzbd_ini_raw.content | b64decode | regex_search('api_key\s*=\s*(\S+)', '\1'))[0] })
          }}
      when: (sabnzbd_ini_raw.content | b64decode | regex_search('api_key\s*=\s*(\S+)')) is not none
  tags:
    - plex_services
    - config

- name: Create media directory structure on data volume
  community.docker.docker_container_exec:
    container: sabnzbd
    command: >
      sh -c "mkdir -p
      /data/usenet/complete/tv
      /data/usenet/complete/movies
      /data/usenet/complete/music
      /data/usenet/incomplete
      /data/tv
      /data/movies
      /data/music"
  tags:
    - plex_services
    - config
    - media

- name: Deploy recyclarr configuration
  ansible.builtin.template:
    src: recyclarr.yml.j2
    dest: /opt/plex-services/recyclarr/recyclarr.yml
    owner: recyclarr
    group: "{{ plex_services_group }}"
    mode: '0640'
  when:
    - arr_api_keys is defined
    - arr_api_keys.sonarr is defined
    - arr_api_keys.radarr is defined
  notify: restart plex services docker compose
  tags:
    - plex_services
    - config
    - recyclarr

- name: Configure SABnzbd download directories and categories
  when:
    - arr_api_keys is defined
    - arr_api_keys.sabnzbd is defined
  tags:
    - plex_services
    - config
    - sabnzbd
  block:
    - name: Set SABnzbd complete download directory
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=complete_dir&value=/data/usenet/complete&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      register: sabnzbd_complete_dir

    - name: Set SABnzbd incomplete download directory
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=download_dir&value=/data/usenet/incomplete&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true

    - name: Configure SABnzbd categories
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=categories&keyword={{ item.name }}&name={{ item.name }}&dir={{ item.dir }}&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      loop:
        - { name: tv, dir: tv }
        - { name: movies, dir: movies }
        - { name: music, dir: music }
      loop_control:
        label: "{{ item.name }}"

- name: Configure *arr root folders
  when:
    - arr_api_keys is defined
  tags:
    - plex_services
    - config
  block:
    - name: Check existing root folders
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/api/{{ item.api }}/rootfolder"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys[item.service] }}"
        return_content: true
      register: existing_root_folders
      loop:
        - { service: sonarr, port: 8989, api: v3, path: /data/tv }
        - { service: radarr, port: 7878, api: v3, path: /data/movies }
      loop_control:
        label: "{{ item.service }}"
      when: arr_api_keys[item.service] is defined

    - name: Add root folders to Sonarr and Radarr
      ansible.builtin.uri:
        url: "http://localhost:{{ item.item.port }}/api/{{ item.item.api }}/rootfolder"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys[item.item.service] }}"
        body_format: json
        body:
          path: "{{ item.item.path }}"
        status_code: [200, 201]
      loop: "{{ existing_root_folders.results }}"
      loop_control:
        label: "{{ item.item.service }}: {{ item.item.path }}"
      when:
        - item is not skipped
        - item.json | selectattr('path', 'eq', item.item.path) | list | length == 0

- name: Configure Lidarr root folder
  when:
    - arr_api_keys is defined
    - arr_api_keys.lidarr is defined
  tags:
    - plex_services
    - config
  block:
    - name: Check existing Lidarr root folders
      ansible.builtin.uri:
        url: "http://localhost:8686/api/v1/rootfolder"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.lidarr }}"
        return_content: true
      register: lidarr_root_folders

    - name: Get Lidarr quality profiles
      ansible.builtin.uri:
        url: "http://localhost:8686/api/v1/qualityprofile"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.lidarr }}"
        return_content: true
      register: lidarr_quality_profiles
      when: lidarr_root_folders.json | selectattr('path', 'eq', '/data/music') | list | length == 0

    - name: Get Lidarr metadata profiles
      ansible.builtin.uri:
        url: "http://localhost:8686/api/v1/metadataprofile"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.lidarr }}"
        return_content: true
      register: lidarr_metadata_profiles
      when: lidarr_root_folders.json | selectattr('path', 'eq', '/data/music') | list | length == 0

    - name: Add root folder to Lidarr
      ansible.builtin.uri:
        url: "http://localhost:8686/api/v1/rootfolder"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys.lidarr }}"
        body_format: json
        body:
          name: Music
          path: /data/music
          defaultQualityProfileId: "{{ lidarr_quality_profiles.json[0].id }}"
          defaultMetadataProfileId: "{{ lidarr_metadata_profiles.json[0].id }}"
        status_code: [200, 201]
      when:
        - lidarr_root_folders.json | selectattr('path', 'eq', '/data/music') | list | length == 0
        - lidarr_quality_profiles is not skipped
        - lidarr_metadata_profiles is not skipped

- name: Configure SABnzbd as download client in *arr services
  when:
    - arr_api_keys is defined
    - arr_api_keys.sabnzbd is defined
  tags:
    - plex_services
    - config
  block:
    - name: Check existing download clients
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/api/{{ item.api }}/downloadclient"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys[item.service] }}"
        return_content: true
      register: existing_download_clients
      loop:
        - { service: sonarr, port: 8989, api: v3, category: tv }
        - { service: radarr, port: 7878, api: v3, category: movies }
        - { service: lidarr, port: 8686, api: v1, category: music }
      loop_control:
        label: "{{ item.service }}"
      when: arr_api_keys[item.service] is defined

    - name: Add SABnzbd download client to *arr services
      ansible.builtin.uri:
        url: "http://localhost:{{ item.item.port }}/api/{{ item.item.api }}/downloadclient"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys[item.item.service] }}"
        body_format: json
        body:
          name: SABnzbd
          implementation: Sabnzbd
          configContract: SabnzbdSettings
          protocol: usenet
          enable: true
          priority: 1
          fields:
            - name: host
              value: sabnzbd
            - name: port
              value: 8080
            - name: useSsl
              value: false
            - name: apiKey
              value: "{{ arr_api_keys.sabnzbd }}"
            - name: category
              value: "{{ item.item.category }}"
        status_code: [200, 201]
      loop: "{{ existing_download_clients.results }}"
      loop_control:
        label: "{{ item.item.service }}: SABnzbd ({{ item.item.category }})"
      when:
        - item is not skipped
        - item.json | selectattr('name', 'equalto', 'SABnzbd') | list | length == 0

- name: Register *arr applications in Prowlarr
  when:
    - arr_api_keys is defined
    - arr_api_keys.prowlarr is defined
  tags:
    - plex_services
    - config
    - prowlarr
  block:
    - name: Check existing Prowlarr applications
      ansible.builtin.uri:
        url: "http://localhost:9696/api/v1/applications"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.prowlarr }}"
        return_content: true
      register: prowlarr_apps

    - name: Add *arr applications to Prowlarr
      ansible.builtin.uri:
        url: "http://localhost:9696/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys.prowlarr }}"
        body_format: json
        body:
          syncLevel: fullSync
          name: "{{ item.name }}"
          implementation: "{{ item.implementation }}"
          configContract: "{{ item.config_contract }}"
          fields:
            - name: prowlarrUrl
              value: "http://prowlarr:9696"
            - name: baseUrl
              value: "http://{{ item.container }}:{{ item.port }}"
            - name: apiKey
              value: "{{ arr_api_keys[item.service] }}"
            - name: syncCategories
              value: "{{ item.categories }}"
          tags: []
        status_code: [200, 201]
      loop:
        - name: Sonarr
          service: sonarr
          container: sonarr
          port: 8989
          implementation: Sonarr
          config_contract: SonarrSettings
          categories: [5000, 5010, 5020, 5030, 5040, 5045, 5050]
        - name: Radarr
          service: radarr
          container: radarr
          port: 7878
          implementation: Radarr
          config_contract: RadarrSettings
          categories: [2000, 2010, 2020, 2030, 2040, 2045, 2050]
        - name: Lidarr
          service: lidarr
          container: lidarr
          port: 8686
          implementation: Lidarr
          config_contract: LidarrSettings
          categories: [3000, 3010, 3020, 3030, 3040]
      loop_control:
        label: "{{ item.name }}"
      when:
        - arr_api_keys[item.service] is defined
        - prowlarr_apps.json | selectattr('name', 'equalto', item.name) | list | length == 0

- name: Flush handlers to apply pending restarts
  ansible.builtin.meta: flush_handlers
  tags:
    - plex_services
    - config

- name: Correct permissions for plex services directories
  ansible.builtin.file:
    path: "/opt/plex-services/{{ item.key }}"
    state: directory
    owner: "{{ item.key }}"
    group: "{{ plex_services_group }}"
    recurse: true
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }} config"
  notify: restart plex services docker compose
  tags:
    - plex_services
    - config

- name: Configure Docker PBS backup
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/configure_pbs_backup.yml"
  vars:
    backup_name: "Docker containers"
    backup_script_src: docker_pbs_backup.sh.j2
    backup_script_dest: /usr/local/bin/docker_pbs_backup.sh
    backup_cron_hour: "2"
    backup_cron_minute: "30"
  when: pbs_backup_enabled | default(true)
  tags: [plex_services, backup, pbs, cron]

# === Manual Configuration Required After First Deployment ===
#
# 1. PROWLARR INDEXER (NZBPlanet):
#    - Open http://<host>:9696 -> Indexers -> Add
#    - Select NZBPlanet (Newznab preset)
#    - Enter API key and URL from NZBPlanet account
#    - Prowlarr will auto-sync the indexer to all registered *arr apps
#
# 2. SABNZBD NEWS SERVER:
#    - Open http://<host>:8080 -> Config -> Servers
#    - Add your Usenet provider details (host, port, SSL, credentials)
#
# 3. BAZARR:
#    - Open http://<host>:6767 -> Settings -> Languages
#    - Set subtitle languages, providers, and anti-captcha keys
#    - Settings -> Sonarr/Radarr: Add connection (localhost ports, API keys auto-read from config)
#
# 4. TAUTULLI:
#    - Open http://<host>:8181 -> Settings -> Plex Media Server
#    - Add Plex server connection and authentication token
#
# 5. JELLYSEERR:
#    - Open http://<host>:5055 -> first-run wizard
#    - Connect to Plex, configure Sonarr/Radarr integrations
#
# 6. CLOUDFLARE TUNNEL:
#    - Routes configured in Cloudflare Zero Trust dashboard:
#      tautulli.clintflix.tv  -> http://tautulli:8181
#      requests.clintflix.tv  -> http://jellyseerr:5055
