---

# Plex Services Role Tasks
# This role uses global variables from group_vars/all.yml

# --- Auto-generate postgres password if not already set ---
- name: Auto-generate postgres_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "postgres_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Plex Services PostgreSQL superuser password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
    secret_dict_path: "plex_services"
  tags: [plex_services, secrets]

- name: Auto-generate sonarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "sonarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Sonarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
    secret_dict_path: "plex_services"
  tags: [plex_services, secrets]

- name: Auto-generate radarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "radarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Radarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
    secret_dict_path: "plex_services"
  tags: [plex_services, secrets]

- name: Auto-generate prowlarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "prowlarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Prowlarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
    secret_dict_path: "plex_services"
  tags: [plex_services, secrets]

- name: Auto-generate bazarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "bazarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Bazarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
    secret_dict_path: "plex_services"
  tags: [plex_services, secrets]

- name: Auto-generate seerr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "seerr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Seerr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
    secret_dict_path: "plex_services"
  tags: [plex_services, secrets]

- name: Auto-generate lidarr_db_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "lidarr_db_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Lidarr PostgreSQL password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
    secret_dict_path: "plex_services"
  tags: [plex_services, secrets]

- name: Auto-generate arr_admin_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "arr_admin_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Arr services admin password — auto-generated by Ansible"
    secret_infisical_path: "/plex-services"
    secret_dict_path: "plex_services"
  tags: [plex_services, secrets]

- name: Refresh plex_services bare variable aliases from secrets
  ansible.builtin.set_fact:
    postgres_password: "{{ secrets.plex_services.postgres_password }}"
  tags: [plex_services, secrets]

- name: Install NFS client packages
  ansible.builtin.apt:
    name:
      - nfs-common
      - nfs-kernel-server
    state: present
    update_cache: true

  when: nfs_enabled | default(true)
  tags:
    - plex_services
    - packages
    - nfs

- name: Ensure sunrpc module loads at boot for NFS tuning
  ansible.builtin.copy:
    content: "sunrpc\n"
    dest: /etc/modules-load.d/sunrpc.conf
    mode: '0644'
  when: nfs_enabled | default(true)
  tags:
    - plex_services
    - nfs
    - tuning

- name: Tune NFS RPC slot table for concurrent I/O
  ansible.posix.sysctl:
    name: sunrpc.tcp_slot_table_entries
    value: "128"
    sysctl_file: /etc/sysctl.d/90-nfs-tuning.conf
    reload: true
  when: nfs_enabled | default(true)
  tags:
    - plex_services
    - nfs
    - tuning

- name: Install Docker using geerlingguy.docker
  ansible.builtin.import_role:
    name: geerlingguy.docker
  tags:
    - plex_services
    - docker
    - packages

- name: Configure Docker syslog logging
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/configure_docker_logging.yml"
  tags: [plex_services, docker, logging, config]

- name: Create plex-services system group
  ansible.builtin.group:
    name: "{{ plex_services_group }}"
    gid: "{{ plex_services_pgid }}"
    state: present
  tags:
    - plex_services
    - users

- name: Create individual system users for each service
  ansible.builtin.user:
    name: "{{ item.key }}"
    uid: "{{ item.value.PUID }}"
    group: "{{ plex_services_group }}"
    shell: /usr/sbin/nologin
    home: /opt/plex-services/{{ item.key }}
    create_home: false
    system: true
    state: present
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }} (UID: {{ item.value.PUID }})"
  tags:
    - plex_services
    - users

- name: Create plex services directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /opt/plex-services
  tags:
    - plex_services
    - config

- name: Format scratch disk
  community.general.filesystem:
    fstype: "{{ scratch_disk_fstype }}"
    dev: "{{ scratch_disk_device }}"
    opts: "-b 4096 -O ^has_journal"
  when: scratch_disk_device is defined
  tags:
    - plex_services
    - disks

- name: Mount scratch disk
  ansible.posix.mount:
    path: "{{ scratch_disk_mount }}"
    src: "{{ scratch_disk_device }}"
    fstype: "{{ scratch_disk_fstype }}"
    opts: defaults,noatime,nodiratime,nosuid,nodev,discard
    state: mounted
  when: scratch_disk_device is defined
  tags:
    - plex_services
    - disks

- name: Set scratch disk ownership
  ansible.builtin.file:
    path: "{{ scratch_disk_mount }}"
    owner: "{{ plex_services['sabnzbd'].PUID }}"
    group: "{{ plex_services_pgid }}"
    mode: '0775'
  when: scratch_disk_device is defined
  tags:
    - plex_services
    - disks

- name: Create empty config folders for each service
  ansible.builtin.file:
    path: "/opt/plex-services/{{ item.key }}"
    state: directory
    owner: "{{ item.key }}"
    group: "{{ plex_services_group }}"
    mode: '0750'
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }} config"
  when: item.key is defined
  tags:
    - plex_services
    - config

- name: Install PostgreSQL client packages
  ansible.builtin.apt:
    name:
      - postgresql-client-common
      - postgresql-client
      - python3-psycopg2
      - smbclient
    state: present
    update_cache: true

  tags:
    - plex_services
    - packages
    - postgres

- name: Copy PostgreSQL PBS backup script
  ansible.builtin.template:
    src: postgres_pbs_backup.sh.j2
    dest: /usr/local/bin/postgres_pbs_backup.sh
    owner: root
    group: root
    mode: '0755'
  when: pbs_backup_enabled | default(true)
  tags:
    - plex_services
    - backup
    - pbs
    - postgres

- name: Copy PostgreSQL legacy backup script (SMB)
  ansible.builtin.template:
    src: postgres_backup.sh.j2
    dest: /usr/local/bin/postgres_backup.sh
    owner: root
    group: root
    mode: '0755'
  when: not (pbs_backup_enabled | default(true))
  tags:
    - plex_services
    - backup
    - smb
    - postgres

- name: Copy PostgreSQL restore script
  ansible.builtin.template:
    src: postgres_restore.sh.j2
    dest: /usr/local/bin/postgres_restore.sh
    owner: root
    group: root
    mode: '0755'
  tags:
    - plex_services
    - restore
    - postgres

- name: Create PostgreSQL PBS backup cron job
  ansible.builtin.cron:
    name: "PostgreSQL PBS backup"
    cron_file: postgres_pbs_backup
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/postgres_pbs_backup.sh >> /var/log/postgres_pbs_backup.log 2>&1"
    user: root
  when: pbs_backup_enabled | default(true)
  tags:
    - plex_services
    - backup
    - pbs
    - postgres
    - cron

- name: Create PostgreSQL legacy backup cron job (SMB)
  ansible.builtin.cron:
    name: "PostgreSQL backup"
    cron_file: postgres_backup
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/postgres_backup.sh >> /var/log/postgres_backup.log 2>&1"
    user: root
  when: not (pbs_backup_enabled | default(true))
  tags:
    - plex_services
    - backup
    - smb
    - postgres
    - cron

- name: Create plex services docker compose file
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/plex-services/docker-compose.yml
    owner: root
    group: root
    mode: '0600'
  notify:
    - restart plex services docker compose
  tags:
    - plex_services
    - config
    - compose

- name: Ensure docker service is started and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true
  tags:
    - plex_services
    - docker
    - service

- name: Recreate NFS Docker volume if mount options changed
  tags:
    - plex_services
    - nfs
    - compose
  block:
    - name: Inspect existing plex_data Docker volume
      community.docker.docker_volume_info:
        name: plex-services_plex_data
      register: _plex_data_volume
      failed_when: false

    - name: Check if NFS mount options need update
      ansible.builtin.set_fact:
        _nfs_volume_needs_recreate: >-
          {{ _plex_data_volume.volume is defined and
             _plex_data_volume.volume.Options is defined and
             nfs_mount_options not in (_plex_data_volume.volume.Options.o | default('')) }}

    - name: Stop all services before volume recreate
      community.docker.docker_compose_v2:
        project_src: /opt/plex-services
        state: absent
        remove_volumes: false
      when: _nfs_volume_needs_recreate | bool

    - name: Remove outdated NFS volume
      community.docker.docker_volume:
        name: plex-services_plex_data
        state: absent
      when: _nfs_volume_needs_recreate | bool

    - name: Start services with updated NFS volume
      community.docker.docker_compose_v2:
        project_src: /opt/plex-services
        state: present
      when: _nfs_volume_needs_recreate | bool

- name: Check if PostgreSQL container already exists
  community.docker.docker_container_info:
    name: postgres
  register: postgres_container_info
  ignore_errors: true
  tags:
    - plex_services
    - postgres
    - validate

- name: Start PostgreSQL container only (first)
  community.docker.docker_compose_v2:
    project_src: /opt/plex-services
    services:
      - postgres
    wait: true
    wait_timeout: 120
  tags:
    - plex_services
    - postgres
    - compose
    - deploy

- name: Wait for PostgreSQL to be ready
  ansible.builtin.wait_for:
    port: 5432
    host: localhost
    timeout: 300
    delay: 10
  tags:
    - plex_services
    - postgres
    - validate

- name: Sync PostgreSQL superuser password from Infisical into running database
  community.docker.docker_container_exec:
    container: postgres
    argv:
      - psql
      - -U
      - "{{ postgres_user }}"
      - -c
      - "ALTER USER {{ postgres_user }} PASSWORD '{{ secrets.plex_services.postgres_password | replace(\"'\", \"''\") }}';"
  no_log: true
  changed_when: false
  tags:
    - plex_services
    - postgres
    - database

- name: Create PostgreSQL users for each service
  community.postgresql.postgresql_user:
    login_host: localhost
    login_user: "{{ postgres_user }}"
    login_password: "{{ secrets.plex_services.postgres_password }}"
    login_db: "{{ postgres_default_db }}"
    name: "{{ item.value.db_user }}"
    password: "{{ secrets.plex_services[item.key ~ '_db_password'] }}"
    encrypted: true
    state: present
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }} DB user"
  when: item.value.db_user is defined
  no_log: true
  tags:
    - plex_services
    - postgres
    - database

- name: Initialize plex_service_db_pairs
  ansible.builtin.set_fact:
    plex_service_db_pairs: []
  tags:
    - plex_services
    - postgres
    - database

- name: Add service/db pairs to plex_service_db_pairs
  ansible.builtin.set_fact:
    plex_service_db_pairs: "{{ plex_service_db_pairs + [{'service': item.0.key, 'db_user': item.0.value.db_user, 'db_name': item.1}] }}"
  with_subelements:
    - "{{ plex_services | dict2items }}"
    - value.dbs
  loop_control:
    label: "{{ item.0.key }}: {{ item.1 }}"
  when: item.0.value.db_user is defined and item.1 is defined
  vars:
    ansible_subelements_skip_missing: true
  tags:
    - plex_services
    - postgres
    - database

- name: Create databases for each plex service and db
  community.postgresql.postgresql_db:
    login_host: localhost
    login_user: "{{ postgres_user }}"
    login_password: "{{ secrets.plex_services.postgres_password }}"
    name: "{{ item.db_name }}"
    owner: "{{ item.db_user }}"
    state: present
  loop: "{{ plex_service_db_pairs }}"
  loop_control:
    label: "{{ item.service }}: {{ item.db_name }}"
  when: item.db_user is defined
  no_log: true
  tags:
    - plex_services
    - postgres
    - database

- name: Grant database privileges to service users
  community.postgresql.postgresql_privs:
    login_host: localhost
    login_user: "{{ postgres_user }}"
    login_password: "{{ secrets.plex_services.postgres_password }}"
    login_db: "{{ item.db_name }}"
    role: "{{ item.db_user }}"
    privs: ALL
    type: database
    obj: "{{ item.db_name }}"
  loop: "{{ plex_service_db_pairs }}"
  no_log: true

- name: Grant schema privileges to service users
  community.postgresql.postgresql_privs:
    login_host: localhost
    login_user: "{{ postgres_user }}"
    login_password: "{{ secrets.plex_services.postgres_password }}"
    login_db: "{{ item.db_name }}"
    role: "{{ item.db_user }}"
    objs: public
    privs: ALL
    type: schema
    state: present
  loop: "{{ plex_service_db_pairs }}"
  loop_control:
    label: "{{ item.service }}: {{ item.db_name }} schema privileges"
  when: item.db_user is defined
  no_log: true
  tags:
    - plex_services
    - postgres
    - database

- name: Check if PostgreSQL is already initialized
  ansible.builtin.stat:
    path: /opt/plex-services/.postgres_initialized
  register: _postgres_init_file

- name: Attempt to restore databases from remote backup on first deployment
  ansible.builtin.shell: |
    # Check if remote backups exist and restore the latest ones
    if /usr/local/bin/postgres_restore.sh --list-remote | grep -q "\.sql\.gz$"; then
      echo "Remote backups found, attempting to restore..."

      # Get list of databases from remote backups
      databases=$(/usr/local/bin/postgres_restore.sh --list-remote | grep -o '^[^_]*' | sort -u)

      for db in $databases; do
        echo "Restoring database: $db"
        /usr/local/bin/postgres_restore.sh -d "$db" -r -l || echo "Failed to restore $db, continuing..."
      done

      echo "Database restore completed"
      # Mark as initialized since we restored existing data
      touch /opt/plex-services/.postgres_initialized
      exit 0
    else
      echo "No remote backups found, will proceed with database initialization"
      exit 1
    fi
  when:
    - not _postgres_init_file.stat.exists
    - postgres_backup_enabled | default(true)
  register: postgres_restore_result
  failed_when: false
  tags:
    - plex_services
    - postgres
    - restore

- name: Ensure lxml is installed for XML config management
  ansible.builtin.apt:
    name: python3-lxml
    state: present
    update_cache: true

  become: true
  tags:
    - plex_services
    - packages

- name: Start all plex services to generate initial config files
  community.docker.docker_compose_v2:
    project_src: /opt/plex-services
    state: present
  tags:
    - plex_services
    - compose
    - deploy

- name: Wait for *arr services to create initial config files
  ansible.builtin.wait_for:
    path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
    timeout: 120
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when:
    - item.value.config is defined
    - item.value.db_user is defined
    - item.value.config | regex_search('\.xml$') is not none
  tags:
    - plex_services
    - config

- name: Wait for *arr service APIs to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ item.port }}/{{ item.path }}"
    method: GET
    headers: "{{ item.headers | default({}) }}"
    status_code: [200, 401]
  register: api_health
  until: api_health is succeeded
  retries: 30
  delay: 5
  loop:
    - { name: sonarr, port: 8989, path: "api/v3/system/status", headers: {} }
    - { name: radarr, port: 7878, path: "api/v3/system/status", headers: {} }
    - { name: lidarr, port: 8686, path: "api/v1/system/status", headers: {} }
    - { name: prowlarr, port: 9696, path: "api/v1/system/status", headers: {} }
    - { name: sabnzbd, port: 8080, path: "api?mode=version&output=json", headers: {} }
  loop_control:
    label: "{{ item.name }} (:{{ item.port }})"
  tags:
    - plex_services
    - validate

- name: Update config files for all containers with a database
  block:
    - name: Update XML config files with Postgres settings
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: /Config/PostgresUser
        value: "{{ item.value.db_user }}"
        state: present
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}: PostgresUser"
      when:
        - item.value.config is defined
        - item.value.db_user is defined
        - item.value.config | regex_search('\.xml$') is not none
      notify: restart plex services docker compose

    - name: Update XML config files with PostgresPassword
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: /Config/PostgresPassword
        value: "{{ secrets.plex_services[item.key ~ '_db_password'] }}"
        state: present
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}: PostgresPassword"
      when:
        - item.value.config is defined
        - item.value.db_user is defined
        - item.value.config | regex_search('\.xml$') is not none
      no_log: true
      notify: restart plex services docker compose

    - name: Update XML config files with PostgresHost
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: /Config/PostgresHost
        value: "postgres"
        state: present
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}: PostgresHost"
      when:
        - item.value.config is defined
        - item.value.config | regex_search('\.xml$') is not none
        - item.value.db_user is defined
      notify: restart plex services docker compose

    - name: Update XML config files with PostgresPort
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: /Config/PostgresPort
        value: "5432"
        state: present
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}: PostgresPort"
      when:
        - item.value.config is defined
        - item.value.config | regex_search('\.xml$') is not none
        - item.value.db_user is defined
      notify: restart plex services docker compose
  tags:
    - plex_services
    - config
    - postgres

- name: Restart services to apply PostgreSQL config before API configuration
  ansible.builtin.meta: flush_handlers
  tags:
    - plex_services
    - config
    - postgres

- name: Wait for *arr service APIs after PostgreSQL restart
  ansible.builtin.uri:
    url: "http://localhost:{{ item.port }}/{{ item.path }}"
    method: GET
    headers: "{{ item.headers | default({}) }}"
    status_code: [200, 401]
  register: api_health_post_pg
  until: api_health_post_pg is succeeded
  retries: 30
  delay: 5
  loop:
    - { name: sonarr, port: 8989, path: "api/v3/system/status", headers: {} }
    - { name: radarr, port: 7878, path: "api/v3/system/status", headers: {} }
    - { name: lidarr, port: 8686, path: "api/v1/system/status", headers: {} }
    - { name: prowlarr, port: 9696, path: "api/v1/system/status", headers: {} }
    - { name: sabnzbd, port: 8080, path: "api?mode=version&output=json", headers: {} }
  loop_control:
    label: "{{ item.name }} (:{{ item.port }})"
  tags:
    - plex_services
    - validate

- name: Read ApiKey from each *arr config.xml
  block:
    - name: Read config XML and register output
      community.general.xml:
        path: "/opt/plex-services/{{ item.key }}/{{ item.value.config }}"
        xpath: "/Config/ApiKey"
        content: text
      register: xml_result
      when:
        - item.value.config is defined
        - item.value.config | regex_search('\.xml$') is not none
      loop: "{{ plex_services | dict2items }}"
      loop_control:
        label: "{{ item.key }}"

    - name: Set api_key fact for each service
      ansible.builtin.set_fact:
        arr_api_keys: >-
          {{
            arr_api_keys | default({}) |
            combine({ item.item.key: item.matches[0].ApiKey | default('') })
          }}
      loop: "{{ xml_result.results }}"
      when:
        - item is mapping
        - "'matches' in item"
        - item.matches | length > 0
        - item.matches[0] is mapping
        - "'ApiKey' in item.matches[0]"
  tags:
    - plex_services
    - config

- name: Read SABnzbd API key from config
  block:
    - name: Read SABnzbd INI file
      ansible.builtin.slurp:
        src: /opt/plex-services/sabnzbd/sabnzbd.ini
      register: sabnzbd_ini_raw

    - name: Extract SABnzbd API key
      ansible.builtin.set_fact:
        arr_api_keys: >-
          {{
            arr_api_keys | default({}) |
            combine({ 'sabnzbd': (sabnzbd_ini_raw.content | b64decode | regex_search('api_key\s*=\s*(\S+)', '\1'))[0] })
          }}
      when: (sabnzbd_ini_raw.content | b64decode | regex_search('api_key\s*=\s*(\S+)')) is not none
  tags:
    - plex_services
    - config

- name: Read Bazarr API key from config
  block:
    - name: Read Bazarr config YAML
      ansible.builtin.slurp:
        src: /opt/plex-services/bazarr/config/config.yaml
      register: bazarr_config_raw

    - name: Extract Bazarr API key
      ansible.builtin.set_fact:
        arr_api_keys: >-
          {{
            arr_api_keys | default({}) |
            combine({ 'bazarr': (bazarr_config_raw.content | b64decode | from_yaml).auth.apikey })
          }}
      when: (bazarr_config_raw.content | b64decode | from_yaml).auth.apikey | default('') | length > 0
  tags:
    - plex_services
    - config

- name: Configure *arr service authentication
  when:
    - arr_api_keys is defined
  tags:
    - plex_services
    - config
    - auth
  block:
    - name: Get current *arr host config
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/api/{{ item.api }}/config/host"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys[item.service] }}"
        return_content: true
      register: arr_host_config
      loop:
        - { service: sonarr, port: 8989, api: v3 }
        - { service: radarr, port: 7878, api: v3 }
        - { service: lidarr, port: 8686, api: v1 }
        - { service: prowlarr, port: 9696, api: v1 }
      loop_control:
        label: "{{ item.service }}"
      when: arr_api_keys[item.service] is defined

    - name: Set *arr admin authentication
      ansible.builtin.uri:
        url: "http://localhost:{{ item.item.port }}/api/{{ item.item.api }}/config/host"
        method: PUT
        headers:
          X-Api-Key: "{{ arr_api_keys[item.item.service] }}"
          Content-Type: application/json
        body_format: json
        body: "{{ item.json | combine({'authenticationMethod': plex_services_arr_auth_method, 'authenticationRequired': plex_services_arr_auth_required, 'username': plex_services_arr_user, 'password': secrets.plex_services.arr_admin_password, 'passwordConfirmation': secrets.plex_services.arr_admin_password}) }}"
        status_code: [200, 202]
      loop: "{{ arr_host_config.results }}"
      loop_control:
        label: "{{ item.item.service }}"
      when:
        - item is not skipped
        - item.json.username | default('') == '' or item.json.username != plex_services_arr_user
      no_log: true

- name: Check usenet download directory structure
  community.docker.docker_container_exec:
    container: sabnzbd
    command: >
      sh -c "test -d /data/usenet/complete/tv
      && test -d /data/usenet/complete/movies
      && test -d /data/usenet/complete/music"
  register: _usenet_dirs_check
  changed_when: false
  failed_when: false
  tags:
    - plex_services
    - config
    - media

- name: Create usenet download directory structure
  community.docker.docker_container_exec:
    container: sabnzbd
    command: >
      sh -c "mkdir -p
      /data/usenet/complete/tv
      /data/usenet/complete/movies
      /data/usenet/complete/music
      && chown {{ plex_services['sabnzbd'].PUID }}:{{ plex_services_pgid }}
      /data/usenet /data/usenet/complete /data/usenet/complete/tv
      /data/usenet/complete/movies /data/usenet/complete/music
      && chmod 775
      /data/usenet /data/usenet/complete /data/usenet/complete/tv
      /data/usenet/complete/movies /data/usenet/complete/music"
  when: _usenet_dirs_check.rc != 0
  tags:
    - plex_services
    - config
    - media

- name: Deploy recyclarr configuration
  ansible.builtin.template:
    src: recyclarr.yml.j2
    dest: /opt/plex-services/recyclarr/recyclarr.yml
    owner: recyclarr
    group: "{{ plex_services_group }}"
    mode: '0640'
  register: _recyclarr_config_deployed
  when:
    - arr_api_keys is defined
    - arr_api_keys.sonarr is defined
    - arr_api_keys.radarr is defined
  notify: restart plex services docker compose
  tags:
    - plex_services
    - config
    - recyclarr

- name: Configure SABnzbd download directories and categories
  when:
    - arr_api_keys is defined
    - arr_api_keys.sabnzbd is defined
  tags:
    - plex_services
    - config
    - sabnzbd
  block:
    - name: Get current SABnzbd misc config
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=get_config&section=misc&output=json&apikey={{ arr_api_keys.sabnzbd }}"
        method: GET
        return_content: true
      register: _sabnzbd_misc_config

    - name: Set SABnzbd misc config facts
      ansible.builtin.set_fact:
        _sabnzbd_misc: "{{ _sabnzbd_misc_config.json.config.misc | default({}) }}"

    - name: Enable SABnzbd API access from Docker network
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=inet_exposure&value=4&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      register: _sabnzbd_inet_change
      when: (_sabnzbd_misc.inet_exposure | default('0') | string) != '4'

    - name: Add container hostnames to SABnzbd host whitelist
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=host_whitelist&value=sabnzbd,sonarr,radarr,lidarr,prowlarr&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      register: _sabnzbd_whitelist_change
      when: (_sabnzbd_misc.host_whitelist | default('')) != 'sabnzbd,sonarr,radarr,lidarr,prowlarr'

    - name: Mark SABnzbd wizard as completed
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=wizard_completed&value=1&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      when: (_sabnzbd_misc.wizard_completed | default('0') | string) != '1'

    - name: Clear SABnzbd username (no UI auth)
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=username&value=&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      when: (_sabnzbd_misc.username | default('')) | length > 0

    - name: Clear SABnzbd password (no UI auth)
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=password&value=&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      when: (_sabnzbd_misc.password | default('')) | length > 0

    - name: Restart SABnzbd to apply network access settings
      community.docker.docker_compose_v2:
        project_src: /opt/plex-services
        services:
          - sabnzbd
        state: restarted
        wait: true
        wait_timeout: 60
      when: >-
        (_sabnzbd_inet_change is not skipped) or
        (_sabnzbd_whitelist_change is not skipped)

    - name: Wait for SABnzbd API after restart
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=version&output=json"
        method: GET
        status_code: [200]
      register: sabnzbd_restart_health
      until: sabnzbd_restart_health is succeeded
      retries: 15
      delay: 3
      when: >-
        (_sabnzbd_inet_change is not skipped) or
        (_sabnzbd_whitelist_change is not skipped)

    - name: Set SABnzbd complete download directory
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=complete_dir&value=/data/usenet/complete&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      when: (_sabnzbd_misc.complete_dir | default('')) != '/data/usenet/complete'

    - name: Set SABnzbd incomplete download directory
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=download_dir&value={{ _sabnzbd_incomplete_dir }}&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      vars:
        _sabnzbd_incomplete_dir: "{{ '/scratch' if scratch_disk_device is defined else '/data/usenet/incomplete' }}"
      when: (_sabnzbd_misc.download_dir | default('')) != _sabnzbd_incomplete_dir

    - name: Enable SABnzbd auto-resume on disk space available
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=misc&keyword=auto_resume&value=1&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      when: (_sabnzbd_misc.auto_resume | default('0') | string) != '1'

    - name: Get current SABnzbd categories config
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=get_config&section=categories&output=json&apikey={{ arr_api_keys.sabnzbd }}"
        method: GET
        return_content: true
      register: _sabnzbd_categories_config

    - name: Configure SABnzbd categories
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=categories&keyword={{ item.name }}&name={{ item.name }}&dir={{ item.dir }}&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      loop:
        - { name: tv, dir: tv }
        - { name: movies, dir: movies }
        - { name: music, dir: music }
      loop_control:
        label: "{{ item.name }}"
      vars:
        _existing_cats: "{{ _sabnzbd_categories_config.json.config.categories | default({}) }}"
      when: (_existing_cats[item.name] | default({})).dir | default('') != item.dir

- name: Configure SABnzbd news servers
  when:
    - arr_api_keys is defined
    - arr_api_keys.sabnzbd is defined
    - plex_services_usenet_servers | length > 0
  tags:
    - plex_services
    - config
    - sabnzbd
  block:
    - name: Get existing SABnzbd server config
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=get_config&section=servers&output=json&apikey={{ arr_api_keys.sabnzbd }}"
        method: GET
        return_content: true
      register: sabnzbd_server_config

    - name: Normalize SABnzbd server list (API returns dict or list depending on version)
      ansible.builtin.set_fact:
        _sabnzbd_existing_servers: >-
          {% if sabnzbd_server_config.json.config.servers is defined and sabnzbd_server_config.json.config.servers is mapping %}
          {{ sabnzbd_server_config.json.config.servers | dict2items | map(attribute='value') | list }}
          {% elif sabnzbd_server_config.json.config.servers is defined %}
          {{ sabnzbd_server_config.json.config.servers }}
          {% else %}
          []
          {% endif %}

    - name: Add SABnzbd news servers
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=set_config&section=servers&keyword={{ item.name | urlencode }}&name={{ item.name | urlencode }}&host={{ item.host | urlencode }}&port={{ item.port }}&ssl={{ item.ssl | ternary(1, 0) }}&connections={{ item.connections | default(50) }}&retention={{ item.retention | default(0) }}&quota={{ item.quota | default('') | urlencode }}&usage_at_start={{ item.usage_at_start | default(0) }}&priority={{ item.priority | default(0) }}&username={{ secrets.plex_services[item.username_key] | urlencode }}&password={{ secrets.plex_services[item.password_key] | urlencode }}&enable=1&apikey={{ arr_api_keys.sabnzbd }}&output=json"
        method: GET
        return_content: true
      loop: "{{ plex_services_usenet_servers }}"
      loop_control:
        label: "{{ item.name }}"
      when: _sabnzbd_existing_servers | selectattr('host', 'defined') | selectattr('host', 'equalto', item.host) | list | length == 0
      no_log: true

    - name: Restart SABnzbd to apply server config
      community.docker.docker_compose_v2:
        project_src: /opt/plex-services
        services:
          - sabnzbd
        state: restarted
        wait: true
        wait_timeout: 60
      when: _sabnzbd_existing_servers | length == 0

    - name: Wait for SABnzbd API after news server restart
      ansible.builtin.uri:
        url: "http://localhost:8080/api?mode=version&output=json&apikey={{ arr_api_keys.sabnzbd }}"
        method: GET
        status_code: [200]
      register: sabnzbd_post_server_health
      until: sabnzbd_post_server_health is succeeded
      retries: 15
      delay: 3
      when: _sabnzbd_existing_servers | length == 0

- name: Configure *arr naming conventions (TRaSH Guide recommended)
  when:
    - arr_api_keys is defined
  tags:
    - plex_services
    - config
    - naming
  block:
    - name: Get current naming config
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/api/{{ item.api }}/config/naming"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys[item.service] }}"
        return_content: true
      register: arr_naming_config
      loop:
        - service: sonarr
          port: 8989
          api: v3
        - service: radarr
          port: 7878
          api: v3
      loop_control:
        label: "{{ item.service }}"
      when: arr_api_keys[item.service] is defined

    - name: Set Sonarr naming config
      ansible.builtin.uri:
        url: "http://localhost:8989/api/v3/config/naming"
        method: PUT
        headers:
          X-Api-Key: "{{ arr_api_keys.sonarr }}"
          Content-Type: application/json
        body_format: json
        body: >-
          {{ (arr_naming_config.results | selectattr('item.service', 'equalto', 'sonarr') | first).json | combine({
            'renameEpisodes': true,
            'seriesFolderFormat': '{Series TitleYear} [imdb-{ImdbId}]',
            'seasonFolderFormat': 'Season {season:00}',
            'standardEpisodeFormat': '{Series TitleYear} - S{season:00}E{episode:00} - {Episode CleanTitle} [{Custom Formats }{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoCodec]}{-Release Group}',
            'dailyEpisodeFormat': '{Series TitleYear} - {Air-Date} - {Episode CleanTitle} [{Custom Formats }{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoCodec]}{-Release Group}',
            'animeEpisodeFormat': '{Series TitleYear} - S{season:00}E{episode:00} - {absolute:000} - {Episode CleanTitle} [{Custom Formats }{Quality Full}]{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoCodec]}{-Release Group}'
          }) }}
        status_code: [200, 202]
      when:
        - arr_api_keys.sonarr is defined
        - (arr_naming_config.results | selectattr('item.service', 'equalto', 'sonarr') | first).json.seriesFolderFormat | default('') != '{Series TitleYear} [imdb-{ImdbId}]'

    - name: Set Radarr naming config
      ansible.builtin.uri:
        url: "http://localhost:7878/api/v3/config/naming"
        method: PUT
        headers:
          X-Api-Key: "{{ arr_api_keys.radarr }}"
          Content-Type: application/json
        body_format: json
        body: >-
          {{ (arr_naming_config.results | selectattr('item.service', 'equalto', 'radarr') | first).json | combine({
            'renameMovies': true,
            'movieFolderFormat': '{Movie CleanTitle} ({Release Year}) [imdb-{ImdbId}]',
            'standardMovieFormat': '{Movie CleanTitle} ({Release Year}) [imdb-{ImdbId}] {edition-{Edition Tags}} [{Custom Formats}] [{Quality Full}]{[MediaInfo 3D]}{[MediaInfo VideoDynamicRangeType]}{[Mediainfo AudioCodec}{ Mediainfo AudioChannels]}{[MediaInfo VideoCodec]}{-Release Group}',
            'colonReplacementFormat': 'dash'
          }) }}
        status_code: [200, 202]
      when:
        - arr_api_keys.radarr is defined
        - (arr_naming_config.results | selectattr('item.service', 'equalto', 'radarr') | first).json.movieFolderFormat | default('') != '{Movie CleanTitle} ({Release Year}) [imdb-{ImdbId}]'

- name: Configure *arr root folders
  when:
    - arr_api_keys is defined
  tags:
    - plex_services
    - config
  block:
    - name: Check existing root folders
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/api/{{ item.api }}/rootfolder"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys[item.service] }}"
        return_content: true
      register: existing_root_folders
      loop:
        - { service: sonarr, port: 8989, api: v3, path: /data/media/TV }
        - { service: radarr, port: 7878, api: v3, path: /data/media/Movies }
      loop_control:
        label: "{{ item.service }}"
      when: arr_api_keys[item.service] is defined

    - name: Add root folders to Sonarr and Radarr
      ansible.builtin.uri:
        url: "http://localhost:{{ item.item.port }}/api/{{ item.item.api }}/rootfolder"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys[item.item.service] }}"
        body_format: json
        body:
          path: "{{ item.item.path }}"
        status_code: [200, 201]
      loop: "{{ existing_root_folders.results }}"
      loop_control:
        label: "{{ item.item.service }}: {{ item.item.path }}"
      when:
        - item is not skipped
        - item.json | selectattr('path', 'eq', item.item.path) | list | length == 0

- name: Configure Lidarr root folder
  when:
    - arr_api_keys is defined
    - arr_api_keys.lidarr is defined
  tags:
    - plex_services
    - config
  block:
    - name: Check existing Lidarr root folders
      ansible.builtin.uri:
        url: "http://localhost:8686/api/v1/rootfolder"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.lidarr }}"
        return_content: true
      register: lidarr_root_folders

    - name: Get Lidarr quality profiles
      ansible.builtin.uri:
        url: "http://localhost:8686/api/v1/qualityprofile"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.lidarr }}"
        return_content: true
      register: lidarr_quality_profiles
      when: lidarr_root_folders.json | selectattr('path', 'eq', '/data/media/Music') | list | length == 0

    - name: Get Lidarr metadata profiles
      ansible.builtin.uri:
        url: "http://localhost:8686/api/v1/metadataprofile"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.lidarr }}"
        return_content: true
      register: lidarr_metadata_profiles
      when: lidarr_root_folders.json | selectattr('path', 'eq', '/data/media/Music') | list | length == 0

    - name: Add root folder to Lidarr
      ansible.builtin.uri:
        url: "http://localhost:8686/api/v1/rootfolder"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys.lidarr }}"
        body_format: json
        body:
          name: Music
          path: /data/media/Music
          defaultQualityProfileId: "{{ lidarr_quality_profiles.json[0].id }}"
          defaultMetadataProfileId: "{{ lidarr_metadata_profiles.json[0].id }}"
        status_code: [200, 201]
      when:
        - lidarr_root_folders.json | selectattr('path', 'eq', '/data/media/Music') | list | length == 0
        - lidarr_quality_profiles is not skipped
        - lidarr_metadata_profiles is not skipped

- name: Ensure SABnzbd is running before download client registration
  ansible.builtin.uri:
    url: "http://localhost:8080/api?mode=version&output=json&apikey={{ arr_api_keys.sabnzbd }}"
    method: GET
    status_code: [200]
  register: sabnzbd_pre_dlclient_health
  until: sabnzbd_pre_dlclient_health is succeeded
  retries: 15
  delay: 3
  when:
    - arr_api_keys is defined
    - arr_api_keys.sabnzbd is defined
  tags:
    - plex_services
    - config

- name: Configure SABnzbd as download client in *arr services
  when:
    - arr_api_keys is defined
    - arr_api_keys.sabnzbd is defined
  tags:
    - plex_services
    - config
  block:
    - name: Check existing download clients
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/api/{{ item.api }}/downloadclient"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys[item.service] }}"
        return_content: true
      register: existing_download_clients
      loop:
        - { service: sonarr, port: 8989, api: v3, category: tv }
        - { service: radarr, port: 7878, api: v3, category: movies }
        - { service: lidarr, port: 8686, api: v1, category: music }
      loop_control:
        label: "{{ item.service }}"
      when: arr_api_keys[item.service] is defined

    - name: Add SABnzbd download client to *arr services
      ansible.builtin.uri:
        url: "http://localhost:{{ item.item.port }}/api/{{ item.item.api }}/downloadclient?forceSave=true"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys[item.item.service] }}"
        body_format: json
        body:
          name: SABnzbd
          implementation: Sabnzbd
          configContract: SabnzbdSettings
          protocol: usenet
          enable: true
          priority: 1
          removeCompletedDownloads: true
          removeFailedDownloads: true
          fields:
            - name: host
              value: sabnzbd
            - name: port
              value: 8080
            - name: useSsl
              value: false
            - name: apiKey
              value: "{{ arr_api_keys.sabnzbd }}"
            - name: category
              value: "{{ item.item.category }}"
        status_code: [200, 201]
      loop: "{{ existing_download_clients.results }}"
      loop_control:
        label: "{{ item.item.service }}: SABnzbd ({{ item.item.category }})"
      when:
        - item is not skipped
        - item.json | selectattr('name', 'equalto', 'SABnzbd') | list | length == 0

- name: Configure Plex notification connections in *arr services
  when:
    - arr_api_keys is defined
    - (secrets.plex | default({})).plex_token | default('') | length > 0
  tags:
    - plex_services
    - config
  block:
    - name: Check existing Plex notification connections
      ansible.builtin.uri:
        url: "http://localhost:{{ item.port }}/api/{{ item.api }}/notification"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys[item.service] }}"
        return_content: true
      register: existing_notifications
      loop:
        - { service: sonarr, port: 8989, api: v3 }
        - { service: radarr, port: 7878, api: v3 }
      loop_control:
        label: "{{ item.service }}"
      when: arr_api_keys[item.service] is defined

    - name: Add Plex notification connection to *arr services
      ansible.builtin.uri:
        url: "http://localhost:{{ item.item.port }}/api/{{ item.item.api }}/notification?forceSave=true"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys[item.item.service] }}"
        body_format: json
        body:
          name: Plex Media Server
          implementation: PlexServer
          configContract: PlexServerSettings
          onGrab: false
          onDownload: true
          onUpgrade: true
          onRename: true
          onMovieAdded: false
          onMovieDelete: true
          onMovieFileDelete: true
          onMovieFileDeleteForUpgrade: true
          onSeriesAdd: false
          onSeriesDelete: true
          onEpisodeFileDelete: true
          onEpisodeFileDeleteForUpgrade: true
          supportsOnGrab: false
          supportsOnDownload: true
          supportsOnUpgrade: true
          supportsOnRename: true
          supportsOnMovieAdded: false
          supportsOnMovieDelete: true
          supportsOnMovieFileDelete: true
          supportsOnMovieFileDeleteForUpgrade: true
          supportsOnSeriesAdd: false
          supportsOnSeriesDelete: true
          supportsOnEpisodeFileDelete: true
          supportsOnEpisodeFileDeleteForUpgrade: true
          fields:
            - name: host
              value: "{{ seerr_plex_hostname }}"
            - name: port
              value: "{{ seerr_plex_port }}"
            - name: useSsl
              value: "{{ seerr_plex_use_ssl }}"
            - name: authToken
              value: "{{ secrets.plex.plex_token }}"
            - name: updateLibrary
              value: true
        status_code: [200, 201]
      loop: "{{ existing_notifications.results }}"
      loop_control:
        label: "{{ item.item.service }}: Plex Media Server"
      when:
        - item is not skipped
        - item.json | selectattr('implementation', 'equalto', 'PlexServer') | list | length == 0
      no_log: true
      failed_when: false
      register: _plex_notification_results

    - name: Warn about Plex notification failures
      ansible.builtin.debug:
        msg: "WARNING: Failed to add Plex notification to {{ item.item.item.service }} (HTTP {{ item.status | default('unknown') }}). Re-run after services are fully initialized."
      loop: "{{ _plex_notification_results.results | default([]) }}"
      loop_control:
        label: "{{ item.item.item.service | default('unknown') }}"
      when:
        - item is not skipped
        - item.status is defined
        - item.status not in [200, 201]

- name: Register *arr applications in Prowlarr
  when:
    - arr_api_keys is defined
    - arr_api_keys.prowlarr is defined
  tags:
    - plex_services
    - config
    - prowlarr
  block:
    - name: Check existing Prowlarr applications
      ansible.builtin.uri:
        url: "http://localhost:9696/api/v1/applications"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.prowlarr }}"
        return_content: true
      register: prowlarr_apps

    - name: Add *arr applications to Prowlarr
      ansible.builtin.uri:
        url: "http://localhost:9696/api/v1/applications"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys.prowlarr }}"
        body_format: json
        body:
          syncLevel: fullSync
          name: "{{ item.name }}"
          implementation: "{{ item.implementation }}"
          configContract: "{{ item.config_contract }}"
          fields:
            - name: prowlarrUrl
              value: "http://prowlarr:9696"
            - name: baseUrl
              value: "http://{{ item.container }}:{{ item.port }}"
            - name: apiKey
              value: "{{ arr_api_keys[item.service] }}"
            - name: syncCategories
              value: "{{ item.categories }}"
          tags: []
        status_code: [200, 201]
      loop:
        - name: Sonarr
          service: sonarr
          container: sonarr
          port: 8989
          implementation: Sonarr
          config_contract: SonarrSettings
          categories: [5000, 5010, 5020, 5030, 5040, 5045, 5050]
        - name: Radarr
          service: radarr
          container: radarr
          port: 7878
          implementation: Radarr
          config_contract: RadarrSettings
          categories: [2000, 2010, 2020, 2030, 2040, 2045, 2050]
        - name: Lidarr
          service: lidarr
          container: lidarr
          port: 8686
          implementation: Lidarr
          config_contract: LidarrSettings
          categories: [3000, 3010, 3020, 3030, 3040]
      loop_control:
        label: "{{ item.name }}"
      when:
        - arr_api_keys[item.service] is defined
        - prowlarr_apps.json | selectattr('name', 'equalto', item.name) | list | length == 0

- name: Seed Prowlarr indexers
  when:
    - arr_api_keys is defined
    - arr_api_keys.prowlarr is defined
    - plex_services_indexers | length > 0
  tags:
    - plex_services
    - config
    - prowlarr
  block:
    - name: Check existing Prowlarr indexers
      ansible.builtin.uri:
        url: "http://localhost:9696/api/v1/indexer"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.prowlarr }}"
        return_content: true
      register: prowlarr_indexers

    - name: Add indexers to Prowlarr
      ansible.builtin.uri:
        url: "http://localhost:9696/api/v1/indexer"
        method: POST
        headers:
          X-Api-Key: "{{ arr_api_keys.prowlarr }}"
        body_format: json
        body:
          name: "{{ item.name }}"
          enable: true
          redirect: true
          implementation: "{{ item.implementation | default('Newznab') }}"
          configContract: "{{ item.config_contract | default('NewznabSettings') }}"
          enableRss: true
          enableAutomaticSearch: true
          enableInteractiveSearch: true
          priority: 25
          appProfileId: 1
          fields:
            - name: baseUrl
              value: "{{ item.url }}"
            - name: apiPath
              value: "{{ item.api_path | default('/api') }}"
            - name: apiKey
              value: "{{ secrets.plex_services[item.api_key_key] }}"
        status_code: [200, 201]
      loop: "{{ plex_services_indexers }}"
      loop_control:
        label: "{{ item.name }}"
      when: prowlarr_indexers.json | selectattr('name', 'equalto', item.name) | list | length == 0
      no_log: true

- name: Run Recyclarr sync to apply TRaSH Guide profiles
  community.docker.docker_container_exec:
    container: recyclarr
    command: recyclarr sync
  register: recyclarr_sync
  failed_when: false
  changed_when: recyclarr_sync.rc == 0
  when:
    - arr_api_keys is defined
    - arr_api_keys.sonarr is defined
    - arr_api_keys.radarr is defined
    - _recyclarr_config_deployed is changed
  tags:
    - plex_services
    - config
    - recyclarr

# Configure Bazarr language profile and providers BEFORE Sonarr/Radarr integration.
# On greenfield builds, this ensures the default profile is set before Bazarr's
# initial sync, so all series/movies get the English profile automatically.
- name: Configure Bazarr language profile and providers
  when:
    - arr_api_keys is defined
    - arr_api_keys.bazarr is defined
    - bazarr_providers is defined
  tags:
    - plex_services
    - config
    - bazarr
  block:
    - name: Wait for Bazarr API to be ready
      ansible.builtin.uri:
        url: "http://localhost:6767/api/system/status"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        status_code: 200
      register: _bazarr_health
      until: _bazarr_health is succeeded
      retries: 15
      delay: 3

    - name: Get current Bazarr language profiles
      ansible.builtin.uri:
        url: "http://localhost:6767/api/system/languages/profiles"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        return_content: true
      register: _bazarr_profiles

    - name: Get current Bazarr settings for defaults
      ansible.builtin.uri:
        url: "http://localhost:6767/api/system/settings"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        return_content: true
      register: _bazarr_current

    - name: Check if Bazarr language/provider config needs update
      ansible.builtin.set_fact:
        _bazarr_lang_needs_update: >-
          {{
            _bazarr_profiles.json | length == 0 or
            not (_bazarr_current.json.general.serie_default_enabled | default(false)) or
            not (_bazarr_current.json.general.movie_default_enabled | default(false)) or
            (_bazarr_current.json.general.enabled_providers | default([]) | sort) != (bazarr_providers | map(attribute='name') | list | sort)
          }}

    # Enable English, create profile, set defaults, configure providers — all in one request.
    # Bazarr restarts itself after settings change.
    # Uses a shell script with --data-urlencode per field to safely handle
    # passwords containing &, =, %, and other special characters.
    - name: Configure Bazarr English language profile and providers
      ansible.builtin.shell:
        cmd: |
          curl -s --max-time 10 \
            -X POST \
            -H "X-API-KEY: {{ arr_api_keys.bazarr }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "languages-enabled=en" \
            --data-urlencode 'languages-profiles=[{"profileId":1,"name":"English","items":[{"id":1,"language":"en","audio_exclude":"False","audio_only_include":"False","hi":"False","forced":"False"}],"cutoff":null,"mustContain":[],"mustNotContain":[],"originalFormat":false}]' \
          {% for provider in bazarr_providers %}
            --data-urlencode "settings-general-enabled_providers={{ provider.name }}" \
          {% for key, value in (provider.settings | default({})).items() %}
            --data-urlencode "settings-{{ provider.name }}-{{ key }}={{ value }}" \
          {% endfor %}
          {% if provider.username_key is defined %}
            --data-urlencode "settings-{{ provider.name }}-username={{ secrets.plex_services[provider.username_key] | default('') }}" \
          {% endif %}
          {% if provider.password_key is defined %}
            --data-urlencode "settings-{{ provider.name }}-password={{ secrets.plex_services[provider.password_key] | default('') }}" \
          {% endif %}
          {% endfor %}
            --data-urlencode "settings-general-serie_default_enabled=true" \
            --data-urlencode "settings-general-serie_default_profile=1" \
            --data-urlencode "settings-general-movie_default_enabled=true" \
            --data-urlencode "settings-general-movie_default_profile=1" \
            http://localhost:6767/api/system/settings
      register: _bazarr_lang_update
      failed_when: false
      changed_when: true
      no_log: true
      when: _bazarr_lang_needs_update | bool

    - name: Wait for Bazarr to restart after language config
      ansible.builtin.uri:
        url: "http://localhost:6767/api/system/status"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        status_code: [200]
      register: _bazarr_lang_health
      until: _bazarr_lang_health is succeeded
      retries: 15
      delay: 3
      when: _bazarr_lang_needs_update | bool

- name: Configure Bazarr Sonarr/Radarr/Plex integration
  when:
    - arr_api_keys is defined
    - arr_api_keys.bazarr is defined
    - arr_api_keys.sonarr is defined
    - arr_api_keys.radarr is defined
  tags:
    - plex_services
    - config
    - bazarr
  block:
    - name: Get current Bazarr settings
      ansible.builtin.uri:
        url: "http://localhost:6767/api/system/settings"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        return_content: true
      register: _bazarr_settings

    - name: Check if Bazarr integration config needs update
      ansible.builtin.set_fact:
        _bazarr_needs_update: >-
          {{
            not (_bazarr_settings.json.general.use_sonarr | default(false)) or
            not (_bazarr_settings.json.general.use_radarr | default(false)) or
            (_bazarr_settings.json.sonarr.apikey | default('')) != arr_api_keys.sonarr or
            (_bazarr_settings.json.sonarr.ip | default('')) != 'sonarr' or
            (_bazarr_settings.json.radarr.apikey | default('')) != arr_api_keys.radarr or
            (_bazarr_settings.json.radarr.ip | default('')) != 'radarr' or
            (bazarr_use_plex | default(false) and not (_bazarr_settings.json.general.use_plex | default(false))) or
            (bazarr_use_plex | default(false) and (_bazarr_settings.json.plex.ip | default('')) != seerr_plex_hostname) or
            (bazarr_use_plex | default(false) and not (_bazarr_settings.json.plex.update_movie_library | default(false))) or
            (bazarr_use_plex | default(false) and not (_bazarr_settings.json.plex.update_series_library | default(false)))
          }}

    # Bazarr API uses form-encoded keys in "settings-section-key" format.
    # Bazarr restarts itself after settings change, so the POST may not return.
    - name: Update Bazarr Sonarr/Radarr/Plex settings
      ansible.builtin.shell:
        cmd: |
          curl -s --max-time 10 \
            -X POST \
            -H "X-API-KEY: {{ arr_api_keys.bazarr }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "settings-general-use_sonarr={{ bazarr_use_sonarr | default(true) | string | lower }}" \
            --data-urlencode "settings-general-use_radarr={{ bazarr_use_radarr | default(true) | string | lower }}" \
            --data-urlencode "settings-sonarr-ip=sonarr" \
            --data-urlencode "settings-sonarr-port=8989" \
            --data-urlencode "settings-sonarr-apikey={{ arr_api_keys.sonarr }}" \
            --data-urlencode "settings-sonarr-base_url=/" \
            --data-urlencode "settings-sonarr-ssl=false" \
            --data-urlencode "settings-radarr-ip=radarr" \
            --data-urlencode "settings-radarr-port=7878" \
            --data-urlencode "settings-radarr-apikey={{ arr_api_keys.radarr }}" \
            --data-urlencode "settings-radarr-base_url=/" \
            --data-urlencode "settings-radarr-ssl=false" \
          {% if bazarr_use_plex | default(false) %}
            --data-urlencode "settings-general-use_plex=true" \
            --data-urlencode "settings-plex-ip={{ seerr_plex_hostname }}" \
            --data-urlencode "settings-plex-port={{ seerr_plex_port }}" \
            --data-urlencode "settings-plex-ssl={{ seerr_plex_use_ssl | string | lower }}" \
            --data-urlencode "settings-plex-apikey={{ secrets.plex.plex_token }}" \
            --data-urlencode "settings-plex-update_movie_library=true" \
            --data-urlencode "settings-plex-update_series_library=true" \
            --data-urlencode "settings-plex-movie_library={{ seerr_plex_libraries | select('equalto', 'Movies') | first | default('Movies') }}" \
            --data-urlencode "settings-plex-series_library={{ seerr_plex_libraries | select('equalto', 'TV Shows') | first | default('TV Shows') }}" \
          {% endif %}
            http://localhost:6767/api/system/settings
      register: _bazarr_update
      failed_when: false
      changed_when: true
      no_log: true
      when: _bazarr_needs_update | bool

    - name: Wait for Bazarr to restart after settings update
      ansible.builtin.uri:
        url: "http://localhost:6767/api/system/status"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        status_code: [200]
      register: _bazarr_restart_health
      until: _bazarr_restart_health is succeeded
      retries: 15
      delay: 3
      when: _bazarr_needs_update | bool

    # After enabling Sonarr/Radarr, Bazarr syncs content automatically.
    # Wait for the initial sync to complete before applying profiles.
    - name: Wait for Bazarr to complete initial Sonarr/Radarr sync
      ansible.builtin.uri:
        url: "http://localhost:6767/api/system/tasks"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        return_content: true
      register: _bazarr_tasks
      until: >-
        _bazarr_tasks is succeeded and
        (_bazarr_tasks.json.data | default([])
         | selectattr('job_id', 'in', ['update_series', 'update_movies'])
         | selectattr('job_running', 'equalto', true)
         | list | length == 0)
      retries: 30
      delay: 10
      when: _bazarr_needs_update | bool

- name: Apply Bazarr English profile to all existing content
  when:
    - arr_api_keys is defined
    - arr_api_keys.bazarr is defined
  tags:
    - plex_services
    - config
    - bazarr
  block:
    - name: Get all series from Bazarr
      ansible.builtin.uri:
        url: "http://localhost:6767/api/series"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        return_content: true
      register: _bazarr_series

    - name: Find series without English profile
      ansible.builtin.set_fact:
        _bazarr_series_no_profile: >-
          {{ _bazarr_series.json.data | default([])
             | rejectattr('profileId', 'equalto', 1)
             | map(attribute='sonarrSeriesId') | list }}

    # Bazarr POST /api/series expects repeated form params: seriesid=X&profileid=1&seriesid=Y&profileid=1
    - name: Apply English profile to all series
      ansible.builtin.shell:
        cmd: |
          PARAMS=""
          {% for sid in _bazarr_series_no_profile %}
          PARAMS="${PARAMS}&seriesid={{ sid }}&profileid=1"
          {% endfor %}
          PARAMS="${PARAMS#&}"
          curl -s -X POST \
            -H "X-API-KEY: {{ arr_api_keys.bazarr }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "${PARAMS}" \
            http://localhost:6767/api/series
      register: _bazarr_series_profile
      changed_when: _bazarr_series_profile.rc == 0
      when: _bazarr_series_no_profile | length > 0

    - name: Get all movies from Bazarr
      ansible.builtin.uri:
        url: "http://localhost:6767/api/movies"
        method: GET
        headers:
          X-API-KEY: "{{ arr_api_keys.bazarr }}"
        return_content: true
      register: _bazarr_movies

    - name: Find movies without English profile
      ansible.builtin.set_fact:
        _bazarr_movies_no_profile: >-
          {{ _bazarr_movies.json.data | default([])
             | rejectattr('profileId', 'equalto', 1)
             | map(attribute='radarrId') | list }}

    # Bazarr POST /api/movies expects repeated form params: radarrid=X&profileid=1&radarrid=Y&profileid=1
    - name: Apply English profile to all movies
      ansible.builtin.shell:
        cmd: |
          PARAMS=""
          {% for mid in _bazarr_movies_no_profile %}
          PARAMS="${PARAMS}&radarrid={{ mid }}&profileid=1"
          {% endfor %}
          PARAMS="${PARAMS#&}"
          curl -s -X POST \
            -H "X-API-KEY: {{ arr_api_keys.bazarr }}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "${PARAMS}" \
            http://localhost:6767/api/movies
      register: _bazarr_movies_profile
      changed_when: _bazarr_movies_profile.rc == 0
      when: _bazarr_movies_no_profile | length > 0

- name: Configure Tautulli (automated setup)
  when:
    - (secrets.plex | default({})).plex_token | default('') | length > 0
  tags:
    - plex_services
    - config
    - tautulli
  block:
    - name: Wait for Tautulli config file
      ansible.builtin.wait_for:
        path: /opt/plex-services/tautulli/config.ini
        timeout: 120

    - name: Read Tautulli INI file
      ansible.builtin.slurp:
        src: /opt/plex-services/tautulli/config.ini
      register: _tautulli_ini_raw

    - name: Extract Tautulli API key
      ansible.builtin.set_fact:
        _tautulli_api_key: >-
          {{ (_tautulli_ini_raw.content | b64decode | regex_search('api_key\s*=\s*(\S+)', '\1'))[0] }}
      when: (_tautulli_ini_raw.content | b64decode | regex_search('api_key\s*=\s*(\S+)')) is not none

    - name: Check if Tautulli Plex connection is configured
      ansible.builtin.lineinfile:
        path: /opt/plex-services/tautulli/config.ini
        regexp: '^pms_ip\s*='
        line: "pms_ip = {{ seerr_plex_hostname }}"
        state: present
      check_mode: true
      register: _tautulli_pms_check

    - name: Configure Tautulli Plex connection in config.ini
      community.general.ini_file:
        path: /opt/plex-services/tautulli/config.ini
        section: "{{ item.section }}"
        option: "{{ item.key }}"
        value: "{{ item.value }}"
        no_extra_spaces: true
      loop:
        - { section: PMS, key: pms_ip, value: "{{ seerr_plex_hostname }}" }
        - { section: PMS, key: pms_port, value: "{{ seerr_plex_port }}" }
        - { section: PMS, key: pms_token, value: "{{ secrets.plex.plex_token }}" }
        - { section: PMS, key: pms_ssl, value: "{{ seerr_plex_use_ssl | ternary('1', '0') }}" }
        - { section: PMS, key: pms_url_manual, value: "1" }
        - { section: General, key: http_base_url, value: "{{ tautulli_base_url | default('') }}" }
        - { section: General, key: allow_guest_access, value: "0" }
      loop_control:
        label: "[{{ item.section }}] {{ item.key }}"
      register: _tautulli_config_changes
      no_log: true

    - name: Restart Tautulli to apply config changes
      community.docker.docker_compose_v2:
        project_src: /opt/plex-services
        services:
          - tautulli
        state: restarted
        wait: true
        wait_timeout: 60
      when: _tautulli_config_changes is changed

    - name: Wait for Tautulli API after restart
      ansible.builtin.uri:
        url: "http://localhost:8181/api/v2?apikey={{ _tautulli_api_key }}&cmd=arnold"
        method: GET
        status_code: [200]
      register: _tautulli_restart_health
      until: _tautulli_restart_health is succeeded
      retries: 15
      delay: 3
      when: _tautulli_config_changes is changed

    - name: Store Tautulli API key in arr_api_keys
      ansible.builtin.set_fact:
        arr_api_keys: "{{ arr_api_keys | default({}) | combine({'tautulli': _tautulli_api_key}) }}"
      when: _tautulli_api_key is defined

- name: Configure Seerr (automated first-run setup)
  when:
    - arr_api_keys is defined
    - arr_api_keys.sonarr is defined
    - arr_api_keys.radarr is defined
    - (secrets.plex | default({})).plex_token | default('') | length > 0
  tags:
    - plex_services
    - config
    - seerr
  block:
    - name: Check if Seerr is initialized
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/public"
        method: GET
        return_content: true
      register: seerr_public
      until: seerr_public is succeeded
      retries: 10
      delay: 5

    - name: Authenticate Seerr with Plex
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/auth/plex"
        method: POST
        body_format: json
        body:
          authToken: "{{ secrets.plex.plex_token }}"
        return_content: true
        status_code: [200, 201]
      register: seerr_auth
      when: not (seerr_public.json.initialized | default(false))
      no_log: true

    - name: Extract Seerr session cookie
      ansible.builtin.set_fact:
        _seerr_cookie: "{{ seerr_auth.cookies_string }}"
      when:
        - seerr_auth is not skipped
        - seerr_auth is succeeded
      no_log: true

    - name: Get Seerr API key
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/main"
        method: GET
        headers:
          Cookie: "{{ _seerr_cookie }}"
        return_content: true
      register: seerr_main_settings
      when:
        - _seerr_cookie is defined
        - not (seerr_public.json.initialized | default(false))

    - name: Set Seerr API key fact
      ansible.builtin.set_fact:
        _seerr_api_key: "{{ seerr_main_settings.json.apiKey }}"
      when:
        - seerr_main_settings is not skipped
        - seerr_main_settings is succeeded

    - name: Use existing Seerr API key if already initialized
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/auth/plex"
        method: POST
        body_format: json
        body:
          authToken: "{{ secrets.plex.plex_token }}"
        return_content: true
        status_code: [200, 201]
      register: seerr_reauth
      when:
        - seerr_public.json.initialized | default(false)
        - _seerr_api_key is not defined
      no_log: true

    - name: Get API key from existing Seerr instance
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/main"
        method: GET
        headers:
          Cookie: "{{ seerr_reauth.cookies_string }}"
        return_content: true
      register: seerr_existing_settings
      when:
        - seerr_reauth is not skipped
        - seerr_reauth is succeeded

    - name: Set Seerr API key fact from existing instance
      ansible.builtin.set_fact:
        _seerr_api_key: "{{ seerr_existing_settings.json.apiKey }}"
      when:
        - seerr_existing_settings is not skipped
        - seerr_existing_settings is succeeded

    # After /auth/plex, Seerr knows the Plex token but hasn't selected a server.
    # We fetch the available servers from plex.tv via Seerr's device endpoint,
    # find the plex.direct connection, and POST it to /settings/plex.

    - name: Get current Seerr Plex settings
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: seerr_plex_settings
      when: _seerr_api_key is defined

    - name: Discover Plex servers from plex.tv
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex/devices/servers"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: _seerr_plex_devices
      when:
        - _seerr_api_key is defined
        - seerr_plex_settings.json.ip | default('') | length == 0

    - name: Select active Plex server in Seerr
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex"
        method: POST
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
          Content-Type: application/json
        body_format: json
        body:
          ip: "{{ _plex_connection.address }}"
          port: "{{ _plex_connection.port }}"
          useSsl: "{{ _plex_connection.protocol == 'https' }}"
        status_code: [200]
      vars:
        _plex_server: "{{ _seerr_plex_devices.json | first }}"
        _plex_direct_connections: >-
          {{ _plex_server.connection | default([])
             | selectattr('address', 'search', 'plex\.direct')
             | list }}
        _plex_connection: "{{ _plex_direct_connections | first }}"
      when:
        - _seerr_plex_devices is not skipped
        - _seerr_plex_devices is succeeded
        - _seerr_plex_devices.json | default([]) | length > 0

    - name: Get current Plex libraries in Seerr
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex/library"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: _seerr_plex_libs_current
      when: _seerr_api_key is defined

    - name: Check if Plex libraries need syncing
      ansible.builtin.set_fact:
        _seerr_libs_need_sync: >-
          {{ _seerr_plex_libs_current.json | default([]) | length == 0 or
             (seerr_plex_libraries | default(['Movies', 'TV Shows']))
             | difference(_seerr_plex_libs_current.json | default([])
               | selectattr('enabled', 'equalto', true)
               | map(attribute='name') | list) | length > 0 }}
      when:
        - _seerr_api_key is defined
        - _seerr_plex_libs_current is not skipped

    - name: Sync Plex libraries to Seerr
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex/library?sync=true"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: _seerr_plex_libs
      when:
        - _seerr_api_key is defined
        - _seerr_libs_need_sync | default(false) | bool

    - name: Enable configured Plex libraries in Seerr
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex/library?enable={{ _library_ids | join(',') }}"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      vars:
        _library_ids: >-
          {{ _seerr_plex_libs.json
             | selectattr('name', 'in', seerr_plex_libraries | default(['Movies', 'TV Shows']))
             | map(attribute='id') | list }}
      when:
        - _seerr_api_key is defined
        - _seerr_plex_libs is not skipped
        - _seerr_plex_libs.json | default([]) | length > 0

    - name: Get Radarr quality profiles for Seerr
      ansible.builtin.uri:
        url: "http://localhost:7878/api/v3/qualityprofile"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.radarr }}"
        return_content: true
      register: radarr_quality_profiles
      when:
        - _seerr_api_key is defined
        - not (seerr_public.json.initialized | default(false))

    - name: Get Radarr root folders for Seerr
      ansible.builtin.uri:
        url: "http://localhost:7878/api/v3/rootfolder"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.radarr }}"
        return_content: true
      register: radarr_root_folders
      when:
        - _seerr_api_key is defined
        - not (seerr_public.json.initialized | default(false))

    - name: Check existing Seerr Radarr servers
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/radarr"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: seerr_radarr_existing
      when: _seerr_api_key is defined

    - name: Add Radarr to Seerr
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/radarr"
        method: POST
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
          Content-Type: application/json
        body_format: json
        body:
          name: Radarr
          hostname: radarr
          port: 7878
          apiKey: "{{ arr_api_keys.radarr }}"
          useSsl: false
          baseUrl: ""
          activeProfileId: "{{ (radarr_quality_profiles.json | selectattr('name', 'equalto', seerr_radarr_profile | default('Any')) | first).id | default(radarr_quality_profiles.json[0].id) }}"
          activeProfileName: "{{ seerr_radarr_profile | default(radarr_quality_profiles.json[0].name) }}"
          activeDirectory: "{{ radarr_root_folders.json[0].path }}"
          is4k: false
          minimumAvailability: released
          isDefault: true
          syncEnabled: false
          preventSearch: false
        status_code: [200, 201]
      when:
        - _seerr_api_key is defined
        - radarr_quality_profiles is not skipped
        - radarr_root_folders is not skipped
        - seerr_radarr_existing.json | default([]) | length == 0

    - name: Get Sonarr quality profiles for Seerr
      ansible.builtin.uri:
        url: "http://localhost:8989/api/v3/qualityprofile"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.sonarr }}"
        return_content: true
      register: sonarr_quality_profiles
      when:
        - _seerr_api_key is defined
        - not (seerr_public.json.initialized | default(false))

    - name: Get Sonarr root folders for Seerr
      ansible.builtin.uri:
        url: "http://localhost:8989/api/v3/rootfolder"
        method: GET
        headers:
          X-Api-Key: "{{ arr_api_keys.sonarr }}"
        return_content: true
      register: sonarr_root_folders
      when:
        - _seerr_api_key is defined
        - not (seerr_public.json.initialized | default(false))

    - name: Check existing Seerr Sonarr servers
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/sonarr"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: seerr_sonarr_existing
      when: _seerr_api_key is defined

    - name: Add Sonarr to Seerr
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/sonarr"
        method: POST
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
          Content-Type: application/json
        body_format: json
        body:
          name: Sonarr
          hostname: sonarr
          port: 8989
          apiKey: "{{ arr_api_keys.sonarr }}"
          useSsl: false
          baseUrl: ""
          activeProfileId: "{{ (sonarr_quality_profiles.json | selectattr('name', 'equalto', seerr_sonarr_profile | default('Any')) | first).id | default(sonarr_quality_profiles.json[0].id) }}"
          activeProfileName: "{{ seerr_sonarr_profile | default(sonarr_quality_profiles.json[0].name) }}"
          activeDirectory: "{{ sonarr_root_folders.json[0].path }}"
          is4k: false
          enableSeasonFolders: true
          isDefault: true
          syncEnabled: false
          preventSearch: false
        status_code: [200, 201]
      when:
        - _seerr_api_key is defined
        - sonarr_quality_profiles is not skipped
        - sonarr_root_folders is not skipped
        - seerr_sonarr_existing.json | default([]) | length == 0

    - name: Initialize Seerr (mark setup complete)
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/initialize"
        method: POST
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
          Content-Type: application/json
        body_format: json
        body: {}
        status_code: [200]
      when:
        - _seerr_api_key is defined
        - not (seerr_public.json.initialized | default(false))

    - name: Get current Seerr main settings
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/main"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: _seerr_current_main
      when: _seerr_api_key is defined

    - name: Configure Seerr main settings (no local login, application URL)
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/main"
        method: POST
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
          Content-Type: application/json
        body_format: json
        body:
          localLogin: false
          applicationTitle: "{{ seerr_application_title | default('Clintflix') }}"
          applicationUrl: "{{ seerr_application_url | default('') }}"
          discoverRegion: "{{ seerr_discover_region | default('US') }}"
          streamingRegion: "{{ seerr_discover_region | default('US') }}"
          originalLanguage: "{{ seerr_language | default('en') }}"
        status_code: [200]
      when:
        - _seerr_api_key is defined
        - _seerr_current_main is not skipped
        - >-
          (_seerr_current_main.json.localLogin | default(true)) != false or
          (_seerr_current_main.json.applicationTitle | default('')) != (seerr_application_title | default('Clintflix')) or
          (_seerr_current_main.json.applicationUrl | default('')) != (seerr_application_url | default('')) or
          (_seerr_current_main.json.discoverRegion | default('')) != (seerr_discover_region | default('US')) or
          (_seerr_current_main.json.originalLanguage | default('')) != (seerr_language | default('en'))

    - name: Re-read Seerr Plex settings for web app URL update
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: _seerr_plex_current
      when:
        - _seerr_api_key is defined
        - seerr_plex_web_app_url | default('') | length > 0

    - name: Configure Seerr Plex Web App URL
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex"
        method: POST
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
          Content-Type: application/json
        body_format: json
        body:
          ip: "{{ _seerr_plex_current.json.ip }}"
          port: "{{ _seerr_plex_current.json.port }}"
          useSsl: "{{ _seerr_plex_current.json.useSsl | default(false) }}"
          webAppUrl: "{{ seerr_plex_web_app_url }}"
        status_code: [200]
      when:
        - _seerr_api_key is defined
        - _seerr_plex_current is not skipped
        - _seerr_plex_current.json.ip | default('') | length > 0
        - (_seerr_plex_current.json.webAppUrl | default('')) != seerr_plex_web_app_url

    - name: Get current Seerr Tautulli settings
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/tautulli"
        method: GET
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
        return_content: true
      register: _seerr_tautulli_current
      when:
        - _seerr_api_key is defined
        - arr_api_keys.tautulli | default('') | length > 0

    - name: Configure Tautulli integration in Seerr
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/tautulli"
        method: POST
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
          Content-Type: application/json
        body_format: json
        body:
          hostname: tautulli
          port: 8181
          useSsl: false
          apiKey: "{{ arr_api_keys.tautulli }}"
          externalUrl: "{{ tautulli_base_url | default('') }}"
        status_code: [200]
      when:
        - _seerr_api_key is defined
        - arr_api_keys.tautulli | default('') | length > 0
        - _seerr_tautulli_current is not skipped
        - >-
          (_seerr_tautulli_current.json.hostname | default('')) != 'tautulli' or
          (_seerr_tautulli_current.json.apiKey | default('')) != arr_api_keys.tautulli

    - name: Trigger Seerr Plex library scan
      ansible.builtin.uri:
        url: "http://localhost:5055/api/v1/settings/plex/sync"
        method: POST
        headers:
          X-Api-Key: "{{ _seerr_api_key }}"
          Content-Type: application/json
        body_format: json
        body: {}
        status_code: [200, 204]
      when:
        - _seerr_api_key is defined
        - not (seerr_public.json.initialized | default(false))

- name: Build complete API keys dict including seerr
  ansible.builtin.set_fact:
    arr_api_keys: "{{ arr_api_keys | default({}) | combine({'seerr': _seerr_api_key}) }}"
  when:
    - _seerr_api_key is defined
    - _seerr_api_key | length > 0
  tags: [plex_services, secrets]

- name: Write extracted API keys to Infisical /plex-services
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_write_secret.yml"
  vars:
    secret_name: "{{ item.key }}_api_key"
    secret_value: "{{ item.value }}"
    secret_path: "/plex-services"
    secret_comment: "{{ item.key | capitalize }} API key — auto-extracted from service config"
  loop: "{{ arr_api_keys | dict2items }}"
  loop_control:
    label: "{{ item.key }}_api_key"
  when:
    - arr_api_keys is defined
    - arr_api_keys | length > 0
    - item.value | length > 0
    - infisical_login.login_data is defined
  tags: [plex_services, secrets]

- name: Flush handlers to apply pending restarts
  ansible.builtin.meta: flush_handlers
  tags:
    - plex_services
    - config

- name: Correct ownership for plex services config directories
  ansible.builtin.file:
    path: "/opt/plex-services/{{ item.key }}"
    state: directory
    owner: "{{ item.key }}"
    group: "{{ plex_services_group }}"
  loop: "{{ plex_services | dict2items }}"
  loop_control:
    label: "{{ item.key }} config"
  tags:
    - plex_services
    - config

- name: Configure Docker PBS backup
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/configure_pbs_backup.yml"
  vars:
    backup_name: "Docker containers"
    backup_script_src: docker_pbs_backup.sh.j2
    backup_script_dest: /usr/local/bin/docker_pbs_backup.sh
    backup_cron_hour: "2"
    backup_cron_minute: "30"
  when: pbs_backup_enabled | default(true)
  tags: [plex_services, backup, pbs, cron]

# === Manual Configuration Required After First Deployment ===
#
# Prowlarr indexers and SABnzbd news servers are now automated via
# plex_services_indexers and plex_services_usenet_servers variables.
# Add credentials to Infisical at /plex-services/ before deploying.
#
# 1. BAZARR:
#    - Open http://<host>:6767 -> Settings -> Languages
#    - Set subtitle languages, providers, and anti-captcha keys
#    - Settings -> Sonarr/Radarr: Add connection (localhost ports, API keys auto-read from config)
#
# 4. TAUTULLI:
#    - Open http://<host>:8181 -> Settings -> Plex Media Server
#    - Add Plex server connection and authentication token
#
# 5. SEERR: Automated — Plex auth, Sonarr/Radarr setup, library sync
#
# 6. CLOUDFLARE TUNNEL:
#    - Routes configured in Cloudflare Zero Trust dashboard:
#      tautulli.clintflix.tv  -> http://tautulli:8181
#      requests.clintflix.tv  -> http://seerr:5055
