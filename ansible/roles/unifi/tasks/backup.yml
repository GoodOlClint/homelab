---
# UniFi Controller Backup Tasks

- name: Create backup script
  ansible.builtin.template:
    src: backup-unifi.sh.j2
    dest: /usr/local/bin/backup-unifi
    owner: root
    group: root
    mode: '0755'

- name: Create restore script
  ansible.builtin.template:
    src: restore-unifi.sh.j2
    dest: /usr/local/bin/restore-unifi
    owner: root
    group: root
    mode: '0755'

- name: Create backup cron job
  ansible.builtin.cron:
    name: "UniFi Controller automatic backup"
    minute: "{{ unifi_backup_schedule.split()[0] }}"
    hour: "{{ unifi_backup_schedule.split()[1] }}"
    day: "{{ unifi_backup_schedule.split()[2] }}"
    month: "{{ unifi_backup_schedule.split()[3] }}"
    weekday: "{{ unifi_backup_schedule.split()[4] }}"
    job: "/usr/local/bin/backup-unifi"
    user: root
    state: present

- name: Create backup cleanup cron job
  ansible.builtin.cron:
    name: "UniFi Controller backup cleanup"
    minute: "30"
    hour: "3"
    day: "*"
    month: "*"
    weekday: "*"
    job: "find {{ unifi_backup_dir }} -name '*.unf' -mtime +{{ unifi_backup_retention_days }} -delete"
    user: root
    state: present
