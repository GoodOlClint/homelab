---
# Main tasks for UniFi OS Server

- name: Include installation tasks
  ansible.builtin.include_tasks: install.yml
  tags: [unifi, install]

- name: Include configuration tasks
  ansible.builtin.include_tasks: configure.yml
  tags: [unifi, configure]

- name: Include firewall tasks
  ansible.builtin.include_tasks: firewall.yml
  when: unifi_configure_firewall
  tags: [unifi, firewall]

- name: Ensure UniFi OS Server is running
  ansible.builtin.systemd:
    name: uosserver
    state: started
  tags: [unifi, service]

- name: Wait for UniFi OS Server to be healthy
  ansible.builtin.command:
    cmd: uosserver status
  register: uos_status
  until: "'healthy' in uos_status.stdout"
  retries: 18
  delay: 10
  changed_when: false
  tags: [unifi, service]
