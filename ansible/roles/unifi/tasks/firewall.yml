---
# UniFi Controller Firewall Configuration

- name: Allow UniFi Controller web interface (HTTPS)
  community.general.ufw:
    rule: allow
    port: "{{ unifi_https_port }}"
    proto: tcp
    comment: "UniFi Controller HTTPS"

- name: Allow UniFi Controller web interface (HTTP redirect)
  community.general.ufw:
    rule: allow
    port: "{{ unifi_http_port }}"
    proto: tcp
    comment: "UniFi Controller HTTP"

- name: Allow UniFi Guest Portal (HTTPS)
  community.general.ufw:
    rule: allow
    port: "{{ unifi_portal_https_port }}"
    proto: tcp
    comment: "UniFi Guest Portal HTTPS"

- name: Allow UniFi Guest Portal (HTTP redirect)
  community.general.ufw:
    rule: allow
    port: "{{ unifi_portal_http_port }}"
    proto: tcp
    comment: "UniFi Guest Portal HTTP"

- name: Allow UniFi STUN
  community.general.ufw:
    rule: allow
    port: "3478"
    proto: udp
    comment: "UniFi STUN"

- name: Allow UniFi device discovery
  community.general.ufw:
    rule: allow
    port: "10001"
    proto: udp
    comment: "UniFi AP Discovery"

- name: Allow UniFi device communication
  community.general.ufw:
    rule: allow
    port: "8080"
    proto: tcp
    comment: "UniFi Device Communication"
    from_ip: "{{ item }}"
  loop: "{{ unifi_firewall_allowed_ips }}"

- name: Reload UFW
  community.general.ufw:
    state: reloaded
