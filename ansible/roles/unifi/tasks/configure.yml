---
# UniFi OS Server Configuration
# UOS Server is self-managing — configuration is done via web UI on port 11443.
# This file ensures the services are in the expected state.

- name: Ensure uosserver service is enabled
  ansible.builtin.systemd:
    name: uosserver
    enabled: true
    daemon_reload: true

- name: Ensure uosserver-updater service is enabled
  ansible.builtin.systemd:
    name: uosserver-updater
    enabled: true
