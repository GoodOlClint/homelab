---
# UniFi Controller Configuration Tasks

- name: Create systemd override directory for UniFi
  ansible.builtin.file:
    path: /etc/systemd/system/unifi.service.d
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Override UniFi service type (vendor unit uses Type=notify but Java never sends READY)
  ansible.builtin.copy:
    dest: /etc/systemd/system/unifi.service.d/override.conf
    content: |
      [Service]
      Type=simple
    owner: root
    group: root
    mode: '0644'
  notify: Restart UniFi

- name: Configure UniFi system properties
  ansible.builtin.template:
    src: system.properties.j2
    dest: "{{ unifi_data_dir }}/system.properties"
    owner: "{{ unifi_user }}"
    group: "{{ unifi_group }}"
    mode: '0644'
  notify: Restart UniFi

- name: Configure UniFi JVM options
  ansible.builtin.template:
    src: unifi.default.j2
    dest: /etc/default/unifi
    owner: root
    group: root
    mode: '0644'
  notify: Restart UniFi

- name: Ensure UniFi data directory permissions
  ansible.builtin.file:
    path: "{{ unifi_data_dir }}"
    state: directory
    owner: "{{ unifi_user }}"
    group: "{{ unifi_group }}"
    mode: '0755'
    recurse: false

- name: Ensure UniFi log directory permissions
  ansible.builtin.file:
    path: "{{ unifi_log_dir }}"
    state: directory
    owner: "{{ unifi_user }}"
    group: "{{ unifi_group }}"
    mode: '0755'
