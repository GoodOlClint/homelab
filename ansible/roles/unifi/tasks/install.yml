---
# UniFi OS Server Installation
# Installs Podman dependencies and runs the official UOS installer binary.
# Skips entirely if uosserver is already present.

- name: Check if UniFi OS Server is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/uosserver
  register: uos_installed

- name: Install Podman and dependencies
  ansible.builtin.apt:
    name:
      - podman
      - slirp4netns
      - uidmap
    state: present
    update_cache: true
  when: not uos_installed.stat.exists

- name: Fail if installer URL not provided for fresh install
  ansible.builtin.fail:
    msg: >-
      UniFi OS Server is not installed and unifi_uos_installer_url is empty.
      Set unifi_uos_installer_url to the installer binary URL from
      https://community.ui.com/releases/r/uosserver
  when:
    - not uos_installed.stat.exists
    - unifi_uos_installer_url | length == 0

- name: Download UniFi OS Server installer
  ansible.builtin.get_url:
    url: "{{ unifi_uos_installer_url }}"
    dest: /tmp/uos-installer
    mode: '0755'
  when:
    - not uos_installed.stat.exists
    - unifi_uos_installer_url | length > 0

- name: Run UniFi OS Server installer
  ansible.builtin.shell:
    cmd: echo "y" | /tmp/uos-installer
  when: not uos_installed.stat.exists
  notify: Restart UniFi OS Server

- name: Clean up installer
  ansible.builtin.file:
    path: /tmp/uos-installer
    state: absent
