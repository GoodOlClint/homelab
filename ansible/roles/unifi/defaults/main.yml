---
# UniFi OS Server Role Default Variables

# Installer URL — required for fresh installs only
# Get from: https://community.ui.com/releases/r/uosserver
# or: https://ui.com/download/releases/network-server
# Leave empty to skip installation (already installed)
unifi_uos_installer_url: ""

# Firewall configuration
unifi_configure_firewall: true
unifi_firewall_allowed_ips:
  - "{{ internal_network_cidr | default('172.16.0.0/12') }}"
  - "10.0.0.0/8"
  - "192.168.0.0/16"
