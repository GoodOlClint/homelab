---
- name: Set IPv4 DNS server for each interface using resolvectl
  loop: "{{ dns_zones | dict2items }}"
  loop_control:
    loop_var: vlan
  ansible.builtin.command: >
    resolvectl dns eth_{{ vlan.key }} {{ vlan.value.dns_ip }}
  become: true
  changed_when: false
  when: "'eth_' + vlan.key in ansible_facts.interfaces"
  tags:
    - dns_config
    - dns
    - config

- name: Set IPv6 DNS server for each interface using resolvectl
  loop: "{{ dns_zones | dict2items }}"
  loop_control:
    loop_var: vlan
  ansible.builtin.command: >
    resolvectl dns eth_{{ vlan.key }} {{ vlan.value.dns_ip }} {{ vlan.value.dns_ipv6 }}
  become: true
  changed_when: false
  when:
    - "'eth_' + vlan.key in ansible_facts.interfaces"
    - vlan.value.dns_ipv6 is defined
    - vlan.value.dns_ipv6 | length > 0
  tags:
    - dns_config
    - dns
    - config

- name: Set DNS search suffix for each interface by VLAN
  loop: "{{ dns_zones | dict2items }}"
  loop_control:
    loop_var: vlan
  ansible.builtin.command: >
    resolvectl domain eth_{{ vlan.key }} {{ vlan.value.zone }}
  become: true
  changed_when: false
  when: "'eth_' + vlan.key in ansible_facts.interfaces"
  tags:
    - dns_config
    - dns
    - config
