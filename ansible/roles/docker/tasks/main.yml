---
# --- Auto-generate Valheim server password if not already set ---
- name: Auto-generate valheim_server_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "valheim_server_password"
    secret_gen_cmd: "openssl rand -base64 12"
    secret_comment: "Valheim dedicated server password — auto-generated by Ansible"
  tags: [docker, valheim, secrets]

- name: Install NVIDIA GRID driver
  ansible.builtin.import_role:
    name: nvidia
  tags:
    - docker
    - nvidia
    - driver

- name: Install Docker using geerlingguy.docker
  ansible.builtin.import_role:
    name: geerlingguy.docker
  register: docker_role_result
  tags:
    - docker
    - packages

- name: Check if NVIDIA container toolkit GPG key exists
  ansible.builtin.stat:
    path: /etc/apt/trusted.gpg.d/libnvidia-container.gpg
  register: nvidia_gpg_key
  tags:
    - docker
    - nvidia
    - packages

- name: Ensure apt keyrings directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'
  tags:
    - docker
    - nvidia
    - packages

- name: Download nvidia-container-toolkit GPG key
  ansible.builtin.get_url:
    url: https://nvidia.github.io/libnvidia-container/gpgkey
    dest: /etc/apt/keyrings/libnvidia-container.asc
    mode: '0644'
  when: not nvidia_gpg_key.stat.exists
  tags:
    - docker
    - nvidia
    - packages

- name: Dearmor nvidia-container-toolkit GPG key
  ansible.builtin.command:
    cmd: gpg --dearmor -o /etc/apt/trusted.gpg.d/libnvidia-container.gpg /etc/apt/keyrings/libnvidia-container.asc
    creates: /etc/apt/trusted.gpg.d/libnvidia-container.gpg
  when: not nvidia_gpg_key.stat.exists
  tags:
    - docker
    - nvidia
    - packages

- name: Check if NVIDIA container toolkit repo is present
  ansible.builtin.shell: grep -q '^deb .*/libnvidia-container' /etc/apt/sources.list /etc/apt/sources.list.d/* 2>/dev/null
  register: nvidia_repo_present
  changed_when: false
  failed_when: false
  tags:
    - docker
    - nvidia
    - packages

- name: Ensure nvidia-container-toolkit repo
  ansible.builtin.apt_repository:
    repo: deb [signed-by=/etc/apt/trusted.gpg.d/libnvidia-container.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /
    state: present
    filename: nvidia-container-toolkit
  when: nvidia_repo_present.rc != 0
  tags:
    - docker
    - nvidia
    - packages

- name: Ensure nvidia-container-toolkit package
  ansible.builtin.package:
    name: nvidia-container-toolkit
    update_cache: true
    state: present
  tags:
    - docker
    - nvidia
    - packages

- name: Check if nvidia-container-runtime is configured in Docker
  ansible.builtin.shell: |
    grep -q '"nvidia-container-runtime"' /etc/docker/daemon.json 2>/dev/null
  register: nvidia_runtime_configured
  changed_when: false
  failed_when: false
  tags:
    - docker
    - nvidia
    - config

- name: Configure NVIDIA runtime for Docker
  ansible.builtin.shell: nvidia-ctk runtime configure --runtime=docker
  args:
    executable: /bin/bash
  register: nvidia_ctk_result
  when: nvidia_runtime_configured.rc != 0
  tags:
    - docker
    - nvidia
    - config

- name: Restart Docker after NVIDIA toolkit install
  ansible.builtin.systemd:
    name: docker
    state: restarted
  when: nvidia_ctk_result is defined and nvidia_ctk_result is changed
  tags:
    - docker
    - nvidia
    - service

- name: Configure Docker syslog logging
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/configure_docker_logging.yml"
  tags: [docker, logging, config]

- name: Verify CUDA container works
  community.docker.docker_container:
    name: nvidia-gpu-validation
    image: ubuntu
    command: nvidia-smi
    runtime: nvidia
    state: started
    device_requests:
      - driver: nvidia
        count: -1
        capabilities:
          - gpu
  tags:
    - docker
    - nvidia
    - validate

- name: Remove nvidia-gpu-validation container after test
  community.docker.docker_container:
    name: nvidia-gpu-validation
    state: absent
  tags:
    - docker
    - nvidia
    - validate

- name: Remove unused Ubuntu image after validation
  community.docker.docker_image:
    name: ubuntu
    state: absent
    force_absent: true
  tags:
    - docker
    - nvidia
    - validate


- name: Deploy docker-compose.yml to the docker VM
  ansible.builtin.template:
    src: templates/docker-compose.yml.j2
    dest: /opt/docker-compose.yml
    owner: root
    group: root
    mode: '0600'
  vars:
    docker_nfs_server: "{{ docker_nfs_src.split(':')[0] }}"
    docker_nfs_path: "{{ docker_nfs_src.split(':')[1] }}"
    plex_nfs_path: "/volume1/plex/data"
    radarr_user: 2001
    radarr_group: 2000
    radarr_umask: '002'
    radarr_timezone: "{{ timezone }}"
    sonarr_user: 2002
    sonarr_group: 2000
    sonarr_umask: '002'
    sonarr_timezone: "{{ timezone }}"
    bazarr_user: 2004
    bazarr_group: 988
    bazarr_timezone: "{{ timezone }}"
    prowlarr_user: 2005
    prowlarr_group: 988
    prowlarr_umask: '002'
    prowlarr_timezone: "{{ timezone }}"
    tautulli_user: 2006
    tautulli_group: 988
    tautulli_timezone: "{{ timezone }}"
    readarr_user: 2007
    readarr_group: 988
    readarr_umask: '002'
    readarr_timezone: "{{ timezone }}"
    lidarr_user: 2008
    lidarr_group: 988
    lidarr_timezone: "{{ timezone }}"
    sabnzbd_user: 2003
    sabnzbd_group: 988
    sabnzbd_umask: '002'
    sabnzbd_timezone: "{{ timezone }}"
    plex_meta_manager_user: 1000
    plex_meta_manager_group: 988
    plex_meta_manager_timezone: "{{ timezone }}"
    ombi_user: 1000
    ombi_group: 988
    ombi_timezone: "{{ timezone }}"
    ombi_mariadb_timezone: "{{ timezone }}"
    kiwix_timezone: "{{ timezone }}"
    boinc_user: 1000
    boinc_group: 988
    boinc_timezone: "{{ timezone }}"
    doge_node_timezone: "{{ timezone }}"
  tags:
    - docker
    - config
    - compose

- name: Create .env file for Docker Compose with secrets
  ansible.builtin.template:
    src: docker-env.j2
    dest: /opt/.env
    mode: '0600'
    owner: root
    group: root
  notify: restart docker services
  when: secrets.cloudflared_tunnel_token | default('') != ""
  tags:
    - docker
    - config
    - secrets

- name: Set reboot required flag
  ansible.builtin.set_fact:
    reboot_required: "{{ (nvidia_ctk_result is defined and nvidia_ctk_result is changed) or (docker_role_result is defined and docker_role_result is changed) }}"
  tags:
    - docker

- name: Reboot system if major Docker configuration changes were made
  ansible.builtin.reboot:
    reboot_timeout: 300
    connect_timeout: 20
    test_command: systemctl is-active docker
  when: reboot_required | default(false)
  tags:
    - docker
    - reboot

- name: Deploy containers with Docker Compose
  community.docker.docker_compose_v2:
    project_src: /opt
    files:
      - docker-compose.yml
    state: present
  environment:
    CLOUDFLARED_TUNNEL_TOKEN: "{{ secrets.cloudflared_tunnel_token | default('') }}"
  retries: 3
  delay: 30
  register: compose_result
  until: compose_result is succeeded
  no_log: true
  tags:
    - docker
    - compose
    - deploy

- name: Configure Docker PBS backup
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/configure_pbs_backup.yml"
  vars:
    backup_name: "Docker containers"
    backup_script_src: docker_pbs_backup.sh.j2
    backup_script_dest: /usr/local/bin/docker_pbs_backup.sh
    backup_cron_hour: "2"
    backup_cron_minute: "30"
  when: pbs_backup_enabled | default(true)
  tags: [docker, backup, pbs, cron]
