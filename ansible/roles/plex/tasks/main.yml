---
- name: Verify required pre_tasks facts
  ansible.builtin.assert:
    that:
      - secrets is defined
      - secrets is mapping
      - bootstrap is defined
    fail_msg: "Required facts not available. This role must run from a playbook that includes full_pre_tasks.yml."
    quiet: true

# --- Auto-generate Plex SMB backup password if not already set ---
- name: Auto-generate plex_smb_pass
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "plex_smb_pass"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Plex SMB backup password — auto-generated by Ansible"
    secret_infisical_path: "/plex"
    secret_dict_path: "plex"
  tags: [plex, secrets]

- name: Refresh plex_smb_pass bare variable alias from secrets
  ansible.builtin.set_fact:
    plex_smb_pass: "{{ secrets.plex.plex_smb_pass }}"
  tags: [plex, secrets]

# --- Retrieve Plex token from plex.tv if not already set ---
- name: Check if plex_token needs retrieval
  ansible.builtin.set_fact:
    _plex_token_needs_gen: >-
      {{ (secrets.plex | default({})).plex_token | default('REPLACE_ME') in ['REPLACE_ME', ''] }}
  tags: [plex, secrets]

- name: Retrieve Plex token from plex.tv
  ansible.builtin.uri:
    url: https://plex.tv/users/sign_in.json
    method: POST
    headers:
      X-Plex-Client-Identifier: "homelab-ansible"
      X-Plex-Product: "Homelab Ansible"
      X-Plex-Version: "1.0"
    body_format: form-urlencoded
    body:
      user[login]: "{{ bootstrap.plex_username }}"
      user[password]: "{{ bootstrap.plex_password }}"
    status_code: [200, 201]
  delegate_to: localhost
  become: false
  register: _plex_signin
  no_log: true
  when:
    - _plex_token_needs_gen | bool
    - bootstrap.plex_username | default('REPLACE_ME') != 'REPLACE_ME'
    - bootstrap.plex_password | default('REPLACE_ME') != 'REPLACE_ME'
  tags: [plex, secrets]

- name: Update secrets fact with plex_token
  ansible.builtin.set_fact:
    secrets: "{{ secrets | combine({'plex': (secrets.plex | default({})) | combine({'plex_token': _plex_signin.json.user.authToken})}) }}"
  when:
    - _plex_token_needs_gen | bool
    - _plex_signin is not skipped
    - _plex_signin.json is defined
  no_log: true
  tags: [plex, secrets]

- name: Resolve comment for plex_token
  ansible.builtin.set_fact:
    _secret_comment: "Plex auth token — retrieved from plex.tv by Ansible"
  when:
    - _plex_token_needs_gen | bool
    - _plex_signin is not skipped
    - _plex_signin.json is defined
    - infisical_login is defined
  tags: [plex, secrets]

- name: Store plex_token in Infisical
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_write_secret.yml"
  vars:
    secret_name: "plex_token"
    secret_value: "{{ secrets.plex.plex_token }}"
    secret_path: "/plex"
    secret_comment: "{{ _secret_comment }}"
  when:
    - _plex_token_needs_gen | bool
    - _plex_signin is not skipped
    - _plex_signin.json is defined
    - infisical_login is defined
  tags: [plex, secrets]

- name: Display plex_token retrieval result (Infisical unavailable)
  ansible.builtin.debug:
    msg: >-
      Plex token retrieved from plex.tv. Infisical is not available.
      Store manually in Infisical at /plex/plex_token or in secrets.sops.yml under plex.plex_token
    verbosity: 1
  when:
    - _plex_token_needs_gen | bool
    - _plex_signin is not skipped
    - _plex_signin.json is defined
    - infisical_login is not defined
  no_log: "{{ not (ansible_verbosity >= 1) }}"
  tags: [plex, secrets]

- name: Refresh plex_token bare variable alias from secrets
  ansible.builtin.set_fact:
    plex_token: "{{ (secrets.plex | default({})).plex_token | default('') }}"
  tags: [plex, secrets]

- name: Warn if plex.tv credentials not configured
  ansible.builtin.debug:
    msg: >-
      WARNING: plex_token is empty and plex.tv credentials are not configured in bootstrap.sops.yml.
      Backup scripts will not be able to check for active sessions.
      Set bootstrap.plex_username and bootstrap.plex_password, then re-run.
  when:
    - _plex_token_needs_gen | bool
    - (bootstrap.plex_username | default('REPLACE_ME') == 'REPLACE_ME') or (bootstrap.plex_password | default('REPLACE_ME') == 'REPLACE_ME')
  tags: [plex, secrets]

- name: Install NVIDIA GRID driver
  ansible.builtin.import_role:
    name: nvidia
  tags:
    - plex
    - nvidia
    - driver

- name: Ensure required packages.
  ansible.builtin.package:
    name:
      - nfs-common
      - cifs-utils
    state: present
  tags:
    - plex
    - packages

- name: Create plex-services media group
  ansible.builtin.group:
    name: plex-services
    gid: "{{ plex_services_media_gid }}"
    state: present
  tags:
    - plex
    - users

- name: Add plex user to plex-services media group
  ansible.builtin.user:
    name: plex
    groups: plex-services
    append: true
  register: plex_group_changed
  tags:
    - plex
    - users

- name: Restart Plex to pick up new group membership
  ansible.builtin.systemd:
    name: plexmediaserver
    state: restarted
  when: plex_group_changed is changed
  tags:
    - plex
    - users

- name: Ensure NFS fstab entry and mount.
  ansible.posix.mount:
    backup: true

    boot: "yes"
    path: "/mnt/plex"
    src: "{{ plex_nfs_src }}"
    fstype: nfs
    opts: "defaults"
    state: "mounted"
  tags:
    - plex
    - storage
    - nfs

- name: Mount /mnt/media
  ansible.builtin.file:
    src: /mnt/plex/data/media
    dest: /mnt/media
    state: link
  tags:
    - plex
    - storage

- name: Remove old Plex GPG key and repo files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/share/keyrings/plex.gpg
    - /etc/apt/sources.list.d/plexmediaserver.list
  tags:
    - plex
    - packages

- name: Check if Plex v2 GPG key exists
  ansible.builtin.stat:
    path: /usr/share/keyrings/plexmediaserver.v2.gpg
  register: plex_gpg_key
  tags:
    - plex
    - packages

- name: Download Plex APT GPG key to temp file
  ansible.builtin.get_url:
    url: https://downloads.plex.tv/plex-keys/PlexSign.v2.key
    dest: /tmp/plex.gpg.key
    mode: '0644'
  when: not plex_gpg_key.stat.exists
  tags:
    - plex
    - packages

- name: Convert Plex GPG key to dearmored format
  ansible.builtin.command:
    cmd: gpg --batch --dearmor -o /usr/share/keyrings/plexmediaserver.v2.gpg /tmp/plex.gpg.key
  args:
    creates: /usr/share/keyrings/plexmediaserver.v2.gpg
  when: not plex_gpg_key.stat.exists
  tags:
    - plex
    - packages

- name: Add Plex official APT repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/plexmediaserver.v2.gpg] https://repo.plex.tv/deb/ public main"
    state: present
    filename: plex
  tags:
    - plex
    - packages

- name: Check if Plex is installed
  ansible.builtin.stat:
    path: /usr/lib/plexmediaserver
  register: plex_installed
  tags:
    - plex
    - packages

- name: Install latest Plex Media Server
  ansible.builtin.apt:
    name: plexmediaserver
    state: latest
    update_cache: true

  when: not plex_installed.stat.exists
  tags:
    - plex
    - packages

- name: Configure Plex config PBS backup
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/configure_pbs_backup.yml"
  vars:
    backup_name: "Plex config"
    backup_script_src: plex_config_pbs_backup.sh.j2
    backup_script_dest: /usr/local/bin/plex_config_pbs_backup.sh
    backup_cron_hour: "2"
    backup_cron_minute: "0"
  when: pbs_backup_enabled | default(true)
  tags: [plex, backup, pbs, cron]

- name: Create PBS restore script for Plex config
  ansible.builtin.template:
    dest: /usr/local/bin/plex_config_pbs_restore.sh
    mode: '0755'
    owner: root
    group: root
    src: plex_config_pbs_restore.sh.j2
  when: pbs_backup_enabled | default(true)
  tags:
    - plex
    - backup
    - pbs

- name: Create SMB backup script for Plex config (fallback)
  ansible.builtin.template:
    dest: /usr/local/bin/plex_config_backup.sh
    mode: '0755'
    owner: root
    group: root
    src: plex_config_backup.sh.j2
  when: not (pbs_backup_enabled | default(true))
  tags:
    - plex
    - backup
    - smb

- name: Create SMB restore script for Plex config (fallback)
  ansible.builtin.template:
    dest: /usr/local/bin/plex_config_restore.sh
    mode: '0755'
    owner: root
    group: root
    src: plex_config_restore.sh.j2
  when: not (pbs_backup_enabled | default(true))
  tags:
    - plex
    - backup
    - smb

- name: Remove old SMB backup cron job when PBS is enabled
  ansible.builtin.cron:
    name: "Nightly Plex config backup"
    state: absent
  when: pbs_backup_enabled | default(true)
  tags:
    - plex
    - backup
    - cron

- name: Ensure cron job for nightly Plex config SMB backup (fallback)
  ansible.builtin.cron:
    name: "Nightly Plex config backup"
    user: root
    job: "/usr/local/bin/plex_config_backup.sh"
    minute: 0
    hour: 2
    state: present
  when: not (pbs_backup_enabled | default(true))
  tags:
    - plex
    - backup
    - smb
    - cron

# --- Poster Reset Setup (fixes blank thumbnails after restore) ---
# Must be deployed BEFORE the restore tasks so the service exists when restore triggers it
- name: Install packages for Media-Scripts
  ansible.builtin.package:
    name:
      - git
      - python3-venv
    state: present
  tags:
    - plex
    - poster-reset

- name: Clone Media-Scripts repository
  ansible.builtin.git:
    repo: https://github.com/chazlarson/Media-Scripts.git
    dest: /opt/media-scripts
    version: main
    update: true
  tags:
    - plex
    - poster-reset

- name: Create Python venv for Media-Scripts
  ansible.builtin.command:
    cmd: python3 -m venv /opt/media-scripts/Plex/.venv
    creates: /opt/media-scripts/Plex/.venv/bin/activate
  tags:
    - plex
    - poster-reset

- name: Install poster reset pip dependencies
  ansible.builtin.pip:
    name:
      - plexapi
      - alive-progress
      - python-dotenv
      - pathvalidate
      - Pillow
      - requests
    virtualenv: /opt/media-scripts/Plex/.venv
  tags:
    - plex
    - poster-reset

- name: Deploy poster reset .env configuration
  ansible.builtin.template:
    src: plex_reset_posters.env.j2
    dest: /opt/media-scripts/Plex/.env
    owner: root
    group: root
    mode: '0600'
  tags:
    - plex
    - poster-reset

- name: Deploy poster reset wrapper script
  ansible.builtin.template:
    src: plex_reset_posters.sh.j2
    dest: /usr/local/bin/plex_reset_posters.sh
    owner: root
    group: root
    mode: '0755'
  tags:
    - plex
    - poster-reset

- name: Deploy poster reset systemd service
  ansible.builtin.template:
    src: plex-reset-posters.service.j2
    dest: /etc/systemd/system/plex-reset-posters.service
    owner: root
    group: root
    mode: '0644'
  tags:
    - plex
    - poster-reset

- name: Enable poster reset service (runs on boot when flag exists)
  ansible.builtin.systemd:
    name: plex-reset-posters.service
    enabled: true
    daemon_reload: true
  tags:
    - plex
    - poster-reset

# --- Restore from backup (fresh install only) ---
- name: Restore Plex config from PBS if not already installed
  ansible.builtin.shell: /usr/local/bin/plex_config_pbs_restore.sh
  when:
    - not plex_installed.stat.exists
    - pbs_backup_enabled | default(true)
  args:
    executable: /bin/bash
  tags:
    - plex
    - backup
    - pbs
    - restore

- name: Restore Plex config from SMB if not already installed (fallback)
  ansible.builtin.shell: /usr/local/bin/plex_config_restore.sh
  when:
    - not plex_installed.stat.exists
    - not (pbs_backup_enabled | default(true))
  args:
    executable: /bin/bash
  tags:
    - plex
    - backup
    - smb
    - restore
