---
# Proxmox Backup Client Configuration
pbs_client_install: true
pbs_server_host: "{{ hostvars['proxmox-backup'].ansible_host | default('') }}"
pbs_server_port: 8007
pbs_datastore: "synology"
pbs_username: "backup@pbs"
pbs_token_name: "backup-token"
# secrets.pbs_backup_token and pbs_fingerprint should be defined in vars
