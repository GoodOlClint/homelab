---
# Install and configure Proxmox Backup Client

- name: Check if PBS GPG key exists
  ansible.builtin.stat:
    path: /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
  register: pbs_gpg_key
  tags:
    - pbs_client
    - pbs
    - backup
    - packages

- name: Install Proxmox Backup Server repository key
  ansible.builtin.shell: |
    wget https://enterprise.proxmox.com/debian/proxmox-release-bookworm.gpg \
      -O /etc/apt/trusted.gpg.d/proxmox-release-bookworm.gpg
  when: not pbs_gpg_key.stat.exists
  tags:
    - pbs_client
    - pbs
    - backup
    - packages

- name: Check if Proxmox repo is present
  ansible.builtin.shell: grep -q "pbs-client" /etc/apt/sources.list.d/pbs-client.list
  register: pbs_repo_check
  failed_when: false
  changed_when: false
  tags:
    - pbs_client
    - pbs
    - backup
    - packages

- name: Add Proxmox Backup Client repository
  ansible.builtin.copy:
    content: |
      # Proxmox Backup Client repository
      deb http://download.proxmox.com/debian/pbs-client bookworm main
    dest: /etc/apt/sources.list.d/pbs-client.list
    mode: '0644'
  when: pbs_repo_check.rc != 0
  register: pbs_repo_added
  tags:
    - pbs_client
    - pbs
    - backup
    - packages

- name: Update apt cache if repo was added
  ansible.builtin.apt:
    update_cache: true

  when: pbs_repo_added is changed
  tags:
    - pbs_client
    - pbs
    - backup
    - packages

- name: Install proxmox-backup-client
  ansible.builtin.apt:
    name: proxmox-backup-client
    state: present
  when: pbs_client_install | default(true)
  tags:
    - pbs_client
    - pbs
    - backup
    - packages

- name: Ensure /etc/proxmox-backup directory exists
  ansible.builtin.file:
    path: /etc/proxmox-backup
    state: directory
    mode: '0755'
  tags:
    - pbs_client
    - pbs
    - backup
    - config

- name: Create PBS environment file for authentication
  ansible.builtin.template:
    src: pbs_env.j2
    dest: /etc/proxmox-backup/pbs-client.env
    mode: '0600'
    owner: root
    group: root
  tags:
    - pbs_client
    - pbs
    - backup
    - config

- name: Verify PBS connection
  ansible.builtin.shell: |
    . /etc/proxmox-backup/pbs-client.env
    if [ -z "$PBS_PASSWORD" ] || [ -z "$PBS_FINGERPRINT" ]; then
      echo "SKIP: PBS credentials not yet available"
      exit 2
    fi
    timeout 10 proxmox-backup-client snapshot list | head -n 1
  register: pbs_connection_test
  failed_when: false
  changed_when: false
  tags:
    - pbs_client
    - pbs
    - backup
    - validate

- name: Display PBS connection status
  ansible.builtin.debug:
    msg: >-
      PBS Connection: {{
        'SKIPPED - credentials not yet available (run PBS role first)'
        if pbs_connection_test.rc == 2
        else ('SUCCESS' if pbs_connection_test.rc == 0
        else 'FAILED - ' + pbs_connection_test.stderr | default('unknown error')) }}
  tags:
    - pbs_client
    - pbs
    - backup
    - validate
