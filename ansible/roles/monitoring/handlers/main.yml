---
- name: restart axosyslog
  community.docker.docker_container:
    name: axosyslog
    state: started
    restart: true

- name: restart blackbox
  community.docker.docker_container:
    name: blackbox-exporter
    state: started
    restart: true

- name: reload prometheus
  ansible.builtin.uri:
    url: http://localhost:9090/-/reload
    method: POST
    status_code: [200]
  tags:
    - monitoring
    - prometheus
