---
- name: Verify required pre_tasks facts
  ansible.builtin.assert:
    that:
      - secrets is defined
      - secrets is mapping
      - mgmt_vlan_prefix is defined
      - dns_zones is defined
    fail_msg: "Required facts not available. This role must run from a playbook that includes full_pre_tasks.yml."
    quiet: true

# --- Auto-generate monitoring secrets if not already set ---
- name: Auto-generate grafana_admin_password
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "grafana_admin_password"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "Grafana admin password — auto-generated by Ansible"
    secret_infisical_path: "/monitoring"
    secret_dict_path: "monitoring"
  tags: [monitoring, secrets]

- name: Auto-generate openobserve_root_user_pass
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/generate_secret.yml"
  vars:
    secret_key: "openobserve_root_user_pass"
    secret_gen_cmd: "openssl rand -base64 32"
    secret_comment: "OpenObserve root user password — auto-generated by Ansible"
    secret_infisical_path: "/monitoring"
    secret_dict_path: "monitoring"
  tags: [monitoring, secrets]

- name: Refresh monitoring bare variable aliases from secrets
  ansible.builtin.set_fact:
    grafana_admin_password: "{{ secrets.monitoring.grafana_admin_password }}"
    openobserve_root_user_pass: "{{ secrets.monitoring.openobserve_root_user_pass }}"
    proxmox_token_value: "{{ secrets.monitoring.proxmox_token_value | default('') }}"
    unifi_monitoring_password: "{{ secrets.monitoring.unifi_monitoring_password | default('') }}"
    pbs_api_token: "{{ secrets.monitoring.pbs_api_token | default('') }}"
  tags: [monitoring, secrets]

- name: Install Python Docker library
  ansible.builtin.apt:
    name: python3-docker
    state: present
  tags: [monitoring, docker, packages]

- name: Create monitoring directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/monitoring
    - /opt/monitoring/openobserve
    - /opt/monitoring/grafana
    - /opt/monitoring/grafana/provisioning
    - /opt/monitoring/grafana/provisioning/datasources
    - /opt/monitoring/grafana/provisioning/dashboards
    - /opt/monitoring/prometheus
    - /opt/monitoring/blackbox
    - /opt/monitoring/proxmox
    - /opt/monitoring/snmp
    - /opt/monitoring/axosyslog
    - /opt/monitoring/textfile
    - /opt/monitoring/scripts
    - /var/lib/openobserve
    - /var/lib/uptime-kuma
  tags:
    - monitoring

- name: Create Grafana data directory with correct ownership
  ansible.builtin.file:
    path: /var/lib/grafana
    state: directory
    mode: '0755'
    owner: 472
    group: 472
  tags:
    - monitoring
    - grafana

- name: Create Docker Compose file for monitoring stack
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/monitoring/docker-compose.yml
    mode: '0600'
  tags:
    - monitoring
    - config
    - docker

- name: Create OpenObserve configuration
  ansible.builtin.template:
    src: openobserve.env.j2
    dest: /opt/monitoring/openobserve/.env
    mode: '0600'
  tags:
    - monitoring
    - config

- name: Create AxoSyslog configuration
  ansible.builtin.template:
    src: axosyslog.conf.j2
    dest: /opt/monitoring/axosyslog/syslog-ng.conf
    mode: '0644'
  notify: restart axosyslog
  tags:
    - monitoring
    - config

- name: Create Grafana datasource configuration
  ansible.builtin.template:
    src: grafana-datasource.yml.j2
    dest: /opt/monitoring/grafana/provisioning/datasources/openobserve.yml
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - config

- name: Create Grafana dashboard provisioning
  ansible.builtin.template:
    src: grafana-dashboards.yml.j2
    dest: /opt/monitoring/grafana/provisioning/dashboards/default.yml
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - config

- name: Create System Overview dashboard
  ansible.builtin.copy:
    src: dashboard-system-overview.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/system-overview.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards

- name: Create Docker Monitoring dashboard
  ansible.builtin.copy:
    src: dashboard-docker.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/docker.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards

- name: Create DNS Monitoring dashboard
  ansible.builtin.copy:
    src: dashboard-dns.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/dns.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards

- name: Create PBS Overview dashboard
  ansible.builtin.copy:
    src: dashboard-pbs-overview.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/pbs-overview.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards

- name: Create UniFi Sites dashboard
  ansible.builtin.copy:
    src: dashboard-unifi-sites.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/unifi-sites.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards
    - unifi

- name: Create UniFi Clients dashboard
  ansible.builtin.copy:
    src: dashboard-unifi-clients.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/unifi-clients.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards
    - unifi

- name: Create Synology NAS dashboard
  ansible.builtin.copy:
    src: dashboard-synology.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/synology.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards
    - synology

- name: Create Proxmox dashboard
  ansible.builtin.copy:
    src: dashboard-proxmox.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/proxmox.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards
    - proxmox

- name: Create ISP Quality dashboard
  ansible.builtin.copy:
    src: dashboard-isp-quality.json
    dest: /opt/monitoring/grafana/provisioning/dashboards/isp-quality.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards
    - isp

- name: Create Smokeping dashboard
  ansible.builtin.template:
    src: dashboard-smokeping.json.j2
    dest: /opt/monitoring/grafana/provisioning/dashboards/smokeping.json
    mode: '0644'
  tags:
    - monitoring
    - grafana
    - dashboards
    - smokeping

- name: Create Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /opt/monitoring/prometheus/prometheus.yml
    mode: '0644'
  notify: reload prometheus
  tags:
    - monitoring
    - prometheus
    - config

- name: Create Prometheus alerting rules
  ansible.builtin.template:
    src: alert.rules.yml.j2
    dest: /opt/monitoring/prometheus/alert.rules.yml
    mode: '0644'
  notify: reload prometheus
  tags:
    - monitoring
    - prometheus
    - config

- name: Create Blackbox Exporter configuration
  ansible.builtin.template:
    src: blackbox.yml.j2
    dest: /opt/monitoring/blackbox/blackbox.yml
    mode: '0644'
  notify: restart blackbox
  tags:
    - monitoring
    - config

- name: Create Proxmox VE Exporter configuration
  ansible.builtin.template:
    src: proxmox-exporter.yml.j2
    dest: /opt/monitoring/proxmox/pve.yml
    mode: '0600'
  tags:
    - monitoring
    - proxmox
    - config

- name: Create SNMP Exporter configuration for Synology
  ansible.builtin.template:
    src: snmp.yml.j2
    dest: /opt/monitoring/snmp/snmp.yml
    mode: '0644'
  tags:
    - monitoring
    - snmp
    - config

- name: Install Python requests for modem scraper
  ansible.builtin.apt:
    name: python3-requests
    state: present
  when: isp_monitor_enabled | default(false)
  tags:
    - monitoring
    - isp
    - packages

- name: Deploy modem scraper script
  ansible.builtin.template:
    src: modem_scraper.py.j2
    dest: /opt/monitoring/scripts/modem_scraper.py
    mode: '0755'
  when: isp_monitor_enabled | default(false)
  tags:
    - monitoring
    - isp
    - config

- name: Configure modem scraper cron job
  ansible.builtin.cron:
    name: "ISP modem event log scraper"
    cron_file: modem_scraper
    user: root
    minute: "*/5"
    job: ". /etc/infisical/secrets/monitoring.env && /opt/monitoring/scripts/modem_scraper.py >> /var/log/modem_scraper.log 2>&1"
    state: "{{ 'present' if (isp_monitor_enabled | default(false)) else 'absent' }}"
  when: isp_monitor_enabled | default(false)
  tags:
    - monitoring
    - isp
    - cron

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    state: present
    pull: always
  tags:
    - monitoring
    - docker

- name: Wait for OpenObserve to be ready
  ansible.builtin.uri:
    url: "http://localhost:{{ openobserve_listen_port }}/healthz"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 30
  delay: 10
  tags:
    - monitoring

- name: Wait for Grafana to be ready
  ansible.builtin.uri:
    url: "http://localhost:3000/api/health"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 30
  delay: 10
  tags:
    - monitoring
    - grafana

- name: Configure UptimeRobot heartbeat cron
  ansible.builtin.cron:
    name: "UptimeRobot heartbeat"
    user: root
    job: "curl -fsS --max-time 10 {{ secrets.monitoring.uptimerobot_heartbeat_url }} > /dev/null 2>&1"
    minute: "*"
    state: "{{ 'present' if secrets.monitoring.uptimerobot_heartbeat_url | default('') | length > 0 and secrets.monitoring.uptimerobot_heartbeat_url != 'REPLACE_ME' else 'absent' }}"
  when: secrets.monitoring.uptimerobot_heartbeat_url is defined and secrets.monitoring.uptimerobot_heartbeat_url != 'REPLACE_ME'
  no_log: true
  tags:
    - monitoring
    - cron

- name: Display access information
  ansible.builtin.debug:
    msg:
      - "OpenObserve is available at: http://{{ ansible_host }}:{{ openobserve_listen_port }}"
      - "Grafana is available at: http://{{ ansible_host }}:3000"
      - "Prometheus is available at: http://{{ ansible_host }}:9090"
      - "Uptime Kuma is available at: http://{{ ansible_host }}:3001"
      - "Grafana default credentials: admin / <see secrets.sops.yml>"
  tags:
    - monitoring
