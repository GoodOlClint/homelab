---
- name: Verify required pre_tasks facts
  ansible.builtin.assert:
    that:
      - mgmt_vlan_prefix is defined
      - services_vlan_prefix is defined
    fail_msg: "Required facts not available. This role must run from a playbook that includes full_pre_tasks.yml."
    quiet: true

- name: Install NFS client packages
  ansible.builtin.package:
    name:
      - nfs-common
    state: present
  tags: [lancache, packages]

- name: Configure Docker syslog logging
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/configure_docker_logging.yml"
  tags: [lancache, logging, config]

- name: Create NFS mount point
  ansible.builtin.file:
    path: "{{ lancache_nfs_mount }}"
    state: directory
    mode: '0755'
  tags: [lancache, nfs]

- name: Mount lancache NFS share
  ansible.posix.mount:
    backup: true
    boot: "yes"
    path: "{{ lancache_nfs_mount }}"
    src: "{{ lancache_nfs_src }}"
    fstype: nfs
    opts: "{{ nfs_mount_options }}"
    state: mounted
  tags: [lancache, nfs]

- name: Create cache subdirectories
  ansible.builtin.file:
    path: "{{ lancache_nfs_mount }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - data
    - logs
  tags: [lancache, nfs]

- name: Disable systemd-resolved stub listener (frees port 53)
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
  register: resolved_conf
  tags: [lancache, config]

- name: Restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  when: resolved_conf is changed
  tags: [lancache, config]

- name: Create lancache compose directory
  ansible.builtin.file:
    path: /opt/lancache
    state: directory
    mode: '0755'
  tags: [lancache, config]

- name: Compute lancache service IP on VLAN40
  ansible.builtin.set_fact:
    lancache_service_ip: "{{ ansible_host | replace(mgmt_vlan_prefix, services_vlan_prefix) }}"
  tags: [lancache, config]

- name: Deploy lancache docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/lancache/docker-compose.yml
    owner: root
    group: root
    mode: '0644'
  notify: restart lancache
  tags: [lancache, config, compose]

- name: Deploy lancache containers
  community.docker.docker_compose_v2:
    project_src: /opt/lancache
    state: present
  retries: 3
  delay: 30
  register: lancache_compose_result
  until: lancache_compose_result is succeeded
  tags: [lancache, compose, deploy]
