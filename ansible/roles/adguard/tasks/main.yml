---
# Tasks for DNS VM (AdGuard Home)

- name: Verify required pre_tasks facts
  ansible.builtin.assert:
    that:
      - dns_zones is defined
      - dns_zones is mapping
    fail_msg: "Required facts not available. This role must run from a playbook that includes full_pre_tasks.yml."
    quiet: true

# Disable systemd-resolved stub listener so AdGuard can bind to port 53
- name: Disable systemd-resolved stub listener
  ansible.builtin.lineinfile:
    path: /etc/systemd/resolved.conf
    regexp: '^#?DNSStubListener='
    line: 'DNSStubListener=no'
    backup: true

  notify: Restart systemd-resolved
  tags:
    - adguard
    - dns
    - resolved

- name: Flush handlers to restart systemd-resolved now
  ansible.builtin.meta: flush_handlers
  tags:
    - adguard
    - dns
    - resolved

- name: Ensure required packages are installed
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - systemd
      - dnsutils  # Provides dig command for DNS testing
    state: present
    update_cache: true

  tags:
    - adguard
    - dns
    - packages

- name: Create adguardhome user
  ansible.builtin.user:
    name: adguardhome
    system: true

    shell: /bin/false
    home: /var/lib/adguardhome
    create_home: true

  tags:
    - adguard
    - dns
    - users

- name: Download AdGuard Home
  ansible.builtin.get_url:
    url: "https://github.com/AdguardTeam/AdGuardHome/releases/latest/download/AdGuardHome_linux_amd64.tar.gz"
    dest: /tmp/adguardhome.tar.gz
    mode: '0644'
  tags:
    - adguard
    - dns
    - install

- name: Extract AdGuard Home
  ansible.builtin.unarchive:
    src: /tmp/adguardhome.tar.gz
    dest: /tmp
    remote_src: true

  tags:
    - adguard
    - dns
    - install

- name: Install AdGuard Home binary
  ansible.builtin.copy:
    src: /tmp/AdGuardHome/AdGuardHome
    dest: /usr/local/bin/adguardhome
    mode: '0755'
    owner: root
    group: root
    remote_src: true

  tags:
    - adguard
    - dns
    - install

- name: Create AdGuard Home configuration directory
  ansible.builtin.file:
    path: /etc/adguardhome
    state: directory
    owner: adguardhome
    group: adguardhome
    mode: '0755'
  tags:
    - adguard
    - dns
    - config

- name: Ensure AdGuard Home work directory has correct ownership
  ansible.builtin.file:
    path: /var/lib/adguardhome
    state: directory
    owner: adguardhome
    group: adguardhome
  tags:
    - adguard
    - dns
    - config

- name: Gather all interface IPs (exclude loopback and management IP)
  ansible.builtin.set_fact:
    dns_listen_ips: "{{ ansible_facts['all_ipv4_addresses'] | difference(['127.0.0.1', ansible_host]) }}"
    dns_listen_ipv6s: "{{ ansible_facts['all_ipv6_addresses'] | difference(['::1']) | select('match', '^(?!fe80:).*') | list }}"
  tags:
    - adguard
    - dns
    - config

- name: Check if AdGuard Home config exists
  ansible.builtin.stat:
    path: /etc/adguardhome/AdGuardHome.yaml
  register: _adguard_config
  tags:
    - adguard
    - dns
    - config

- name: Deploy AdGuard Home configuration (initial only)
  ansible.builtin.template:
    src: adguardhome.yaml.j2
    dest: /etc/adguardhome/AdGuardHome.yaml
    owner: adguardhome
    group: adguardhome
    mode: '0644'
  when: not _adguard_config.stat.exists
  notify: Restart adguardhome
  tags:
    - adguard
    - dns
    - config

- name: Deploy AdGuard Home systemd service
  ansible.builtin.template:
    src: adguardhome.service.j2
    dest: /etc/systemd/system/adguardhome.service
    mode: '0644'
  notify:
    - Reload systemd
    - Restart adguardhome
  tags:
    - adguard
    - dns
    - service

- name: Ensure AdGuard Home is started and enabled
  ansible.builtin.systemd:
    name: adguardhome
    state: started
    enabled: true

    daemon_reload: true

  tags:
    - adguard
    - dns
    - service

- name: Wait for AdGuard Home to start
  ansible.builtin.wait_for:
    port: 53
    host: 127.0.0.1
    timeout: 60
  tags:
    - adguard
    - dns
    - validate

- name: Wait for AdGuard Home web interface
  ansible.builtin.wait_for:
    port: 3000
    host: 127.0.0.1
    timeout: 60
  tags:
    - adguard
    - dns
    - validate

- name: Check AdGuard Home service status
  ansible.builtin.systemd:
    name: adguardhome
  register: adguardhome_status
  tags:
    - adguard
    - dns
    - validate

- name: Display AdGuard Home service status
  ansible.builtin.debug:
    var: adguardhome_status.status
  tags:
    - adguard
    - dns
    - validate

- name: Test external DNS resolution through AdGuard Home
  ansible.builtin.command: dig @127.0.0.1 google.com +short
  register: external_dns_test
  failed_when: external_dns_test.rc != 0 or external_dns_test.stdout == ""
  changed_when: false
  retries: 5
  delay: 10
  tags:
    - adguard
    - dns
    - validate
    - test

- name: Test local zone resolution through AdGuard Home
  ansible.builtin.command: dig @127.0.0.1 ns.{{ (dns_zones.values() | first).zone }} +short
  register: local_dns_test
  failed_when: local_dns_test.rc != 0 or local_dns_test.stdout == ""
  changed_when: false
  retries: 5
  delay: 10
  when: not (bootstrap_mode | default(false))
  tags:
    - adguard
    - dns
    - validate
    - test

- name: Test IPv6 DNS resolution through AdGuard Home (if IPv6 available)
  ansible.builtin.command: dig @{{ dns_listen_ipv6s[0] | default('::1') }} google.com AAAA +short
  register: ipv6_dns_test
  failed_when: false  # Don't fail if IPv6 is not available
  changed_when: false
  retries: 3
  delay: 5
  when: dns_listen_ipv6s | length > 0
  tags:
    - adguard
    - dns
    - validate
    - test
    - ipv6

- name: Test IPv4 DNS resolution through AdGuard Home IPv6 interface (if IPv6 available)
  ansible.builtin.command: dig @{{ dns_listen_ipv6s[0] | default('::1') }} google.com A +short
  register: ipv6_to_ipv4_dns_test
  failed_when: false  # Don't fail if IPv6 is not available
  changed_when: false
  retries: 3
  delay: 5
  when: dns_listen_ipv6s | length > 0
  tags:
    - adguard
    - dns
    - validate
    - test
    - ipv6

- name: Display IPv6 DNS test results
  ansible.builtin.debug:
    msg: |
      IPv6 DNS tests:
      - IPv6 AAAA query: {{ 'PASSED' if ipv6_dns_test.rc == 0 and ipv6_dns_test.stdout != '' else 'FAILED' }}
      - IPv4 A query via IPv6: {{ 'PASSED' if ipv6_to_ipv4_dns_test.rc == 0 and ipv6_to_ipv4_dns_test.stdout != '' else 'FAILED' }}
      - IPv6 interface: {{ dns_listen_ipv6s[0] | default('Not available') }}
  when: dns_listen_ipv6s | length > 0
  tags:
    - adguard
    - dns
    - validate
    - test
    - ipv6

- name: Display AdGuard Home access information
  ansible.builtin.debug:
    msg: |
      AdGuard Home is now running!
      Web Interface: http://{{ ansible_host }}:3000
      Default login: admin / Change this password!
      DNS Server: {{ dns_listen_ips | first | default('127.0.0.1') }}:53
      DNS Server IPv6: {{ '[' + dns_listen_ipv6s[0] + ']:53' if dns_listen_ipv6s | length > 0 else 'Not available' }}

      Available DNS interfaces:
      {% for ip in dns_listen_ips %}
      - IPv4: {{ ip }}:53
      {% endfor %}
      {% for ipv6 in dns_listen_ipv6s %}
      - IPv6: [{{ ipv6 }}]:53
      {% endfor %}
  tags:
    - adguard
    - dns
