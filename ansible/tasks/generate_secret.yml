---
# Auto-generate a secret if it does not already exist, store it in Infisical,
# and update the in-memory secrets fact so downstream templates pick it up.
#
# Required variables:
#   secret_key          - lowercase key in the `secrets` dict (e.g. "grafana_admin_password")
#   secret_gen_cmd      - shell command that prints the secret value to stdout
#   secret_comment      - human-readable comment stored in Infisical
#
# Optional variables:
#   secret_infisical_path - Infisical folder path (default: "/")
#   secret_run_on         - host to run generation command on (default: "localhost")

- name: "Check if {{ secret_key }} needs generation"
  ansible.builtin.set_fact:
    _secret_needs_gen: >-
      {{ secrets[secret_key] | default('REPLACE_ME') == 'REPLACE_ME'
         or secrets[secret_key] | default('') | length == 0 }}

- name: "Generate {{ secret_key }}"
  ansible.builtin.shell:
    cmd: "{{ secret_gen_cmd }}"
  register: _gen_secret_result
  delegate_to: "{{ secret_run_on | default('localhost') }}"
  become: false
  changed_when: false
  when: _secret_needs_gen | bool
  no_log: true

- name: "Update secrets fact with generated {{ secret_key }}"
  ansible.builtin.set_fact:
    secrets: "{{ secrets | combine({secret_key: _gen_secret_result.stdout | trim}) }}"
  when:
    - _secret_needs_gen | bool
    - _gen_secret_result.stdout is defined
    - _gen_secret_result.stdout | trim | length > 0

- name: "Store {{ secret_key }} in Infisical"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_write_secret.yml"
  vars:
    secret_name: "{{ secret_key }}"
    secret_value: "{{ _gen_secret_result.stdout | trim }}"
    secret_path: "{{ secret_infisical_path | default('/') }}"
    secret_comment: "{{ secret_comment | default('Auto-generated by Ansible') }}"
  when:
    - _secret_needs_gen | bool
    - _gen_secret_result.stdout is defined
    - _gen_secret_result.stdout | trim | length > 0
    - infisical_login is defined

- name: "Display generated {{ secret_key }} (Infisical unavailable)"
  ansible.builtin.debug:
    msg: >-
      AUTO-GENERATED {{ secret_key }}. Infisical is not available.
      Save to secrets.sops.yml or Infisical manually: {{ _gen_secret_result.stdout | trim }}
    verbosity: 1
  when:
    - _secret_needs_gen | bool
    - _gen_secret_result.stdout is defined
    - _gen_secret_result.stdout | trim | length > 0
    - infisical_login is not defined
  no_log: "{{ not (ansible_verbosity >= 1) }}"
