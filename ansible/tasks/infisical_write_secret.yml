---
# Upsert a secret in Infisical (create if missing, update if changed, skip if current)
# Required variables: secret_name, secret_value, secret_path, secret_comment (optional)

- name: "Read existing secrets at {{ secret_path | default('/') }}"
  infisical.vault.read_secrets:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ bootstrap_config.infisical_project_id }}"
    env_slug: "prod"
    path: "{{ secret_path | default('/') }}"
    as_dict: true
  delegate_to: localhost
  become: false
  register: _infisical_existing

- name: "Evaluate {{ secret_name }} state"
  ansible.builtin.set_fact:
    _secret_exists: "{{ secret_name in (_infisical_existing.secrets | default({})) }}"
    _secret_current: "{{ (_infisical_existing.secrets | default({}))[secret_name] | default('') }}"

- name: "Create {{ secret_name }} in Infisical"
  infisical.vault.create_secret:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ bootstrap_config.infisical_project_id }}"
    env_slug: "prod"
    path: "{{ secret_path | default('/') }}"
    secret_name: "{{ secret_name }}"
    secret_value: "{{ secret_value }}"
    secret_comment: "{{ secret_comment | default('Auto-generated by Ansible') }}"
  delegate_to: localhost
  become: false
  when: not _secret_exists

- name: "Update {{ secret_name }} in Infisical"
  infisical.vault.update_secret:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ bootstrap_config.infisical_project_id }}"
    env_slug: "prod"
    path: "{{ secret_path | default('/') }}"
    secret_name: "{{ secret_name }}"
    secret_value: "{{ secret_value }}"
  delegate_to: localhost
  become: false
  when:
    - _secret_exists
    - _secret_current != secret_value
