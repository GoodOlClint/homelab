---
# Write a secret to Infisical
# Required variables: secret_name, secret_value, secret_path, secret_comment (optional)
- name: "Store {{ secret_name }} in Infisical"
  infisical.vault.create_secret:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ bootstrap_config.infisical_project_id }}"
    env_slug: "prod"
    path: "{{ secret_path | default('/') }}"
    secret_name: "{{ secret_name }}"
    secret_value: "{{ secret_value }}"
    secret_comment: "{{ secret_comment | default('Auto-generated by Ansible') }}"
  delegate_to: localhost
  become: false
  ignore_errors: true
  register: _infisical_write

- name: "Update {{ secret_name }} in Infisical (if already exists)"
  infisical.vault.update_secret:
    login_data: "{{ infisical_login.login_data }}"
    project_id: "{{ bootstrap_config.infisical_project_id }}"
    env_slug: "prod"
    path: "{{ secret_path | default('/') }}"
    secret_name: "{{ secret_name }}"
    secret_value: "{{ secret_value }}"
  delegate_to: localhost
  become: false
  when:
    - _infisical_write is failed
    - "'already exists' in (_infisical_write.msg | default('') | lower)
       or 'duplicate' in (_infisical_write.msg | default('') | lower)"
