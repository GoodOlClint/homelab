---
# Shared task: Configure Docker daemon syslog logging to OpenObserve
# Required variable: openobserve_listen_host (from group_vars/all.yml)
# Notifies: restart docker (handler must exist in calling role)

- name: Read existing Docker daemon.json
  ansible.builtin.slurp:
    src: /etc/docker/daemon.json
  register: daemon_json_content
  ignore_errors: true

- name: Parse existing Docker daemon configuration
  ansible.builtin.set_fact:
    daemon_config: "{{ daemon_json_content.content | b64decode | from_json if daemon_json_content.content is defined else {} }}"

- name: Merge logging configuration into Docker daemon config
  ansible.builtin.set_fact:
    daemon_config: >-
      {{ daemon_config | combine({
        'log-driver': 'syslog',
        'log-opts': {
          'syslog-address': 'udp://' + openobserve_listen_host + ':5514',
          'syslog-format': 'rfc5424',
          'tag': ansible_facts['hostname'] + '/{{.Name}}'
        }
      }) }}

- name: Write updated Docker daemon.json
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: "{{ daemon_config | to_nice_json }}"
    mode: '0644'
    owner: root
    group: root
  notify: restart docker
