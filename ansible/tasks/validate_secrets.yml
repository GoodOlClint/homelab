---
# Validate that all required secrets are available (from either Infisical or SOPS)
- name: Validate required secrets are populated
  ansible.builtin.assert:
    that:
      - secrets is defined
      - secrets | length > 0
    fail_msg: "No secrets loaded — check Infisical connectivity and SOPS fallback"
    quiet: true

- name: Check for REPLACE_ME placeholders
  ansible.builtin.assert:
    that:
      - item.value != 'REPLACE_ME'
      - item.value | length > 0
    fail_msg: "Secret '{{ item.key }}' is not populated (still REPLACE_ME or empty)"
    quiet: true
  loop: "{{ secrets | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  when: item.key in required_secrets | default([])
