---
# Shared task: Load secrets from Infisical (Tier 2) or fall back to SOPS
# Requires: bootstrap, bootstrap_config (loaded from bootstrap.sops.yml)
# Sets: secrets fact

- name: Check if Infisical is reachable
  ansible.builtin.uri:
    url: "{{ bootstrap_config.infisical_url }}/api/status"
    method: GET
    status_code: 200
    timeout: 5
  register: infisical_health
  ignore_errors: true
  delegate_to: localhost
  become: false
  run_once: true
  when:
    - bootstrap_config is defined
    - bootstrap_config.infisical_url | default('REPLACE_ME') != 'REPLACE_ME'

- name: Load secrets from Infisical (Tier 2)
  block:
    - name: Attempt Infisical login and read secrets
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../tasks/infisical_login.yml"
  rescue:
    - name: Record Infisical login failure
      ansible.builtin.set_fact:
        infisical_login_failed: true

    - name: Warn about Infisical login failure
      ansible.builtin.debug:
        msg: "WARNING: Infisical login failed — will fall back to SOPS secrets."
  when:
    - infisical_health is defined
    - infisical_health is not skipped
    - infisical_health is succeeded
  run_once: true

- name: Fallback to SOPS secrets when Infisical unavailable
  block:
    - name: Check for legacy SOPS secrets file
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
      register: secrets_vars_file
      delegate_to: localhost
      become: false

    - name: Load SOPS secrets as fallback
      community.sops.load_vars:
        file: "{{ playbook_dir }}/../group_vars/secrets.sops.yml"
        expressions: evaluate-on-load
      when: secrets_vars_file.stat.exists

    - name: Warn about SOPS fallback
      ansible.builtin.debug:
        msg: "WARNING: Infisical unreachable or login failed — using SOPS fallback. Secrets may be stale."
  when: >-
    infisical_health is not defined
    or infisical_health is skipped
    or infisical_health is failed
    or infisical_login_failed | default(false)
    or secrets is not defined
  run_once: true
