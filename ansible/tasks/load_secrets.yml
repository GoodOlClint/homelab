---
# Hard requirement: Infisical must be reachable. No SOPS fallback.
- name: Verify Infisical is reachable
  ansible.builtin.uri:
    url: "{{ bootstrap_config.infisical_url }}/api/status"
    method: GET
    return_content: true
    status_code: 200
    timeout: 5
  register: _infisical_health
  delegate_to: localhost
  become: false
  run_once: true
  ignore_errors: true
  retries: 3
  delay: 10
  until: _infisical_health is succeeded

- name: Fail if Infisical is unreachable
  ansible.builtin.fail:
    msg: |
      Infisical is unreachable at {{ bootstrap_config.infisical_url }}.
      Runtime secrets cannot be loaded — deploy cannot continue.

      Troubleshooting:
        1. Check if the Infisical VM is running: ssh infisical 'systemctl status docker'
        2. Check Infisical container: ssh infisical 'docker ps | grep infisical'
        3. Check network connectivity: curl -s {{ bootstrap_config.infisical_url }}/api/status
        4. If Infisical needs rebuilding: make bootstrap
  when: _infisical_health is not succeeded
  run_once: true

- name: Load secrets from Infisical
  ansible.builtin.include_tasks: infisical_login.yml
  run_once: true

- name: Fail if secrets fact is empty
  ansible.builtin.fail:
    msg: |
      Infisical returned an empty secrets dict. This usually means:
        1. The Machine Identity has no access to the project
        2. The Infisical project has no secrets (run `make bootstrap` first)
        3. All Infisical folders are empty (run external secret seeding)
      Check: infisical secrets list --env prod --path /monitoring
  when: (secrets | default({})) | length == 0
  run_once: true
