---
# Hard requirement: Infisical must be reachable. No SOPS fallback.
#
# Exception: when the play targets ONLY the Infisical VM itself (e.g.,
# `make rebuild infisical`), skip loading secrets since Infisical may be
# starting up. Roles on the Infisical VM use bootstrap-tier secrets and
# `| default('')` for runtime secrets they don't yet need.

- name: Check if play targets only the Infisical VM
  ansible.builtin.set_fact:
    _skip_infisical_secrets: "{{ ansible_play_batch | difference(['infisical']) | length == 0 }}"
  run_once: true

- name: Set empty secrets for Infisical-only play
  ansible.builtin.set_fact:
    secrets: {}
  run_once: true
  when: _skip_infisical_secrets | bool

- name: Skip secret loading for Infisical-only play
  ansible.builtin.debug:
    msg: >-
      Play targets only the Infisical VM — skipping Infisical secret loading.
      Roles will use bootstrap-tier secrets and empty defaults.
  run_once: true
  when: _skip_infisical_secrets | bool

- name: Verify Infisical is reachable
  ansible.builtin.uri:
    url: "{{ bootstrap_config.infisical_url }}/api/status"
    method: GET
    return_content: true
    status_code: 200
    timeout: 5
  register: _infisical_health
  delegate_to: localhost
  become: false
  run_once: true
  ignore_errors: true
  retries: 3
  delay: 10
  until: _infisical_health is succeeded
  when: not (_skip_infisical_secrets | bool)

- name: Fail if Infisical is unreachable
  ansible.builtin.fail:
    msg: |
      Infisical is unreachable at {{ bootstrap_config.infisical_url }}.
      Runtime secrets cannot be loaded — deploy cannot continue.

      Troubleshooting:
        1. Check if the Infisical VM is running: ssh infisical 'systemctl status docker'
        2. Check Infisical container: ssh infisical 'docker ps | grep infisical'
        3. Check network connectivity: curl -s {{ bootstrap_config.infisical_url }}/api/status
        4. If Infisical needs rebuilding: make rebuild-infisical
  when: not (_skip_infisical_secrets | bool) and _infisical_health is not succeeded
  run_once: true

- name: Load secrets from Infisical
  ansible.builtin.include_tasks: infisical_login.yml
  run_once: true
  when: not (_skip_infisical_secrets | bool)

- name: Fail if secrets fact is empty
  ansible.builtin.fail:
    msg: |
      Infisical returned an empty secrets dict. This usually means:
        1. The Machine Identity has no access to the project
        2. The Infisical project has no secrets (run `make bootstrap` first)
        3. All Infisical folders are empty (run external secret seeding)
      Check: infisical secrets list --env prod --path /monitoring
  when: not (_skip_infisical_secrets | bool) and (secrets | default({})) | length == 0
  run_once: true
