repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: detect-private-key
      - id: trailing-whitespace
      - id: end-of-file-fixer

  - repo: local
    hooks:
      - id: homelab-security-guardrails
        name: homelab-security-guardrails
        entry: bash scripts/security_guardrails.sh --staged
        language: system
        pass_filenames: false
        stages: [pre-commit]
