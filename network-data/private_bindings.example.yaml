version: 1

metadata:
  profile: private-bindings-template
  description: "Local-only site-specific bindings (VLAN/network data now in vlans.yaml)"

# pfSense interface names — needed for pfSense DHCP/DDNS automation
# These are site-specific and cannot be derived from vlans.yaml
# Keys must match the VLAN keys in vlans.yaml
zones:
  management:
    vlan_id: 10
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  storage:
    vlan_id: 20
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  infrastructure:
    vlan_id: 30
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  services:
    vlan_id: 40
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  media:
    vlan_id: 50
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  core:
    vlan_id: 100
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  work:
    vlan_id: 110
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  iot:
    vlan_id: 120
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  sonos:
    vlan_id: 121
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  vivint:
    vlan_id: 122
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
  guest:
    vlan_id: 130
    interface: "REPLACE_WITH_PFSENSE_INTERFACE"
