version: 1

metadata:
  profile: public
  description: "Publishable network policy intent without site-specific addressing"

zones:
  management: {}
  storage: {}
  infrastructure: {}
  services: {}
  media: {}
  core: {}
  work: {}
  iot: {}
  sonos: {}
  vivint: {}
  guest: {}

aliases:
  service_groups:
    mdns_discovery:
      proto: udp
      ports: [5353]
    airplay_control:
      proto: tcp
      ports: [7000, 7100, 5000, 5001]
    airplay_streaming:
      proto: tcp
      ports: [7010, 7011]
    ntp:
      proto: udp
      ports: [123]
    dns:
      proto: udp
      ports: [53]
    dns_tcp:
      proto: tcp
      ports: [53]
    pbs_api:
      proto: tcp
      ports: [8007]
    nfs_legacy:
      proto: tcp
      ports: [2049]
    ssh_admin:
      proto: tcp
      ports: [22]

rules:
  - id: allow-mdns-work-to-sonos
    action: pass
    from_zone: work
    to_zone: sonos
    service: mdns_discovery
    state: keep
    log: true
    note: "AirPlay and service discovery between segmented user zones"

  - id: allow-airplay-work-to-media
    action: pass
    from_zone: work
    to_zone: media
    service: airplay_control
    state: keep
    log: true
    note: "AirPlay control channels from work devices to media services"

  - id: allow-ntp-iot-to-infrastructure
    action: pass
    from_zone: iot
    to_zone: infrastructure
    service: ntp
    state: keep
    log: false
    note: "Permit time sync while maintaining segmentation"

  - id: allow-dns-core-to-infrastructure
    action: pass
    from_zone: core
    to_zone: infrastructure
    service: dns
    state: keep
    log: false
    note: "Allow DNS queries from core clients to infrastructure DNS"

  - id: allow-dns-tcp-core-to-infrastructure
    action: pass
    from_zone: core
    to_zone: infrastructure
    service: dns_tcp
    state: keep
    log: false
    note: "Allow DNS TCP fallback from core clients to infrastructure DNS"

  - id: allow-dns-work-to-infrastructure
    action: pass
    from_zone: work
    to_zone: infrastructure
    service: dns
    state: keep
    log: false
    note: "Allow DNS queries from work clients to infrastructure DNS"

  - id: allow-dns-tcp-work-to-infrastructure
    action: pass
    from_zone: work
    to_zone: infrastructure
    service: dns_tcp
    state: keep
    log: false
    note: "Allow DNS TCP fallback from work clients to infrastructure DNS"

  - id: allow-dns-iot-to-infrastructure
    action: pass
    from_zone: iot
    to_zone: infrastructure
    service: dns
    state: keep
    log: false
    note: "Allow DNS queries from IoT clients to infrastructure DNS"

  - id: allow-dns-tcp-iot-to-infrastructure
    action: pass
    from_zone: iot
    to_zone: infrastructure
    service: dns_tcp
    state: keep
    log: false
    note: "Allow DNS TCP fallback from IoT clients to infrastructure DNS"

  - id: allow-dns-sonos-to-infrastructure
    action: pass
    from_zone: sonos
    to_zone: infrastructure
    service: dns
    state: keep
    log: false
    note: "Allow DNS queries from Sonos zone to infrastructure DNS"

  - id: allow-dns-tcp-sonos-to-infrastructure
    action: pass
    from_zone: sonos
    to_zone: infrastructure
    service: dns_tcp
    state: keep
    log: false
    note: "Allow DNS TCP fallback from Sonos zone to infrastructure DNS"

  - id: allow-dns-guest-to-infrastructure
    action: pass
    from_zone: guest
    to_zone: infrastructure
    service: dns
    state: keep
    log: false
    note: "Allow DNS queries from guest clients to infrastructure DNS"

  - id: allow-dns-vivint-to-infrastructure
    action: pass
    from_zone: vivint
    to_zone: infrastructure
    service: dns
    state: keep
    log: false
    note: "Allow DNS queries from Vivint zone to infrastructure DNS"

  - id: allow-dns-tcp-guest-to-infrastructure
    action: pass
    from_zone: guest
    to_zone: infrastructure
    service: dns_tcp
    state: keep
    log: false
    note: "Allow DNS TCP fallback from guest clients to infrastructure DNS"

  - id: allow-dns-tcp-vivint-to-infrastructure
    action: pass
    from_zone: vivint
    to_zone: infrastructure
    service: dns_tcp
    state: keep
    log: false
    note: "Allow DNS TCP fallback from Vivint zone to infrastructure DNS"

  - id: allow-services-to-infrastructure-pbs
    action: pass
    from_zone: services
    to_zone: infrastructure
    service: pbs_api
    state: keep
    log: true
    note: "Allow service backup clients to reach PBS API"

  - id: allow-media-to-infrastructure-pbs
    action: pass
    from_zone: media
    to_zone: infrastructure
    service: pbs_api
    state: keep
    log: true
    note: "Allow media backup clients to reach PBS API"

  - id: allow-services-to-storage-nfs
    action: pass
    from_zone: services
    to_zone: storage
    service: nfs_legacy
    state: keep
    log: true
    note: "Allow legacy NFS backup path for service workloads"

  - id: allow-media-to-storage-nfs
    action: pass
    from_zone: media
    to_zone: storage
    service: nfs_legacy
    state: keep
    log: true
    note: "Allow legacy NFS backup path for media workloads"

  - id: allow-management-to-infrastructure-ssh
    action: pass
    from_zone: management
    to_zone: infrastructure
    service: ssh_admin
    state: keep
    log: true
    note: "Allow administrative SSH access from management zone to infrastructure hosts"

  - id: allow-management-to-services-ssh
    action: pass
    from_zone: management
    to_zone: services
    service: ssh_admin
    state: keep
    log: true
    note: "Allow administrative SSH access from management zone to service hosts"

  - id: allow-management-to-media-ssh
    action: pass
    from_zone: management
    to_zone: media
    service: ssh_admin
    state: keep
    log: true
    note: "Allow administrative SSH access from management zone to media hosts"

  - id: deny-iot-to-management
    action: block
    from_zone: iot
    to_zone: management
    service: any
    state: none
    log: true
    note: "Default deny from IoT to management"

  - id: deny-guest-to-management
    action: block
    from_zone: guest
    to_zone: management
    service: any
    state: none
    log: true
    note: "Default deny from guest zone to management"

  - id: deny-vivint-to-management
    action: block
    from_zone: vivint
    to_zone: management
    service: any
    state: none
    log: true
    note: "Default deny from Vivint zone to management"

  - id: deny-sonos-to-management
    action: block
    from_zone: sonos
    to_zone: management
    service: any
    state: none
    log: true
    note: "Default deny from Sonos zone to management"
