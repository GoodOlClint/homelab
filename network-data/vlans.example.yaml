# Canonical VLAN/Network Definitions — EXAMPLE TEMPLATE
# Copy to vlans.yaml and fill in site-specific values.
# vlans.yaml is gitignored — it contains your actual network bindings.
#
# Consumed by:
#   - Terraform: yamldecode(file("...")) in modules/network/
#   - Ansible:   include_vars in playbook pre_tasks
#
# Subnet derivation:
#   IPv4 subnets follow {ipv4_prefix}.{vlan_id}.0/24 (computed by consumers unless overridden)
#   IPv6 subnets follow {ipv6_prefix}:{vlan_id_hex}::/64 (computed by consumers unless overridden)
#   Gateways follow {ipv4_prefix}.{vlan_id}.1 (computed by consumers unless overridden)

# --- Site-wide configuration ---

ipv4_prefix: "REPLACE_WITH_IPV4_PREFIX"          # e.g., "172.16"
ipv6_prefix: "REPLACE_WITH_IPV6_PREFIX"          # e.g., "fd00:abcd:1234"
domain_suffix: "REPLACE_WITH_DOMAIN"             # e.g., "homelab.internal"

# Bootstrap DNS for cloud-init (public DNS first so VMs boot before internal DNS is up)
dns_servers:
  - "1.1.1.1"                                     # Public bootstrap (OK to keep)
  - "REPLACE_WITH_INTERNAL_DNS_IP"                 # Internal DNS server

# Which VLAN key is the management/SSH VLAN (used by hardening role)
management_vlan: "management"                      # Key name (abstract, not an ID)

# DNS server configuration for Ansible dns_zones generation
dns_server:
  dns_ipv4: "REPLACE_WITH_DNS_IPV4"               # AdGuard Home address
  dns_ipv6: "REPLACE_WITH_DNS_IPV6"               # AdGuard Home IPv6
  bind_ipv4: "REPLACE_WITH_BIND_IPV4"             # BIND9 authoritative address
  zone_vlans: ["management", "core", "storage", "work", "iot", "sonos", "guest"]

# --- Proxmox SDN Zones ---
sdn_zones:
  Homelab:
    bridge: "REPLACE_WITH_BRIDGE"                  # e.g., "vmbr1"
    mtu: 1500
  Storage:
    bridge: "REPLACE_WITH_BRIDGE"                  # e.g., "vmbr2"
    mtu: 9000

# --- VLAN Definitions ---
# Keys are lowercase descriptive names. Policy fields have real values.
# Binding fields (id, bridge, dhcp_range_*, sdn_zone) use REPLACE placeholders.
#
# Optional override fields (computed from id + top-level prefixes if omitted):
#   subnet, gateway, ipv6_subnet, mtu

vlans:
  management:
    id: REPLACE_WITH_VLAN_ID                       # e.g., 10
    name: "Management"
    bridge: "REPLACE_WITH_SDN_VNET"                # e.g., "Mgmt"
    sdn_zone: "Homelab"
    description: "Management VLAN — SSH/Ansible access"
    domain_prefix: "mgmt"
    dhcp_enabled: true
    dhcp_range_start: "REPLACE"
    dhcp_range_end: "REPLACE"
    client_isolation: false
    allows_mdns: false
    is_wireguard: false
    managed_by: ["pfsense", "unifi"]

  storage:
    id: REPLACE_WITH_VLAN_ID
    name: "Storage"
    bridge: "REPLACE_WITH_SDN_VNET"
    sdn_zone: "Storage"
